<!DOCTYPE html>
<html lang="en" style="background:#0c1018;color-scheme:dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0c1018">
<title>Page not found · SharpPicks</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark;--bg:#0c1018;--t1:#e8eaf0;--t2:#9098b3;--t3:#616a8a;--bdr:#1e2a3a;--grn:#5A9E72;--sf:'IBM Plex Serif',Georgia,serif;--sn:'Inter',-apple-system,sans-serif;--mn:'JetBrains Mono','Menlo',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html{background:#0c1018 !important}
body{font-family:var(--sn);background:#0c1018 !important;color:var(--t1);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(12,16,24,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);height:56px;display:flex;align-items:center;padding:0 clamp(16px,4vw,48px)}
.wm{display:inline-flex;align-items:center;font-family:var(--mn);font-weight:500;letter-spacing:.2em;color:#fff;line-height:1;text-decoration:none;font-size:15px}
.wm-bar{display:inline-block;width:2px;height:18.75px;background:currentColor;border-radius:1.2px;margin:0 .9px}
.wm-ul{display:inline-block;width:5.8px;height:1.5px;background:var(--grn);border-radius:1px;margin-top:1.5px}
main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:120px 24px 80px;max-width:600px;margin:0 auto}
.code{font-family:var(--mn);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--grn);margin-bottom:24px}
h1{font-family:var(--sf);font-size:42px;font-weight:500;line-height:1.1;margin-bottom:20px;color:var(--t1);letter-spacing:-.01em}
p{font-size:15px;line-height:1.7;color:var(--t2);margin-bottom:32px}
.cta{display:inline-block;font-family:var(--mn);font-size:13px;letter-spacing:.04em;color:#fff;background:var(--grn);padding:14px 32px;border-radius:8px;text-decoration:none;transition:background .2s}
.cta:hover{background:#4e8c64}
.sec{display:inline-block;font-family:var(--mn);font-size:13px;letter-spacing:.04em;color:var(--t2);padding:14px 28px;border-radius:8px;text-decoration:none;border:1px solid var(--bdr);margin-left:8px}
.sec:hover{color:var(--t1);border-color:#2a3654}
footer{text-align:center;padding:24px;font-family:var(--mn);font-size:10px;color:var(--t3);letter-spacing:.06em}
</style>
</head>
<body>
<nav>
  <a href="/" class="wm">
    <span style="margin-right:5.25px">SHARP</span>
    <span style="display:inline-flex;flex-direction:column;align-items:center;gap:2.25px">
      <span style="display:inline-flex;gap:1.8px"><span class="wm-bar"></span><span class="wm-bar"></span></span>
      <span class="wm-ul"></span>
    </span>
    <span style="margin-left:6.75px">PICKS</span>
  </a>
</nav>
<main>
  <div class="code">404 · Not Found</div>
  <h1>This page does not exist.</h1>
  <p>The link you followed is broken, or the page has been moved. The model is still scanning. Pick up where you left off.</p>
  <div>
    <a href="/" class="cta">Back to home</a>
    <a href="/blog/" class="sec">Read the journal</a>
  </div>
</main>
<footer>SharpPicks LLC · Verified by data, not talk</footer>
</body>
</html>
