# Railway/Nixpacks build config
# 1. Node provider: installs deps, runs npm run build → populates dist/
# 2. Python provider: uv sync for backend
# Use uv sync without --locked to avoid build failures when lockfile
# resolution differs between local (e.g. 3.14) and Railway (3.13).
providers = ["node", "python"]

[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
aptPkgs = [
  "libglib2.0-0", "libnss3", "libnspr4", "libatk1.0-0",
  "libatk-bridge2.0-0", "libcups2", "libdrm2", "libxkbcommon0",
  "libxcomposite1", "libxdamage1", "libxfixes3", "libxrandr2",
  "libgbm1", "libpango-1.0-0", "libcairo2", "libasound2",
  "libatspi2.0-0", "libdbus-1-3", "libx11-6", "libx11-xcb1",
  "libxcb1", "libxext6", "libxshmfence1", "fonts-liberation"
]

[phases.install]
cmds = [
  "npm ci || npm install",
  "cd emails && npm install && cd ..",
  "uv sync --no-dev --no-install-project"
]

[phases.build]
cmds = ["npm run build"]
