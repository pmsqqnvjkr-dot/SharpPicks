<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SharpPicks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0A0D14;color:#E8E9EB;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center}
.logo{margin-bottom:32px;opacity:0.9}
.spinner{width:28px;height:28px;border:2.5px solid rgba(90,158,114,0.15);border-top-color:#5A9E72;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-size:20px;font-weight:600;letter-spacing:-0.01em;margin-bottom:10px;color:#E8E9EB}
p{font-size:14px;line-height:1.6;color:#8B8F96;max-width:280px;margin-bottom:24px}
.attempt{font-size:11px;color:#555;margin-bottom:20px;min-height:16px}
button{padding:14px 40px;background:#5A9E72;border:none;border-radius:12px;color:#0A0D14;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:0.02em;-webkit-tap-highlight-color:transparent;display:none}
button:active{opacity:0.85}
.offline-msg{display:none}
.offline-msg p{color:#8B8F96}
</style>
</head>
<body>
<div class="logo">
<svg width="44" height="44" viewBox="0 0 500 500">
<rect x="150" y="100" width="60" height="300" rx="30" fill="#E8E9EB"/>
<rect x="290" y="100" width="60" height="300" rx="30" fill="#E8E9EB"/>
<rect x="150" y="420" width="200" height="20" rx="10" fill="#5A9E72"/>
</svg>
</div>

<div id="loading-state">
  <div class="spinner" id="spinner"></div>
  <h1 id="heading">Connecting…</h1>
  <p id="subtext">Just a moment while we connect.</p>
  <div class="attempt" id="attempt"></div>
  <button id="retry-btn" onclick="manualRetry()">Try Again</button>
</div>

<div id="offline-state" class="offline-msg">
  <h1>No internet connection</h1>
  <p>Please check your network and try again.</p>
  <button style="display:inline-block;margin-top:8px" onclick="checkAndRetry()">Try Again</button>
</div>

<script>
var MAX_RETRIES = 3;
var attempt = 0;
var delays = [2000, 4000, 6000];
var timer = null;
var APP_URL = 'https://app.sharppicks.ai';

function show(id) {
  document.getElementById('loading-state').style.display = id === 'loading' ? '' : 'none';
  document.getElementById('offline-state').style.display = id === 'offline' ? '' : 'none';
}

function doRetry() {
  attempt++;
  if (attempt > MAX_RETRIES) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('heading').textContent = 'Unable to connect';
    document.getElementById('subtext').textContent = 'Please check your connection and try again.';
    document.getElementById('attempt').textContent = '';
    document.getElementById('retry-btn').style.display = 'inline-block';
    return;
  }
  document.getElementById('attempt').textContent = 'Attempt ' + attempt + ' of ' + MAX_RETRIES + '\u2026';
  window.location.replace(APP_URL);
}

function checkAndRetry() {
  if (!navigator.onLine) {
    show('offline');
    return;
  }
  show('loading');
  attempt = 0;
  scheduleRetry();
}

function scheduleRetry() {
  if (!navigator.onLine) {
    show('offline');
    return;
  }
  var delay = delays[attempt] || delays[delays.length - 1];
  timer = setTimeout(doRetry, delay);
}

function manualRetry() {
  attempt = 0;
  document.getElementById('spinner').style.display = '';
  document.getElementById('heading').textContent = 'Connecting\u2026';
  document.getElementById('subtext').textContent = 'Just a moment while we connect.';
  document.getElementById('retry-btn').style.display = 'none';
  scheduleRetry();
}

window.addEventListener('online', function() {
  show('loading');
  attempt = 0;
  scheduleRetry();
});

if (!navigator.onLine) {
  show('offline');
} else {
  show('loading');
  scheduleRetry();
}
</script>
</body>
</html>
