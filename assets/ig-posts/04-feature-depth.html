<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    font-family: 'Inter', sans-serif;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 60px;
  }

  .post-label {
    font-family: 'JetBrains Mono', monospace;
    color: #5A9E72;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: -40px;
  }

  .post {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════════
     SHARED ELEMENTS
     ═══════════════════════════════════════════ */

  .bg-dark {
    background: #0a0e1a;
  }

  .bg-gradient {
    background: linear-gradient(160deg, #0a0e1a 0%, #0f1628 50%, #111d35 100%);
  }

  .wordmark {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 6px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
  }

  .site-url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
  }

  /* Shared brand marks for posts 3-8 */
  .post-brand-top {
    position: absolute;
    top: 40px;
    left: 50px;
    z-index: 5;
  }
  .post-brand-top img {
    height: 36px;
    width: auto;
    opacity: 0.4;
  }
  .post-brand-bottom {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 5;
  }
  .post-brand-bottom img {
    height: 14px;
    width: auto;
    opacity: 0.25;
  }

  .green { color: #5A9E72; }
  .red { color: #C4686B; }
  .dim { color: rgba(255,255,255,0.4); }

  .divider {
    width: 40px;
    height: 2px;
    background: #5A9E72;
  }

  .divider-long {
    width: 100%;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  /* ═══════════════════════════════════════════
     POST 1 — BRAND INTRO / TAGLINE
     ═══════════════════════════════════════════ */

  .post-1 {
    background: #0a0e1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .post-1 .logo-icon {
    width: 120px;
    margin-bottom: 30px;
  }

  .post-1 .logo-icon img {
    width: 100%;
    height: auto;
  }

  .post-1 .brand-name {
    margin-bottom: 50px;
  }

  .post-1 .brand-name img {
    height: 28px;
    width: auto;
    opacity: 0.85;
  }

  .post-1 .tagline {
    font-family: 'IBM Plex Serif', serif;
    font-size: 72px;
    font-weight: 600;
    color: #fff;
    line-height: 1.15;
    max-width: 750px;
    margin-bottom: 50px;
  }

  .post-1 .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .post-1 .corner-accent {
    position: absolute;
    width: 60px;
    height: 60px;
    border: 1px solid rgba(90,158,114,0.3);
  }

  .post-1 .corner-accent.tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
  .post-1 .corner-accent.tr { top: 40px; right: 40px; border-left: none; border-bottom: none; }
  .post-1 .corner-accent.bl { bottom: 40px; left: 40px; border-right: none; border-top: none; }
  .post-1 .corner-accent.br { bottom: 40px; right: 40px; border-left: none; border-top: none; }

  /* ═══════════════════════════════════════════
     POST 2 — WHAT IS SHARPPICKS
     ═══════════════════════════════════════════ */

  .post-2 {
    background: linear-gradient(170deg, #0a0e1a 0%, #0d1322 100%);
    display: flex;
    flex-direction: column;
    padding: 70px 80px;
  }

  .post-2 .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 60px;
  }

  .post-2 .heading {
    font-family: 'IBM Plex Serif', serif;
    font-size: 52px;
    font-weight: 600;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 40px;
  }

  .post-2 .body-text {
    font-family: 'Inter', sans-serif;
    font-size: 24px;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    margin-bottom: auto;
    max-width: 850px;
  }

  .post-2 .feature-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 50px;
  }

  .post-2 .feature-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 28px 30px;
  }

  .post-2 .feature-item .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #5A9E72;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .post-2 .feature-item .value {
    font-family: 'IBM Plex Serif', serif;
    font-size: 20px;
    color: rgba(255,255,255,0.8);
  }

  /* ═══════════════════════════════════════════
     POST 3 — 4 MODEL ENSEMBLE
     ═══════════════════════════════════════════ */

  .post-3 {
    background: #0a0e1a;
    display: flex;
    flex-direction: column;
    padding: 70px 80px;
    position: relative;
  }

  .post-3::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 30%, rgba(90,158,114,0.06) 0%, transparent 60%);
  }

  .post-3 .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #5A9E72;
    letter-spacing: 3px;
    margin-bottom: 30px;
    position: relative;
  }

  .post-3 .heading {
    font-family: 'IBM Plex Serif', serif;
    font-size: 48px;
    font-weight: 600;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 50px;
    position: relative;
  }

  .post-3 .model-stack {
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    flex: 1;
    justify-content: center;
  }

  .post-3 .model-row {
    display: flex;
    align-items: center;
    gap: 24px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 24px 32px;
  }

  .post-3 .model-row .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px;
    font-weight: 700;
    color: rgba(90,158,114,0.3);
    width: 50px;
  }

  .post-3 .model-row .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    flex: 1;
  }

  .post-3 .model-row .bar {
    width: 200px;
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
  }

  .post-3 .model-row .bar-fill {
    height: 100%;
    background: #5A9E72;
    border-radius: 3px;
  }

  .post-3 .bottom-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
    margin-top: 40px;
    position: relative;
  }

  /* ═══════════════════════════════════════════
     POST 4 — 56 FEATURES
     ═══════════════════════════════════════════ */

  .post-4 {
    background: #0a0e1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
  }

  .post-4 .big-number {
    font-family: 'IBM Plex Serif', serif;
    font-size: 280px;
    font-weight: 700;
    color: rgba(255,255,255,0.04);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    line-height: 1;
  }

  .post-4 .content {
    position: relative;
    z-index: 1;
  }

  .post-4 .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #5A9E72;
    letter-spacing: 3px;
    margin-bottom: 30px;
  }

  .post-4 .heading {
    font-family: 'IBM Plex Serif', serif;
    font-size: 64px;
    font-weight: 600;
    color: #fff;
    line-height: 1.15;
    margin-bottom: 40px;
  }

  .post-4 .body-text {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    line-height: 1.7;
    max-width: 700px;
  }

  .post-4 .feature-tags {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 50px;
    max-width: 800px;
  }

  .post-4 .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════════
     POST 5 — EDGE THRESHOLD
     ═══════════════════════════════════════════ */

  .post-5 {
    background: #0a0e1a;
    display: flex;
    flex-direction: column;
    padding: 70px 80px;
    position: relative;
  }

  .post-5 .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #5A9E72;
    letter-spacing: 3px;
    margin-bottom: 30px;
  }

  .post-5 .heading {
    font-family: 'IBM Plex Serif', serif;
    font-size: 48px;
    font-weight: 600;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 20px;
  }

  .post-5 .sub-text {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    margin-bottom: 50px;
    max-width: 800px;
  }

  .post-5 .threshold-visual {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }

  .post-5 .bar-container {
    width: 100%;
    height: 70px;
    background: rgba(255,255,255,0.02);
    border-radius: 10px;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
  }

  .post-5 .bar-reject {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 65%;
    background: linear-gradient(90deg, rgba(196,104,107,0.15), rgba(196,104,107,0.08));
    display: flex;
    align-items: center;
    padding-left: 30px;
  }

  .post-5 .bar-accept {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 35%;
    background: linear-gradient(90deg, rgba(90,158,114,0.08), rgba(90,158,114,0.2));
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 30px;
  }

  .post-5 .bar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .post-5 .threshold-line {
    position: absolute;
    left: 65%;
    top: -10px;
    bottom: -10px;
    width: 2px;
    background: #5A9E72;
    z-index: 2;
  }

  .post-5 .threshold-label {
    position: absolute;
    left: 65%;
    top: -45px;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: #5A9E72;
  }

  .post-5 .stat-row {
    display: flex;
    gap: 40px;
    margin-top: 30px;
  }

  .post-5 .stat-item {
    text-align: center;
  }

  .post-5 .stat-item .val {
    font-family: 'IBM Plex Serif', serif;
    font-size: 42px;
    font-weight: 700;
    color: #fff;
  }

  .post-5 .stat-item .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ═══════════════════════════════════════════
     POST 6 — CLV EXPLAINER
     ═══════════════════════════════════════════ */

  .post-6 {
    background: linear-gradient(170deg, #0a0e1a 0%, #0e1525 100%);
    display: flex;
    flex-direction: column;
    padding: 70px 80px;
  }

  .post-6 .section-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #5A9E72;
    letter-spacing: 3px;
    margin-bottom: 30px;
  }

  .post-6 .heading {
    font-family: 'IBM Plex Serif', serif;
    font-size: 46px;
    font-weight: 600;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 20px;
  }

  .post-6 .sub-text {
    font-family: 'Inter', sans-serif;
    font-size: 21px;
    color: rgba(255,255,255,0.45);
    line-height: 1.6;
    margin-bottom: 50px;
  }

  .post-6 .clv-demo {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 30px;
  }

  .post-6 .clv-row {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .post-6 .clv-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    width: 220px;
    text-transform: uppercase;
  }

  .post-6 .clv-value {
    font-family: 'IBM Plex Serif', serif;
    font-size: 32px;
    font-weight: 600;
    color: #fff;
    width: 150px;
  }

  .post-6 .clv-bar {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
    overflow: hidden;
  }

  .post-6 .clv-bar-fill {
    height: 100%;
    border-radius: 4px;
  }

  .post-6 .bottom-text {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    color: rgba(255,255,255,0.35);
    margin-top: 40px;
    line-height: 1.6;
    border-left: 2px solid #5A9E72;
    padding-left: 20px;
  }

  /* ═══════════════════════════════════════════
     POST 7 — SELECTIVE BY DESIGN
     ═══════════════════════════════════════════ */

  .post-7 {
    background: #0a0e1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
  }

  .post-7 .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .post-7 .content {
    position: relative;
    z-index: 1;
  }

  .post-7 .tagline-word {
    font-family: 'JetBrains Mono', monospace;
    font-size: 56px;
    font-weight: 700;
    letter-spacing: 14px;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
    display: block;
    line-height: 1.6;
  }

  .post-7 .tagline-word.accent {
    color: #5A9E72;
  }

  .post-7 .divider-accent {
    width: 60px;
    height: 3px;
    background: #5A9E72;
    margin: 40px auto;
  }

  .post-7 .explain {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    line-height: 1.7;
    max-width: 650px;
  }

  /* ═══════════════════════════════════════════
     POST 8 — CTA / ONE PICK BEATS FIVE
     ═══════════════════════════════════════════ */

  .post-8 {
    background: #0a0e1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
  }

  .post-8::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, rgba(90,158,114,0.08) 0%, transparent 50%);
  }

  .post-8 .content {
    position: relative;
    z-index: 1;
  }

  .post-8 .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .post-8 .hero-text {
    font-family: 'IBM Plex Serif', serif;
    font-size: 76px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 20px;
  }

  .post-8 .hero-text .em {
    color: #5A9E72;
  }

  .post-8 .sub-cta {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 60px;
    line-height: 1.5;
  }

  .post-8 .cta-btn {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #0a0e1a;
    background: #5A9E72;
    padding: 18px 50px;
    border-radius: 8px;
    margin-bottom: 30px;
  }

  .post-8 .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
  }

  .post-8 .sports-row {
    display: flex;
    gap: 30px;
    margin-bottom: 50px;
  }

  .post-8 .sport-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 10px 24px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: rgba(255,255,255,0.5);
  }

  .post-8 .sport-badge.active {
    border-color: #5A9E72;
    color: #5A9E72;
  }
</style>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #0a0e1a;
    width: 1080px;
    height: 1080px;
    overflow: hidden;
  }
</style>
</head>
