<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SharpPicks</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0A0D14;color:#E8E9EB;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center}
.logo{margin-bottom:32px;opacity:0.9}
h1{font-size:20px;font-weight:600;letter-spacing:-0.01em;margin-bottom:10px;color:#E8E9EB}
p{font-size:14px;line-height:1.6;color:#8B8F96;max-width:280px;margin-bottom:24px}
.pill{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;background:rgba(90,158,114,0.12);color:#5A9E72;margin-bottom:24px}
button{padding:14px 40px;background:#5A9E72;border:none;border-radius:12px;color:#0A0D14;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:0.02em;-webkit-tap-highlight-color:transparent}
button:active{opacity:0.85}
.sub{font-size:11px;color:#555;margin-top:16px}
</style>
</head>
<body>
<div class="logo">
<svg width="44" height="44" viewBox="0 0 500 500">
<rect x="150" y="100" width="60" height="300" rx="30" fill="#E8E9EB"/>
<rect x="290" y="100" width="60" height="300" rx="30" fill="#E8E9EB"/>
<rect x="150" y="420" width="200" height="20" rx="10" fill="#5A9E72"/>
</svg>
</div>
<div class="pill">Back shortly</div>
<h1>Updating SharpPicks</h1>
<p>We're rolling out an update. This usually takes less than a minute.</p>
<button onclick="location.reload()">Try Again</button>
<div class="sub">Your data and picks are safe.</div>
</body>
</html>
