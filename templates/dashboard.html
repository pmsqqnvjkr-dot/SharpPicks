<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SharpPicks Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0F172A;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        .header {
            text-align: center;
            padding: 40px 0;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #3B82F6, #6366F1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .header p {
            color: #94A3B8;
            font-size: 1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }
        .card {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 16px;
            padding: 28px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        .card-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94A3B8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
        }
        .card-value {
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
        }
        .card-subtitle {
            font-size: 0.875rem;
            color: #64748B;
            margin-top: 12px;
        }
        .progress-container {
            margin-top: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3B82F6, #6366F1);
            border-radius: 5px;
            transition: width 0.6s ease;
        }
        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            color: #64748B;
        }
        .streak-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(99, 102, 241, 0.15));
            border-color: rgba(99, 102, 241, 0.3);
        }
        .streak-display {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .fire-emoji {
            font-size: 2.5rem;
        }
        .streak-message {
            margin-top: 12px;
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            display: inline-block;
            font-size: 0.875rem;
            color: #A5B4FC;
        }
        .health-card {
            grid-column: 1 / -1;
        }
        .health-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .health-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .health-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .health-dot.operational {
            background: #22C55E;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.5);
        }
        .health-dot.warning {
            background: #F59E0B;
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
        }
        .health-dot.error {
            background: #EF4444;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
        }
        .health-info {
            flex: 1;
        }
        .health-name {
            font-weight: 600;
            font-size: 0.875rem;
            color: #fff;
        }
        .health-message {
            font-size: 0.75rem;
            color: #64748B;
            margin-top: 2px;
        }
        .quick-stats {
            grid-column: 1 / -1;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        .stat-item {
            text-align: center;
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }
        .stat-value.positive {
            color: #22C55E;
        }
        .stat-value.negative {
            color: #EF4444;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #64748B;
            margin-top: 4px;
        }
        .refresh-badge {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(30, 41, 59, 0.9);
            padding: 10px 18px;
            border-radius: 24px;
            font-size: 0.75rem;
            color: #64748B;
            border: 1px solid rgba(148, 163, 184, 0.2);
            backdrop-filter: blur(10px);
        }
        .refresh-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #22C55E;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(148, 163, 184, 0.2);
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            .header {
                padding: 24px 0;
            }
            .header h1 {
                font-size: 1.75rem;
            }
            .card-value {
                font-size: 2.25rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .health-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>SharpPicks Dashboard</h1>
            <p>NBA Betting Analysis System</p>
        </header>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <div class="refresh-badge" id="refresh-badge">
        <span class="refresh-dot"></span>
        <span id="last-update">Loading...</span>
    </div>

    <script>
        async function fetchStats() {
            try {
                const response = await fetch('/api/admin/stats');
                const data = await response.json();
                renderDashboard(data);
                document.getElementById('last-update').textContent = 
                    'Updated ' + new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Failed to fetch stats:', error);
            }
        }

        function renderDashboard(stats) {
            const progressPercent = Math.min((stats.gamesWithResults / 50) * 100, 100);
            const streak = stats.collectionStreak;
            const fireCount = streak >= 7 ? 3 : streak >= 3 ? 2 : 1;
            const fireEmojis = '🔥'.repeat(fireCount);
            
            let streakMessage = 'Just getting started';
            if (streak >= 7) streakMessage = 'On fire! Keep it up!';
            else if (streak >= 3) streakMessage = 'Great streak going!';
            else if (streak >= 1) streakMessage = 'Building momentum...';

            const html = `
                <div class="grid">
                    <div class="card">
                        <div class="card-label">Games Collected</div>
                        <div class="card-value">${stats.gamesCollected}</div>
                        <div class="card-subtitle">${stats.gamesWithResults} of 50 with results</div>
                        <div class="progress-container">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progressPercent}%"></div>
                            </div>
                            <div class="progress-text">
                                <span>Progress</span>
                                <span>${progressPercent.toFixed(0)}%</span>
                            </div>
                        </div>
                    </div>

                    <div class="card streak-card">
                        <div class="card-label">Collection Streak</div>
                        <div class="streak-display">
                            <span class="fire-emoji">${fireEmojis}</span>
                            <span class="card-value">${streak}</span>
                        </div>
                        <div class="streak-message">${streakMessage}</div>
                    </div>

                    <div class="card health-card">
                        <div class="card-label">System Health</div>
                        <div class="health-grid">
                            ${stats.systemHealth.map(item => `
                                <div class="health-item">
                                    <div class="health-dot ${item.status}"></div>
                                    <div class="health-info">
                                        <div class="health-name">${item.name}</div>
                                        <div class="health-message">${item.message}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="card quick-stats">
                        <div class="card-label">Performance</div>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-value">${stats.wins}W - ${stats.losses}L</div>
                                <div class="stat-label">Record</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${stats.winRate > 0 ? stats.winRate + '%' : '--'}</div>
                                <div class="stat-label">Win Rate</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value ${stats.totalProfit >= 0 ? 'positive' : 'negative'}">
                                    ${stats.totalProfit !== 0 ? (stats.totalProfit >= 0 ? '+' : '') + '$' + stats.totalProfit.toFixed(2) : '--'}
                                </div>
                                <div class="stat-label">Total Profit</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value ${stats.roi >= 0 ? 'positive' : 'negative'}">
                                    ${stats.roi !== 0 ? stats.roi.toFixed(1) + '%' : '--'}
                                </div>
                                <div class="stat-label">ROI</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        fetchStats();
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
