<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharp Picks Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e7;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: #71717a;
            margin-top: 8px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .card-title {
            font-size: 0.875rem;
            color: #a1a1aa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }
        .card-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
        }
        .card-subtitle {
            font-size: 0.875rem;
            color: #71717a;
            margin-top: 8px;
        }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 16px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        .streak-card {
            background: linear-gradient(135deg, rgba(245,158,11,0.2), rgba(239,68,68,0.2));
            border-color: rgba(245,158,11,0.3);
        }
        .streak-value {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .fire {
            font-size: 2rem;
        }
        .health-grid {
            display: grid;
            gap: 12px;
            margin-top: 16px;
        }
        .health-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .health-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .health-dot.operational {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }
        .health-dot.warning {
            background: #f59e0b;
            box-shadow: 0 0 8px #f59e0b;
        }
        .health-dot.error {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }
        .health-name {
            flex: 1;
            font-weight: 500;
        }
        .health-message {
            font-size: 0.75rem;
            color: #71717a;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .stats-row:last-child {
            border-bottom: none;
        }
        .stats-label {
            color: #a1a1aa;
        }
        .stats-value {
            font-weight: 600;
        }
        .stats-value.positive {
            color: #22c55e;
        }
        .stats-value.negative {
            color: #ef4444;
        }
        .refresh-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #71717a;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .wide-card {
            grid-column: 1 / -1;
        }
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.75rem;
            }
            .card-value {
                font-size: 2rem;
            }
            .container {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        {% raw %}
        const { useState, useEffect } = React;

        function Dashboard() {
            const [stats, setStats] = useState(null);
            const [loading, setLoading] = useState(true);
            const [lastUpdate, setLastUpdate] = useState(null);

            const fetchStats = async () => {
                try {
                    const response = await fetch('/api/admin/stats');
                    const data = await response.json();
                    setStats(data);
                    setLastUpdate(new Date());
                    setLoading(false);
                } catch (error) {
                    console.error('Failed to fetch stats:', error);
                }
            };

            useEffect(() => {
                fetchStats();
                const interval = setInterval(fetchStats, 30000);
                return () => clearInterval(interval);
            }, []);

            if (loading) {
                return (
                    <div className="loading">
                        <div className="spinner"></div>
                    </div>
                );
            }

            const progressPercent = Math.min((stats.gamesWithResults / 50) * 100, 100);
            const streakFires = stats.collectionStreak >= 7 ? 3 : stats.collectionStreak >= 3 ? 2 : 1;

            return (
                <div className="container">
                    <header className="header">
                        <h1>Sharp Picks Dashboard</h1>
                        <p>NBA Betting Analysis System</p>
                    </header>

                    <div className="grid">
                        <div className="card">
                            <div className="card-title">Games Collected</div>
                            <div className="card-value">{stats.gamesCollected}</div>
                            <div className="card-subtitle">
                                {stats.gamesWithResults} / 50 with results ({progressPercent.toFixed(0)}%)
                            </div>
                            <div className="progress-bar">
                                <div 
                                    className="progress-fill" 
                                    style={{ width: `${progressPercent}%` }}
                                ></div>
                            </div>
                        </div>

                        <div className="card streak-card">
                            <div className="card-title">Collection Streak</div>
                            <div className="streak-value">
                                <span className="fire">{'🔥'.repeat(streakFires)}</span>
                                <span className="card-value">{stats.collectionStreak}</span>
                            </div>
                            <div className="card-subtitle">
                                {stats.collectionStreak >= 7 ? 'On fire! Keep it up!' : 
                                 stats.collectionStreak >= 3 ? 'Great streak going!' : 
                                 'Building momentum...'}
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-title">Win Rate</div>
                            <div className="card-value">
                                {stats.winRate > 0 ? `${stats.winRate}%` : '--'}
                            </div>
                            <div className="card-subtitle">
                                {stats.wins}W - {stats.losses}L
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-title">Total Profit</div>
                            <div className={`card-value ${stats.totalProfit >= 0 ? 'positive' : 'negative'}`} 
                                 style={{ color: stats.totalProfit >= 0 ? '#22c55e' : '#ef4444' }}>
                                {stats.totalProfit >= 0 ? '+' : ''}{stats.totalProfit > 0 ? `$${stats.totalProfit.toFixed(2)}` : '--'}
                            </div>
                            <div className="card-subtitle">
                                {stats.roi > 0 ? `${stats.roi.toFixed(1)}% ROI` : 'Start logging bets'}
                            </div>
                        </div>

                        <div className="card wide-card">
                            <div className="card-title">System Health</div>
                            <div className="health-grid">
                                {stats.systemHealth.map((item, index) => (
                                    <div key={index} className="health-item">
                                        <div className={`health-dot ${item.status}`}></div>
                                        <span className="health-name">{item.name}</span>
                                        <span className="health-message">{item.message}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="card wide-card">
                            <div className="card-title">Quick Stats</div>
                            <div className="stats-row">
                                <span className="stats-label">Model Status</span>
                                <span className="stats-value">
                                    {stats.gamesWithResults >= 50 ? '✅ Ready to train' : `⏳ Need ${50 - stats.gamesWithResults} more games`}
                                </span>
                            </div>
                            <div className="stats-row">
                                <span className="stats-label">Last 7 Days Profit</span>
                                <span className={`stats-value ${stats.last7DaysProfit >= 0 ? 'positive' : 'negative'}`}>
                                    {stats.last7DaysProfit !== 0 ? `$${stats.last7DaysProfit.toFixed(2)}` : '--'}
                                </span>
                            </div>
                            <div className="stats-row">
                                <span className="stats-label">Games with Results</span>
                                <span className="stats-value">{stats.gamesWithResults}</span>
                            </div>
                        </div>
                    </div>

                    <div className="refresh-indicator">
                        Last updated: {lastUpdate ? lastUpdate.toLocaleTimeString() : '--'}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard />);
        {% endraw %}
    </script>
</body>
</html>
