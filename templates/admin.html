<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080B11;
  --s0: #0C1018;
  --s1: #111520;
  --s2: #161B27;
  --s3: #1C2230;
  --border: #1A1F2E;
  --green: #5A9E72;
  --g15: rgba(90,158,114,0.15);
  --g08: rgba(90,158,114,0.08);
  --g04: rgba(90,158,114,0.04);
  --red: #C4686B;
  --r15: rgba(196,104,107,0.15);
  --r08: rgba(196,104,107,0.08);
  --amber: #D4A054;
  --a15: rgba(212,160,84,0.15);
  --blue: #6B8EC2;
  --t1: #E2E4E8;
  --t2: #9DA1AC;
  --t3: #626878;
  --t4: #454B5C;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased;max-width:430px;margin:0 auto;min-height:100vh;overflow-x:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(8,11,17,0.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:50}
.topbar-left{display:flex;align-items:center;gap:8px}
.back-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:0;color:var(--t3);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(90,158,114,0.5)}
.sdot.killed{background:var(--red);box-shadow:0 0 6px rgba(196,104,107,0.5)}
.logo{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--t1)}
.logo span{color:var(--green)}
.topbar-ts{font-size:10px;color:var(--t4);text-align:right}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:55px;background:var(--bg);z-index:49}
.tab{padding:11px 14px;font-size:12px;font-weight:500;color:var(--t4);border:0;background:0;cursor:pointer;border-bottom:2px solid transparent;font-family:'JetBrains Mono',monospace;transition:color 0.15s}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab:hover{color:var(--t2)}
.panel{display:none;padding:16px 16px 60px}
.panel.active{display:block}
.sh{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin:24px 0 10px;display:flex;align-items:center;gap:10px}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}
.sh:first-child{margin-top:0}
.sg{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.sg.c4{grid-template-columns:repeat(4,1fr)}
.sg.c3{grid-template-columns:repeat(3,1fr)}
.sc{background:var(--s1);padding:12px 8px;text-align:center}
.sc-label{font-size:8px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:3px}
.sc-val{font-size:20px;font-weight:700;line-height:1.2}
.sc-sub{font-size:9px;color:var(--t4);margin-top:2px;line-height:1.3}
.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.blue{color:var(--blue)}
.commentary{margin:12px 0 20px;padding:12px 14px;background:var(--s1);border:1px solid var(--border);border-radius:8px;position:relative;overflow:hidden}
.commentary::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:8px 8px 0 0}
.commentary.insight::before{background:linear-gradient(90deg,var(--green),transparent 50%);opacity:0.4}
.commentary.warning::before{background:linear-gradient(90deg,var(--amber),transparent 50%);opacity:0.4}
.commentary.alert::before{background:linear-gradient(90deg,var(--red),transparent 50%);opacity:0.4}
.commentary-label{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.commentary-text{font-family:'Inter',sans-serif;font-size:12px;line-height:1.55;color:var(--t2)}
.commentary-text strong{color:var(--t1);font-weight:600}
.pipeline{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px}
.pipe-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pipe-status{display:flex;align-items:center;gap:8px}
.pipe-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(90,158,114,0.4)}
.pipe-title{font-size:12px;font-weight:600;color:var(--t1)}
.pipe-date{font-size:10px;color:var(--t4)}
.pipe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:10px}
.pipe-cell{background:var(--s0);padding:8px 4px;text-align:center}
.pipe-cell-label{font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:2px}
.pipe-cell-val{font-size:14px;font-weight:600}
.pick-card{border-left:2px solid var(--green);padding:8px 12px;background:var(--g04);border-radius:0 6px 6px 0;margin-top:8px}
.pick-name{font-size:12px;font-weight:600;color:var(--green)}
.pick-meta{font-size:10px;color:var(--t4);margin-top:2px}
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px}
.svc{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--s1);border:1px solid var(--border);border-radius:6px;font-size:11px}
.svc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.svc-dot.ok{background:var(--green)}
.svc-dot.warn{background:var(--amber)}
.svc-dot.down{background:var(--red)}
.svc-name{color:var(--t2);flex:1}
.svc-val{color:var(--t4);font-size:10px}
.buckets{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.bkt{display:grid;grid-template-columns:58px 1fr 80px;align-items:center;gap:8px}
.bkt-range{font-size:10px;color:var(--t2);text-align:right}
.bkt-track{height:7px;background:var(--s2);border-radius:4px;overflow:hidden}
.bkt-fill{height:100%;border-radius:4px}
.bkt-fill.great{background:linear-gradient(90deg,#4A8F62,var(--green))}
.bkt-fill.good{background:linear-gradient(90deg,#4A8F62,#7BC493)}
.bkt-fill.mid{background:linear-gradient(90deg,var(--amber),#E0B870)}
.bkt-fill.bad{background:linear-gradient(90deg,#B05558,var(--red))}
.picks{display:flex;flex-direction:column}
.pk{display:grid;grid-template-columns:38px 1fr 28px 24px 44px;align-items:center;gap:4px;padding:8px 0;border-bottom:1px solid rgba(26,31,46,0.4);font-size:10px}
.pk:last-child{border-bottom:0}
.pk-date{color:var(--t4)}
.pk-name{color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pk-edge{color:var(--t3);text-align:center}
.pk-res{text-align:center;font-weight:600}
.pk-pnl{text-align:right;font-weight:600}
.mh{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.mh-name{font-size:13px;font-weight:700;letter-spacing:1px}
.badge{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:4px}
.badge-live{background:var(--g15);color:var(--green);border:1px solid rgba(90,158,114,0.25)}
.badge-beta{background:var(--a15);color:var(--amber);border:1px solid rgba(212,160,84,0.25)}
.badge-shadow{background:rgba(98,104,120,0.1);color:var(--t3);border:1px solid rgba(98,104,120,0.2)}
.divider{height:1px;background:var(--border);margin:28px 0}
.shadow-box{padding:20px;text-align:center;color:var(--t4);font-size:11px;border:1px dashed var(--border);border-radius:8px}
.cron{display:grid;grid-template-columns:10px 1fr auto auto;align-items:center;gap:8px;padding:10px 12px;background:var(--s1);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;font-size:11px}
.cron-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.cron-name{color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cron-when{color:var(--t4);font-size:9px;text-align:right;white-space:nowrap}
.cron-ago{color:var(--green);font-size:9px;text-align:right;white-space:nowrap;min-width:42px}
.sys-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sys-btn{padding:14px 12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);text-align:center;transition:all 0.15s}
.sys-btn .icon{font-size:16px;margin-bottom:4px}
.sys-btn .label{font-size:11px;font-weight:600;margin-bottom:2px}
.sys-btn .sublabel{font-size:9px;color:var(--t4)}
.sys-btn.refresh{background:var(--s1);color:var(--t2)}
.sys-btn.refresh:active{border-color:var(--green);background:var(--g08)}
.sys-btn.kill{background:var(--r08);border-color:rgba(196,104,107,0.2);color:var(--red)}
.sys-btn.kill:active{background:var(--r15)}
.sys-btn.kill.active-kill{background:var(--r15);border-color:var(--red)}
.sys-status{display:flex;justify-content:space-between;font-size:10px;color:var(--t4);padding:0 4px;margin-bottom:20px}
.sys-status .live{color:var(--green)}
.sys-status .killed{color:var(--red)}
.actions{margin-bottom:8px}
.action-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.action-sport{font-size:11px;font-weight:600;color:var(--t2);width:32px}
.action-btn{padding:7px 10px;border-radius:5px;border:1px solid var(--border);background:var(--s1);color:var(--t2);font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer}
.action-btn.primary{border-color:rgba(90,158,114,0.25);color:var(--green)}
.action-btn.danger{border-color:rgba(196,104,107,0.2);color:var(--red)}
.action-spacer{flex:1}
.funnel{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px;background:var(--s1);border:1px solid var(--border);border-radius:8px;margin-bottom:16px}
.funnel-step{text-align:center}
.funnel-num{font-size:22px;font-weight:700}
.funnel-label{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-top:2px}
.funnel-arrow{color:var(--t4);font-size:12px}
.funnel-pct{font-size:10px;font-weight:600;margin:0 2px}
.feat{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:11px}
.feat-name{width:90px;color:var(--t2);text-align:right}
.feat-track{flex:1;height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.feat-fill{height:100%;background:var(--green);border-radius:3px}
.feat-pct{width:40px;color:var(--t3);text-align:right}
.user-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(26,31,46,0.4);font-size:11px}
.user-row:last-child{border-bottom:0}
.user-email{flex:1;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-badge{font-size:8px;font-weight:600;letter-spacing:0.5px;padding:2px 6px;border-radius:3px}
.user-badge.pro{background:var(--g15);color:var(--green)}
.user-badge.founding{background:var(--g15);color:var(--green)}
.user-badge.trial{background:var(--a15);color:var(--amber)}
.user-badge.free{background:rgba(98,104,120,0.1);color:var(--t3)}
.user-date{color:var(--t4);font-size:10px;min-width:40px;text-align:right}
.page-row{display:flex;align-items:baseline;padding:6px 0;border-bottom:1px solid rgba(26,31,46,0.3);font-size:11px}
.page-row:last-child{border-bottom:0}
.page-path{flex:1;color:var(--t2)}
.page-views{color:var(--t3);text-align:right}
.chart-box{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:16px}
.chart-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-bottom:8px}
.chart-area{height:80px;position:relative}
.chart-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--t4);margin-top:4px}
.pipeline-sport-tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--border);border-radius:5px;overflow:hidden;width:fit-content}
.pipeline-sport-tab{padding:6px 14px;font-size:10px;font-weight:500;border:none;background:var(--s1);color:var(--t4);cursor:pointer;font-family:'JetBrains Mono',monospace}
.pipeline-sport-tab.active{background:var(--s2);color:var(--t1)}
.pipeline-panel{display:none}
.pipeline-panel.active{display:block}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.active{display:flex}
.confirm-dialog{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:24px;max-width:340px;width:100%}
.confirm-title{font-size:14px;font-weight:600;margin-bottom:8px}
.confirm-desc{font-family:'Inter',sans-serif;font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:20px}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}
.confirm-btn{padding:8px 16px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;border:none}
.confirm-btn.cancel{background:var(--s2);color:var(--t2);border:1px solid var(--border)}
.confirm-btn.proceed{background:var(--green);color:#080B11}
.confirm-btn.proceed.danger{background:var(--red);color:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.panel.active > *:nth-child(1){animation:fadeUp .3s ease both;animation-delay:.03s}
.panel.active > *:nth-child(2){animation:fadeUp .3s ease both;animation-delay:.06s}
.panel.active > *:nth-child(3){animation:fadeUp .3s ease both;animation-delay:.09s}
.panel.active > *:nth-child(4){animation:fadeUp .3s ease both;animation-delay:.12s}
.panel.active > *:nth-child(5){animation:fadeUp .3s ease both;animation-delay:.15s}
.panel.active > *:nth-child(6){animation:fadeUp .3s ease both;animation-delay:.18s}
.panel.active > *:nth-child(7){animation:fadeUp .3s ease both;animation-delay:.21s}
.panel.active > *:nth-child(8){animation:fadeUp .3s ease both;animation-delay:.24s}
.panel.active > *:nth-child(9){animation:fadeUp .3s ease both;animation-delay:.27s}
.panel.active > *:nth-child(10){animation:fadeUp .3s ease both;animation-delay:.3s}
.panel.active > *:nth-child(11){animation:fadeUp .3s ease both;animation-delay:.33s}
.panel.active > *:nth-child(12){animation:fadeUp .3s ease both;animation-delay:.36s}
.panel.active > *:nth-child(13){animation:fadeUp .3s ease both;animation-delay:.39s}
.panel.active > *:nth-child(14){animation:fadeUp .3s ease both;animation-delay:.42s}
@keyframes killPulse{0%,100%{opacity:1}50%{opacity:0.4}}
.kill-pulse{animation:killPulse 1.5s ease-in-out infinite}
</style>
</head>
<body>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-actions">
      <button class="confirm-btn cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-btn proceed" id="confirmProceed" onclick="executeConfirm()">Run</button>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="window.location.href='/'">&#8592;</button>
    <div class="sdot" id="statusDot"></div>
    <div class="logo">SHARP <span>||</span> PICKS</div>
  </div>
  <div class="topbar-ts" id="topbarTime"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="go('pulse',this)">Pulse</button>
  <button class="tab" onclick="go('models',this)">Models</button>
  <button class="tab" onclick="go('infra',this)">Infra</button>
  <button class="tab" onclick="go('business',this)">Business</button>
</div>

<div class="panel active" id="p-pulse">
  <div id="pulseContent" style="color:var(--t4)">Loading...</div>
</div>

<div class="panel" id="p-models">
  <div id="modelsContent" style="color:var(--t4)">Loading...</div>
</div>

<div class="panel" id="p-infra">
  <div id="infraContent" style="color:var(--t4)">Loading...</div>
</div>

<div class="panel" id="p-business">
  <div id="businessContent" style="color:var(--t4)">Loading...</div>
</div>

<script>
const CRON_SECRET = '{{ cron_secret }}';
let pendingAction = null;
let killActive = false;

function go(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('p-' + id).classList.add('active');
  btn.classList.add('active');
}

function switchPipeline(sport, el) {
  el.parentElement.querySelectorAll('.pipeline-sport-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.pipeline-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('pipe-' + sport).classList.add('active');
}

function showConfirm(title, desc, actionLabel, isDanger, actionUrl) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmDesc').textContent = desc;
  const btn = document.getElementById('confirmProceed');
  btn.textContent = actionLabel;
  btn.className = 'confirm-btn proceed' + (isDanger ? ' danger' : '');
  pendingAction = actionUrl;
  document.getElementById('confirmOverlay').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
  pendingAction = null;
}

async function executeConfirm() {
  if (pendingAction) {
    const url = pendingAction;
    closeConfirm();
    if (url === '__kill_switch__') {
      await doKillSwitch();
    } else {
      await runAction(url);
    }
  } else {
    closeConfirm();
  }
}

async function runAction(url) {
  try {
    const r = await fetch(url, { method: 'POST', headers: { 'X-Cron-Secret': CRON_SECRET } });
    const d = await r.json();
    alert(JSON.stringify(d, null, 2));
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function doKillSwitch() {
  try {
    const r = await fetch('/api/public/kill-switch');
    const d = await r.json();
    killActive = !!d.killed;
    updateKillUI();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function toggleKillSwitch() {
  if (killActive) {
    showConfirm('Deactivate Kill Switch?', 'This will re-enable pick publishing. The model will resume generating signals for users.', 'Deactivate', false, '__kill_switch__');
  } else {
    showConfirm('Activate Kill Switch?', 'This will prevent all pick signals from being published. The model will continue running but picks will not be pushed to users. Manual reactivation required.', 'Activate', true, '__kill_switch__');
  }
}

function updateKillUI() {
  const dot = document.getElementById('statusDot');
  const killBtn = document.getElementById('killBtn');
  const statusLabel = document.getElementById('sysStatusLabel');
  if (killActive) {
    dot.className = 'sdot killed kill-pulse';
    if (killBtn) {
      killBtn.className = 'sys-btn kill active-kill';
      killBtn.querySelector('.label').textContent = 'Kill Switch ACTIVE';
      killBtn.querySelector('.sublabel').textContent = 'Tap to deactivate';
    }
    if (statusLabel) statusLabel.innerHTML = 'Status: <span class="killed">KILLED</span>';
  } else {
    dot.className = 'sdot';
    if (killBtn) {
      killBtn.className = 'sys-btn kill';
      killBtn.querySelector('.label').textContent = 'Kill Switch';
      killBtn.querySelector('.sublabel').textContent = 'Disable picks';
    }
    if (statusLabel) statusLabel.innerHTML = 'Status: <span class="live">LIVE</span>';
  }
}

function updateClock() {
  const now = new Date();
  const et = now.toLocaleString('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric' });
  const time = now.toLocaleString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit', hour12: true });
  document.getElementById('topbarTime').innerHTML = et + ' at<br>' + time;
}

function timeAgo(isoStr) {
  if (!isoStr) return '--';
  const d = new Date(isoStr);
  const now = new Date();
  const mins = Math.floor((now - d) / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return mins + 'm';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h';
  return Math.floor(hrs / 24) + 'd';
}

function commaFmt(n) { return (n || 0).toLocaleString(); }

function roiSign(v) { return v > 0 ? '+' + v : '' + v; }

function fmtDate(d) {
  if (!d) return '--';
  const parts = d.split('-');
  return parts.length >= 3 ? parts[1] + '-' + parts[2] : d;
}

function commentaryHtml(type, label, text) {
  const icons = { insight: '&#9670;', warning: '&#9888;', alert: '&#9679;' };
  return '<div class="commentary ' + type + '"><div class="commentary-label">' + (icons[type] || '&#9670;') + ' ' + label + '</div><div class="commentary-text">' + text + '</div></div>';
}

function bucketFillClass(rate) {
  if (rate >= 65) return 'great';
  if (rate >= 50) return 'good';
  if (rate >= 40) return 'mid';
  return 'bad';
}

function bucketRateColor(rate) {
  if (rate >= 50) return 'green';
  if (rate >= 40) return 'amber';
  return 'red';
}

function bucketRowHtml(range, record, rate) {
  const noData = record === '0-0';
  const rateStr = noData ? '--' : rate + '%';
  const colorClass = noData ? '' : bucketRateColor(rate);
  const fillClass = noData ? '' : bucketFillClass(rate);
  const width = noData ? 0 : rate;
  return '<div class="bkt"><div class="bkt-range">' + range + '</div><div class="bkt-track"><div class="bkt-fill ' + fillClass + '" style="width:' + width + '%"></div></div><div class="bkt-result">' + record + ' <span class="' + colorClass + '">(' + rateStr + ')</span></div></div>';
}

function pickRowHtml(p) {
  const isW = p.result === 'win';
  const isL = p.result === 'loss';
  const rLabel = isW ? 'W' : (isL ? 'L' : '--');
  const rColor = isW ? 'color:var(--green)' : (isL ? 'color:var(--red)' : 'color:var(--t4)');
  const pnl = p.pnl != null ? (p.pnl > 0 ? '+' + p.pnl : '' + p.pnl) : '--';
  const pnlColor = p.pnl > 0 ? 'color:var(--green)' : (p.pnl < 0 ? 'color:var(--red)' : 'color:var(--t4)');
  return '<div class="pk"><span class="pk-date">' + fmtDate(p.date) + '</span><span class="pk-name">' + (p.side || '--') + '</span><span class="pk-edge">' + (p.edge || '--') + '%</span><span class="pk-res" style="' + rColor + '">' + rLabel + '</span><span class="pk-pnl" style="' + pnlColor + '">' + pnl + '</span></div>';
}

function svcDot(health, key) {
  const s = health[key];
  if (!s) return 'background:var(--t4)';
  if (s.status === 'ok') return 'background:var(--green)';
  if (s.status === 'warn') return 'background:var(--amber)';
  return 'background:var(--red)';
}

function svcLatency(health, key, fallback) {
  const s = health[key];
  if (!s) return fallback || '--';
  if (s.latency_ms != null) return s.latency_ms + 'ms';
  return fallback || (s.status === 'ok' ? 'OK' : '--');
}

function cleanCronName(name) {
  return (name || '').replace(/^SP\s*[-–—]\s*/i, '').replace(/^SP\s+/i, '');
}

// Client-side commentary computation
function computePulseCommentary(cc) {
  const c = cc.commentary?.pulse?.[0];
  if (c) return c;
  return { type: 'insight', label: 'Daily Read', text: 'Loading data...' };
}

function computeNbaCommentary(cc) {
  const c = cc.commentary?.nba?.[0];
  if (c) return c;
  return { type: 'insight', label: 'NBA Model Read', text: '' };
}

function computeMlbCommentary(cc) {
  const c = cc.commentary?.mlb?.[0];
  if (c) return c;
  return { type: 'warning', label: 'MLB Model Read', text: '' };
}

function computeRevenueCommentary(cc) {
  const c = cc.commentary?.revenue?.[0];
  if (c) return c;
  return { type: 'insight', label: 'Revenue Read', text: '' };
}

function computeInfraCommentary(cronData) {
  if (!cronData || !cronData.jobs) return { type: 'insight', label: 'Infra Note', text: 'No cron data available.' };
  const jobs = cronData.jobs;
  const okCount = jobs.filter(j => j.health === 'ok').length;
  const failedJobs = jobs.filter(j => ['failed', 'error', 'down'].includes(j.health));
  const parts = [];
  let type = 'insight';
  if (failedJobs.length > 0) {
    type = 'alert';
    parts.push('<strong>' + cleanCronName(failedJobs[0].name) + ' failed.</strong> Check logs.');
  } else if (okCount === jobs.length) {
    parts.push('All <strong>' + jobs.length + '</strong> cron jobs healthy.');
  }
  const ambJobs = jobs.filter(j => j.health === 'warn' || j.health === 'amber');
  for (const j of ambJobs.slice(0, 2)) {
    const n = cleanCronName(j.name);
    if (n.toLowerCase().includes('refresh') || n.toLowerCase().includes('closing')) {
      parts.push('<strong>' + n + '</strong> show amber because they last ran ' + Math.round(j.hours_ago || 0) + 'h ago (expected -- they only fire during game windows).');
      if (type === 'insight') type = 'warning';
    }
  }
  if (failedJobs.length === 0) parts.push('No failed jobs in the last 7 days.');
  return { type, label: 'Infra Note', text: parts.join(' ') };
}

function computeEngagementCommentary(eng, totalUsers) {
  if (!eng) return { type: 'insight', label: 'Engagement Read', text: 'No engagement data.' };
  const active = eng.active_users_7d || 0;
  const total = totalUsers || 0;
  const parts = [];
  let type = 'insight';
  if (total > 0) {
    const rate = (active / total * 100).toFixed(1);
    if (rate < 30) type = 'warning';
    if (rate < 25) {
      parts.push('<strong>' + active + ' active users out of ' + total + ' signups = ' + rate + '% activation rate.</strong> That\'s the number to watch.');
    } else if (rate <= 50) {
      parts.push('Activation at <strong>' + rate + '%</strong>. Improving but not yet healthy.');
    } else {
      parts.push('Activation at <strong>' + rate + '%</strong>. Healthy.');
    }
  }
  const spu = eng.avg_sessions_per_user || 0;
  if (spu > 30) parts.push('Users who do engage are deeply engaged -- <strong>' + spu.toFixed(1) + '</strong> sessions per user over 7 days is unusually high.');
  const ret = eng.retention || {};
  const d1 = ret.d1_rate_pct || 0;
  const d7 = ret.d7_rate_pct || 0;
  const d7Elig = ret.d7_eligible || 0;
  if (d1 > 0) {
    if (d1 < 45) {
      parts.push('<strong>D1 at ' + d1 + '%</strong> means more than half of new signups don\'t return the next day. Onboarding flow or first-session value may need work.');
      if (d1 < 40) type = 'warning';
    } else {
      parts.push('D1 retention at <strong>' + d1 + '%</strong> -- acceptable for early stage.');
    }
  }
  if (d7 > 0 || d7Elig > 0) {
    const tiny = d7Elig < 5 ? ' but the sample is tiny (<strong>' + d7Elig + '</strong>).' : '.';
    if (d7 > 60) parts.push('<strong>D7 retention at ' + d7 + '%</strong> is excellent' + tiny);
    else if (d7 < 40) { parts.push('<strong>D7 retention at ' + d7 + '%</strong> is a red flag' + tiny); type = 'alert'; }
    else parts.push('D7 retention at <strong>' + d7 + '%</strong>' + tiny);
  }
  if (eng.sessions_by_day && eng.sessions_by_day.length >= 3) {
    const vals = eng.sessions_by_day.map(d => d.sessions || d.count || 0);
    let run = 1;
    for (let i = vals.length - 1; i > 0; i--) {
      if (vals[i] < vals[i-1]) run++; else break;
    }
    if (run >= 3) { parts.push('Sessions trending down over the last <strong>' + run + '</strong> days.'); if (type === 'insight') type = 'warning'; }
  }
  return { type, label: 'Engagement Read', text: parts.join(' ') || 'Insufficient engagement data.' };
}

function computeFeatureCommentary(eng) {
  if (!eng || !eng.feature_adoption) return { type: 'insight', label: 'Feature Note', text: 'No feature data.' };
  const fa = eng.feature_adoption;
  const parts = [];
  let type = 'insight';
  const journal = (fa.view_article || {}).pct_of_active || 0;
  const scan = (fa.view_market_scan || {}).pct_of_active || 0;
  const bet = (fa.tap_bet_link || {}).pct_of_active || 0;
  if (journal > scan && (journal || scan)) parts.push('<strong>Journal is the most-used feature</strong> at ' + journal + '%, outpacing the core signals product. This is good for retention (content keeps people coming back) but raises the question: are users discovering and engaging with the actual picks?');
  if (bet < 25 && (eng.active_users_7d || 0) > 0) { parts.push('<strong>Bet Link Taps at ' + bet + '%</strong> -- only ' + Math.round(bet / 100 * (eng.active_users_7d || 1)) + ' of ' + (eng.active_users_7d || 0) + ' active users are tapping through to place bets. The gap between reading signals and acting on them may be a trust or UX issue.'); type = 'warning'; }
  else if (bet > 40) parts.push('Bet link taps at <strong>' + bet + '%</strong> -- users are acting on signals.');
  return { type, label: 'Feature Note', text: parts.join(' ') || 'No feature usage patterns detected.' };
}

function computeTrafficCommentary(cf, totalSignups) {
  if (!cf || !cf.marketing) return null;
  const m = cf.marketing;
  const visitors = m.uniques || 0;
  const views = m.pageViews || 0;
  const ppv = visitors > 0 ? (views / visitors).toFixed(1) : '0';
  const parts = ['<strong>' + visitors + ' unique visitors over 7 days</strong> with a ' + ppv + ' pages/visit average.'];
  if (totalSignups > 0 && visitors > 0) {
    const conv = (totalSignups / visitors * 100).toFixed(0);
    parts.push('Conversion from landing visit to signup is running at roughly <strong>' + conv + '%</strong> (' + totalSignups + ' signups / ~' + visitors + ' visitors).');
    if (conv > 20) parts.push('Strong for a cold launch with no paid acquisition.');
  }
  return { type: 'insight', label: 'Traffic Note', text: parts.join(' ') };
}

async function loadData() {
  updateClock();
  setInterval(updateClock, 30000);
  try {
    const [ccR, healthR, cronR, funnelR, engR, cfR] = await Promise.all([
      fetch('/api/admin/command-center').then(r => r.json()).catch(() => null),
      fetch('/api/admin/health-checks').then(r => r.json()).catch(() => null),
      fetch('/api/admin/cron-health').then(r => r.json()).catch(() => null),
      fetch('/api/admin/funnel-metrics').then(r => r.json()).catch(() => null),
      fetch('/api/admin/engagement').then(r => r.json()).catch(() => null),
      fetch('/api/admin/cf-analytics').then(r => r.json()).catch(() => null),
    ]);
    renderPulse(ccR, healthR, cfR);
    renderModels(ccR);
    renderInfra(cronR, healthR, ccR);
    renderBusiness(ccR, funnelR, engR);
  } catch (e) {
    console.error('Load failed:', e);
  }
}

function renderPulse(cc, health, cf) {
  if (!cc) { document.getElementById('pulseContent').textContent = 'Failed to load'; return; }
  const nba = cc.model || {};
  const mlb = cc.mlb_model || {};
  const rev = cc.revenue || {};
  const push = cc.push || {};
  let h = '';

  h += '<div class="sg c4">';
  h += '<div class="sc"><div class="sc-label">NBA</div><div class="sc-val">' + (nba.record || '0-0') + '</div><div class="sc-sub green">' + roiSign(nba.roi || 0) + '% ROI</div></div>';
  h += '<div class="sc"><div class="sc-label">MLB</div><div class="sc-val">' + (mlb.record || '0-0') + '</div><div class="sc-sub green">' + roiSign(mlb.roi || 0) + '% ROI</div></div>';
  h += '<div class="sc"><div class="sc-label">MRR</div><div class="sc-val green">$' + (rev.mrr || 0) + '</div><div class="sc-sub">$' + (rev.arr || 0) + ' ARR</div></div>';
  h += '<div class="sc"><div class="sc-label">Users</div><div class="sc-val">' + (cc.users?.total || 0) + '</div><div class="sc-sub">' + (push.active_7d || 0) + ' active 7d</div></div>';
  h += '</div>';

  const pulseC = computePulseCommentary(cc);
  h += commentaryHtml(pulseC.type, pulseC.label, pulseC.text);

  h += '<div class="sh">Today\'s Pipeline</div>';
  h += '<div class="pipeline-sport-tabs"><button class="pipeline-sport-tab active" onclick="switchPipeline(\'nba\',this)">NBA</button><button class="pipeline-sport-tab" onclick="switchPipeline(\'mlb\',this)">MLB</button></div>';
  h += '<div class="pipeline-panel active" id="pipe-nba">' + renderPipeline(nba, cc.recent_picks || [], 'nba') + '</div>';
  h += '<div class="pipeline-panel" id="pipe-mlb">' + renderPipeline(mlb, cc.mlb_recent_picks || [], 'mlb') + '</div>';

  h += '<div class="sh">Services</div>';
  h += renderServicesGrid(health);

  if (cf && cf.marketing) {
    h += '<div class="sh">Landing Traffic (7d)</div>';
    h += renderTrafficChart(cf);
    const tc = computeTrafficCommentary(cf, cc.users?.total || 0);
    if (tc) h += commentaryHtml(tc.type, tc.label, tc.text);
  }

  document.getElementById('pulseContent').innerHTML = h;
}

function renderPipeline(stats, picks, sport) {
  const runs = stats.model_runs || [];
  const lastRun = runs[0];
  const todayPick = picks.length > 0 ? picks[0] : null;
  const hasPick = todayPick && todayPick.result !== 'pass';
  let p = '<div class="pipeline">';

  if (hasPick) {
    const dur = lastRun?.duration_ms ? (lastRun.duration_ms / 1000).toFixed(1) : '--';
    const games = lastRun?.games_analyzed || '--';
    const edge = todayPick.edge ? '+' + todayPick.edge + '%' : '--';
    p += '<div class="pipe-top"><div class="pipe-status"><div class="pipe-dot"></div><div class="pipe-title">Pick Published</div></div><div class="pipe-date">' + (lastRun?.date || '') + '</div></div>';
    p += '<div class="pipe-grid"><div class="pipe-cell"><div class="pipe-cell-label">Games</div><div class="pipe-cell-val" style="color:var(--t1)">' + games + '</div></div><div class="pipe-cell"><div class="pipe-cell-label">Result</div><div class="pipe-cell-val green">PICK</div></div><div class="pipe-cell"><div class="pipe-cell-label">Edge</div><div class="pipe-cell-val green">' + edge + '</div></div><div class="pipe-cell"><div class="pipe-cell-label">Duration</div><div class="pipe-cell-val" style="color:var(--t2)">' + dur + 's</div></div></div>';
    p += '<div class="pick-card"><div class="pick-name">' + (todayPick.side || '--') + '</div><div class="pick-meta">' + sport.toUpperCase() + ' &middot; Edge ' + edge + ' &middot; Book ' + (todayPick.sportsbook || '--') + '</div></div>';
  } else if (lastRun && lastRun.pick_generated === false) {
    const dur = lastRun.duration_ms ? (lastRun.duration_ms / 1000).toFixed(1) : '--';
    p += '<div class="pipe-top"><div class="pipe-status"><div class="pipe-dot" style="background:var(--amber)"></div><div class="pipe-title">Pass Day</div></div></div>';
    p += '<div class="pipe-grid"><div class="pipe-cell"><div class="pipe-cell-label">Games</div><div class="pipe-cell-val" style="color:var(--t1)">' + (lastRun.games_analyzed || '--') + '</div></div><div class="pipe-cell"><div class="pipe-cell-label">Result</div><div class="pipe-cell-val" style="color:var(--amber)">PASS</div></div><div class="pipe-cell"><div class="pipe-cell-label">Edge</div><div class="pipe-cell-val" style="color:var(--t4)">--</div></div><div class="pipe-cell"><div class="pipe-cell-label">Duration</div><div class="pipe-cell-val" style="color:var(--t2)">' + dur + 's</div></div></div>';
  } else {
    p += '<div class="pipe-top"><div class="pipe-status"><div class="pipe-dot" style="background:var(--t4)"></div><div class="pipe-title">Awaiting Model Run</div></div></div>';
  }
  p += '</div>';
  return p;
}

function renderServicesGrid(health) {
  if (!health) return '<div class="svc-grid"><div class="svc"><div class="svc-dot" style="background:var(--t4)"></div><span class="svc-name">Loading...</span></div></div>';
  const odds = health.odds_api || {};
  const espn = health.espn || {};
  const stripe = health.stripe || {};
  const resendH = health.resend || {};
  let g = '<div class="svc-grid">';
  g += '<div class="svc"><div class="svc-dot" style="' + svcDot(health, 'postgresql') + '"></div><span class="svc-name">PostgreSQL</span><span class="svc-val">' + svcLatency(health, 'postgresql') + '</span></div>';
  g += '<div class="svc"><div class="svc-dot" style="' + svcDot(health, 'odds_api') + '"></div><span class="svc-name">Odds API</span><span class="svc-val">' + svcLatency(health, 'odds_api', (odds.requests_remaining || '--') + ' left') + '</span></div>';
  g += '<div class="svc"><div class="svc-dot" style="' + svcDot(health, 'balldontlie') + '"></div><span class="svc-name">balldontlie</span><span class="svc-val">' + svcLatency(health, 'balldontlie') + '</span></div>';

  g += '<div class="svc"><div class="svc-dot" style="' + svcDot(health, 'stripe') + '"></div><span class="svc-name">Stripe</span><span class="svc-val">' + (stripe.mode || 'live') + '</span></div>';
  g += '<div class="svc"><div class="svc-dot" style="' + svcDot(health, 'resend') + '"></div><span class="svc-name">Resend</span><span class="svc-val">' + (resendH.verified || '--') + '/' + (resendH.domains || '--') + '</span></div>';
  g += '</div>';
  return g;
}

function renderTrafficChart(cf) {
  const m = cf.marketing || {};
  const daily = m.daily || [];
  const visitors = m.uniques || 0;
  const views = m.pageViews || 0;
  const ppv = visitors > 0 ? (views / visitors).toFixed(1) : '0';
  const topPath = (m.topPaths && m.topPaths[0]) || {};

  let h = '<div class="chart-box">';
  h += '<div style="display:flex;justify-content:space-between;margin-bottom:8px">';
  h += '<div style="text-align:center"><div style="font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t4)">Visitors</div><div style="font-size:18px;font-weight:700;color:var(--t1)">' + visitors + '</div><div style="font-size:9px;color:var(--t4)">last 7d</div></div>';
  h += '<div style="text-align:center"><div style="font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t4)">Views</div><div style="font-size:18px;font-weight:700;color:var(--t1)">' + views + '</div><div style="font-size:9px;color:var(--t4)">' + ppv + '/visit</div></div>';
  h += '<div style="text-align:center"><div style="font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t4)">Top Page</div><div style="font-size:14px;font-weight:600;color:var(--t2)">' + (topPath.path || '/') + '</div><div style="font-size:9px;color:var(--t4)">' + (topPath.count || 0) + ' views</div></div>';
  h += '</div>';

  if (daily.length > 1) {
    const vals = daily.map(d => d.uniques || d.views || 0);
    const maxVal = Math.max(...vals, 1);
    const width = 340;
    const height = 80;
    const step = width / (vals.length - 1);
    let points = vals.map((v, i) => (i * step) + ',' + (height - (v / maxVal * (height - 10) + 5))).join(' ');
    let polyPoints = '0,' + height + ' ' + points + ' ' + width + ',' + height;
    const lastX = (vals.length - 1) * step;
    const lastY = height - (vals[vals.length - 1] / maxVal * (height - 10) + 5);
    h += '<div class="chart-area"><svg width="100%" height="80" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none"><polygon points="' + polyPoints + '" fill="rgba(90,158,114,0.06)"/><polyline points="' + points + '" fill="none" stroke="#5A9E72" stroke-width="1.5"/><circle cx="' + lastX + '" cy="' + lastY + '" r="3" fill="#5A9E72"/></svg></div>';
    h += '<div class="chart-labels">';
    for (const d of daily) {
      const label = d.date ? d.date.slice(5).replace('-', '/') : '';
      h += '<span>' + label + '</span>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

  h += '<div class="sc"><div class="sc-label">Edge</div><div class="sc-val">' + (mlb.avg_edge || 0) + '</div><div class="sc-sub">CLV+ ' + (mlb.clv_pct || 0) + '%</div></div>';
  h += '</div>';

  if (mlbC.text) h += commentaryHtml(mlbC.type, mlbC.label, mlbC.text);

  const mlbRecs = mlb.buckets || {};
  if (Object.keys(mlbRates).length > 0 || Object.keys(mlbRecs).length > 0) {
    h += '<div class="sh">Confidence Buckets</div><div class="buckets">';
    for (const range of bucketOrder) {
      const rate = mlbRates[range] || 0;
      const record = mlbRecs[range] || '0-0';
      h += bucketRowHtml(range, record, rate);
    }
    h += '</div>';
  }

  const mlbPicks = cc.mlb_recent_picks || [];
  if (mlbPicks.length > 0) {
    h += '<div class="sh">Recent Picks</div><div class="picks">';
    for (const p of mlbPicks.slice(0, 6)) h += pickRowHtml(p);
    h += '</div>';
  }

  h += '<div class="divider"></div>';
  h += '<div class="mh"><span class="mh-name">WNBA</span><span class="badge badge-shadow">Shadow</span></div>';
  h += '<div class="shadow-box">Shadow mode active. No picks published.<br><span style="font-size:9px;margin-top:4px;display:inline-block">Collecting data for 2026 season evaluation</span></div>';

  document.getElementById('modelsContent').innerHTML = h;
}

function renderInfra(cronData, health, cc) {
  let h = '';

  h += '<div class="sh" style="margin-top:0">System Controls</div>';
  h += '<div class="sys-controls">';
  h += '<div class="sys-btn refresh" onclick="refreshAll()"><div class="icon">&#8635;</div><div class="label">Refresh</div><div class="sublabel">Reload all data</div></div>';
  h += '<div class="sys-btn kill" id="killBtn" onclick="toggleKillSwitch()"><div class="icon">&#9888;</div><div class="label">Kill Switch</div><div class="sublabel">Disable picks</div></div>';
  h += '</div>';
  h += '<div class="sys-status"><span id="sysStatusLabel">Status: <span class="live">LIVE</span></span><span>Deploy: Apr 1</span></div>';

  h += '<div class="sh">Pipeline Controls</div>';
  h += '<div class="actions">';
  h += '<div class="action-row"><span class="action-sport">NBA</span>';
  h += '<button class="action-btn" onclick="runAction(\'/api/cron/collect-games\')">Games</button>';
  h += '<button class="action-btn" onclick="runAction(\'/api/cron/refresh-lines\')">Lines</button>';
  h += '<span class="action-spacer"></span>';
  h += '<button class="action-btn danger" onclick="showConfirm(\'Clear NBA?\',\'Reset today\\\'s NBA pipeline data.\',\'Clear\',true,\'/api/cron/run-model?sport=nba&clear=true\')">Clear</button>';
  h += '<button class="action-btn primary" onclick="showConfirm(\'Run NBA Model?\',\'Execute model pipeline for today\\\'s NBA games.\',\'Run\',false,\'/api/cron/run-model?force=true\')">Run</button>';
  h += '<button class="action-btn primary" onclick="showConfirm(\'Grade NBA?\',\'Grade all pending NBA picks.\',\'Grade\',false,\'/api/cron/grade-picks\')">Grade</button>';
  h += '</div>';
  h += '<div class="action-row"><span class="action-sport">MLB</span>';
  h += '<button class="action-btn" onclick="runAction(\'/api/cron/mlb-collect\')">Collect</button>';
  h += '<span class="action-spacer"></span>';
  h += '<button class="action-btn danger" onclick="showConfirm(\'Clear MLB?\',\'Reset today\\\'s MLB pipeline data.\',\'Clear\',true,\'/api/cron/mlb-run-model?clear=true\')">Clear</button>';
  h += '<button class="action-btn primary" onclick="showConfirm(\'Run MLB Model?\',\'Execute MLB model pipeline.\',\'Run\',false,\'/api/cron/mlb-run-model?force=true\')">Run</button>';
  h += '<button class="action-btn primary" onclick="showConfirm(\'Grade MLB?\',\'Grade pending MLB picks.\',\'Grade\',false,\'/api/cron/mlb-grade\')">Grade</button>';
  h += '</div>';
  h += '</div>';

  if (cronData && cronData.jobs) {
    const jobs = cronData.jobs;
    const okCount = jobs.filter(j => j.health === 'ok').length;
    h += '<div class="sh">Cron Jobs &middot; ' + okCount + ' Healthy</div>';
    for (const job of jobs) {
      const dotColor = job.health === 'ok' ? 'var(--green)' : (job.health === 'warn' || job.health === 'amber' ? 'var(--amber)' : 'var(--red)');
      const agoColor = job.health === 'ok' ? 'var(--green)' : (job.health === 'error' || job.health === 'failed' ? 'var(--red)' : 'var(--amber)');
      const ago = job.hours_ago != null ? (job.hours_ago < 1 ? Math.round(job.hours_ago * 60) + 'm' : Math.round(job.hours_ago) + 'h') : '--';
      h += '<div class="cron"><div class="cron-dot" style="background:' + dotColor + '"></div><div class="cron-name">' + cleanCronName(job.name) + '</div><div class="cron-when">' + (job.schedule || '') + '</div><div class="cron-ago" style="color:' + agoColor + '">' + ago + '</div></div>';
    }
  }

  const infraC = computeInfraCommentary(cronData);
  h += commentaryHtml(infraC.type, infraC.label, infraC.text);

  document.getElementById('infraContent').innerHTML = h;
  updateKillUI();
}

function renderBusiness(cc, funnel, eng) {
  if (!cc) { document.getElementById('businessContent').textContent = 'Failed to load'; return; }
  const rev = cc.revenue || {};
  let h = '';

  h += '<div class="sg c3">';
  h += '<div class="sc"><div class="sc-label">MRR</div><div class="sc-val green">$' + (rev.mrr || 0) + '</div><div class="sc-sub">+$0 vs 30d</div></div>';
  h += '<div class="sc"><div class="sc-label">ARR</div><div class="sc-val">$' + (rev.arr || 0) + '</div><div class="sc-sub">projected</div></div>';
  h += '<div class="sc"><div class="sc-label">Founding</div><div class="sc-val green">' + (rev.founding_count || 0) + '/' + (rev.founding_cap || 50) + '</div><div class="sc-sub">' + ((rev.founding_cap || 50) - (rev.founding_count || 0)) + ' remaining</div></div>';
  h += '</div>';

  if (funnel) {
    const total = funnel.total_signups || 0;
    const paid = funnel.total_paid || 0;
    const rate = total > 0 ? (paid / total * 100).toFixed(1) : 0;
    const rateColor = rate > 15 ? 'green' : (rate >= 5 ? 'amber' : 'red');
    h += '<div class="sh">Conversion</div>';
    h += '<div class="funnel">';
    h += '<div class="funnel-step"><div class="funnel-num" style="color:var(--t1)">' + total + '</div><div class="funnel-label">Signups</div></div>';
    h += '<div class="funnel-arrow">&#8594;</div>';
    h += '<div class="funnel-pct ' + rateColor + '">' + rate + '%</div>';
    h += '<div class="funnel-arrow">&#8594;</div>';
    h += '<div class="funnel-step"><div class="funnel-num green">' + paid + '</div><div class="funnel-label">Paid</div></div>';
    h += '</div>';
  }

  const revC = computeRevenueCommentary(cc);
  if (revC.text) h += commentaryHtml(revC.type, revC.label, revC.text);

  h += '<div class="sh">Subscribers</div>';
  h += '<div class="sg c4">';
  h += '<div class="sc"><div class="sc-label">Paid</div><div class="sc-val green">' + ((rev.monthly_subs || 0) + (rev.annual_subs || 0)) + '</div></div>';
  h += '<div class="sc"><div class="sc-label">Trial</div><div class="sc-val amber">' + (rev.trial_count || 0) + '</div></div>';
  h += '<div class="sc"><div class="sc-label">Free</div><div class="sc-val" style="color:var(--t2)">' + (rev.free_count || 0) + '</div></div>';
  h += '<div class="sc"><div class="sc-label">Founding</div><div class="sc-val green">' + (rev.founding_count || 0) + '</div></div>';
  h += '</div>';

  if (eng) {
    const ret = eng.retention || {};
    const avgDur = eng.avg_session_duration;
    let durStr = '--';
    if (avgDur != null) {
      const m = Math.floor(avgDur / 60);
      const s = Math.round(avgDur % 60);
      durStr = m + 'm ' + s + 's';
    }

    h += '<div class="sh">Engagement (7D)</div>';
    h += '<div class="sg c3">';
    h += '<div class="sc"><div class="sc-label">Active</div><div class="sc-val">' + (eng.active_users_7d || 0) + '</div><div class="sc-sub">' + commaFmt(eng.total_events) + ' events</div></div>';
    h += '<div class="sc"><div class="sc-label">Sessions</div><div class="sc-val">' + (eng.total_sessions_7d || 0) + '</div><div class="sc-sub">' + (eng.avg_sessions_per_user || '--') + '/user</div></div>';
    h += '<div class="sc"><div class="sc-label">Avg Duration</div><div class="sc-val" style="font-size:16px">' + durStr + '</div><div class="sc-sub">' + (eng.avg_pages_per_session || '--') + ' pages</div></div>';
    h += '</div>';

    if (eng.sessions_by_day && eng.sessions_by_day.length > 0) {
      h += renderSessionsChart(eng.sessions_by_day);
    }

    h += '<div class="sg c3">';
    h += '<div class="sc"><div class="sc-label">D1 Retention</div><div class="sc-val amber">' + (ret.d1_rate_pct || 0) + '%</div><div class="sc-sub">' + (ret.d1_returned || 0) + '/' + (ret.d1_eligible || 0) + '</div></div>';
    h += '<div class="sc"><div class="sc-label">D7 Retention</div><div class="sc-val green">' + (ret.d7_rate_pct || 0) + '%</div><div class="sc-sub">' + (ret.d7_returned || 0) + '/' + (ret.d7_eligible || 0) + '</div></div>';
    const dauArr = eng.dau || [];
    const avgDau = dauArr.length > 0 ? (dauArr.reduce((s, d) => s + (d.active_users || 0), 0) / dauArr.length).toFixed(1) : '--';
    const peakDau = dauArr.length > 0 ? Math.max(...dauArr.map(d => d.active_users || 0)) : '--';
    h += '<div class="sc"><div class="sc-label">DAU</div><div class="sc-val">' + avgDau + '</div><div class="sc-sub">peak: ' + peakDau + '</div></div>';
    h += '</div>';

    const engC = computeEngagementCommentary(eng, cc.users?.total || 0);
    h += commentaryHtml(engC.type, engC.label, engC.text);

    if (eng.feature_adoption) {
      const featureMap = { 'view_article': 'Journal', 'view_market_scan': 'Market Scan', 'tap_bet_link': 'Bet Link Taps' };
      h += '<div class="sh">Feature Usage</div><div style="margin-bottom:16px">';
      for (const [key, label] of Object.entries(featureMap)) {
        const f = eng.feature_adoption[key] || {};
        const pct = f.pct_of_active || 0;
        h += '<div class="feat"><span class="feat-name">' + label + '</span><div class="feat-track"><div class="feat-fill" style="width:' + pct + '%"></div></div><span class="feat-pct">' + pct + '%</span></div>';
      }
      h += '</div>';
      const featC = computeFeatureCommentary(eng);
      h += commentaryHtml(featC.type, featC.label, featC.text);
    }

    if (eng.top_pages && eng.top_pages.length > 0) {
      h += '<div class="sh">Top Pages</div><div style="margin-bottom:16px">';
      for (const p of eng.top_pages.slice(0, 6)) {
        h += '<div class="page-row"><span class="page-path">' + (p.page || '/') + '</span><span class="page-views">' + commaFmt(p.views) + ' (' + (p.distinct_users || 0) + ' users)</span></div>';
      }
      h += '</div>';
    }
  }

  const users = cc.users?.list || [];
  if (users.length > 0) {
    h += '<div class="sh">Recent Users</div><div>';
    for (const u of users.slice(0, 10)) {
      const tier = u.tier || 'free';
      let tierLabel = tier.charAt(0).toUpperCase() + tier.slice(1);
      if (tier === 'founding' && u.founding_number) tierLabel = 'F #' + u.founding_number;
      const tierClass = tier === 'pro' ? 'pro' : tier;
      const date = u.created_at ? new Date(u.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
      h += '<div class="user-row"><span class="user-email">' + (u.email || '') + '</span><span class="user-badge ' + tierClass + '">' + tierLabel + '</span><span class="user-date">' + date + '</span></div>';
    }
    h += '</div>';
  }

  document.getElementById('businessContent').innerHTML = h;
}

function renderSessionsChart(sessionsByDay) {
  const vals = sessionsByDay.map(d => d.sessions || d.count || 0);
  const maxVal = Math.max(...vals, 1);
  const labels = sessionsByDay.map(d => {
    if (d.date) {
      const parts = d.date.split('-');
      return parts.length >= 3 ? parts[1] + '/' + parts[2] : d.date;
    }
    return '';
  });

  let h = '<div class="chart-box"><div class="chart-title">Sessions (7d)</div>';
  h += '<div class="chart-area" style="display:flex;align-items:flex-end;gap:6px;padding:0 4px">';
  for (let i = 0; i < vals.length; i++) {
    const height = Math.max(4, (vals[i] / maxVal) * 72);
    const opacity = 0.5 + (vals[i] / maxVal) * 0.5;
    h += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="font-size:8px;color:var(--t4)">' + vals[i] + '</div><div style="width:100%;height:' + height + 'px;background:var(--green);border-radius:3px 3px 0 0;opacity:' + opacity.toFixed(2) + '"></div></div>';
  }
  h += '</div>';
  h += '<div class="chart-labels">';
  for (const l of labels) h += '<span>' + l + '</span>';
  h += '</div></div>';
  return h;
}

async function refreshAll() {
  document.getElementById('pulseContent').innerHTML = '<div style="color:var(--t4)">Refreshing...</div>';
  document.getElementById('modelsContent').innerHTML = '<div style="color:var(--t4)">Refreshing...</div>';
  document.getElementById('infraContent').innerHTML = '<div style="color:var(--t4)">Refreshing...</div>';
  document.getElementById('businessContent').innerHTML = '<div style="color:var(--t4)">Refreshing...</div>';
  await loadData();
  updateClock();
}

document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

loadData();
</script>
