<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SharpPicks Command Center v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Serif:ital,wght@1,400&display=swap');

  :root {
    --bg: #0A0D14;
    --bg-card: #0F1319;
    --bg-elevated: #141920;
    --border: #1C2230;
    --border-subtle: #151B25;
    --text-primary: #E8ECF2;
    --text-secondary: #8A95A9;
    --text-dim: #566178;
    --green: #5A9E72;
    --green-dim: rgba(90, 158, 114, 0.15);
    --red: #C4686B;
    --red-dim: rgba(196, 104, 107, 0.12);
    --yellow: #D4A843;
    --yellow-dim: rgba(212, 168, 67, 0.12);
    --blue: #5B8DEF;
    --blue-dim: rgba(91, 141, 239, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10, 13, 20, 0.95);
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; }

  .logo { font-size: 14px; font-weight: 600; letter-spacing: 2.5px; color: var(--text-primary); }
  .logo span { color: var(--green); }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(90, 158, 114, 0.6);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-secondary); }

  .topbar-btn {
    font-size: 11px; padding: 6px 10px; border-radius: 4px; cursor: pointer;
    font-family: inherit; letter-spacing: 0.5px; min-height: 32px;
    display: flex; align-items: center;
  }

  .kill-switch { border: 1px solid var(--red); color: var(--red); background: var(--red-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; }
  .refresh-btn { border: 1px solid var(--border); color: var(--text-secondary); background: transparent; }

  .actions-bar { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); display: flex; flex-direction: column; gap: 10px; }
  .action-group { display: flex; align-items: center; gap: 6px; }
  .action-group-label { font-size: 11px; font-weight: 600; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; width: 36px; flex-shrink: 0; }
  .action-read-btns { display: flex; gap: 6px; }
  .action-mutate-btns { display: flex; gap: 6px; margin-left: auto; }

  .action-btn {
    font-size: 12px; padding: 8px 14px; border: 1px solid var(--border);
    color: var(--text-secondary); background: var(--bg-card); border-radius: 4px;
    cursor: pointer; font-family: inherit; white-space: nowrap;
    transition: all 0.15s; min-height: 40px;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; user-select: none;
  }

  .action-btn:active { transform: scale(0.97); }
  .action-btn.run { border-color: var(--green); color: var(--green); background: var(--green-dim); font-weight: 500; }
  .action-btn.grade { border-color: var(--green); color: var(--green); background: var(--green-dim); font-weight: 500; }
  .action-btn.clear { border-color: var(--red); color: var(--red); background: var(--red-dim); font-size: 11px; padding: 6px 10px; min-height: 36px; }
  .action-divider-line { height: 1px; background: var(--border-subtle); margin: 2px 0; }

  .confirm-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7);
    z-index: 200; align-items: center; justify-content: center; padding: 24px;
    backdrop-filter: blur(4px);
  }
  .confirm-overlay.active { display: flex; }
  .confirm-dialog { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 8px; padding: 24px; max-width: 320px; width: 100%; text-align: center; }
  .confirm-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
  .confirm-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 10px; }
  .confirm-btn { flex: 1; font-family: inherit; font-size: 13px; padding: 12px; border-radius: 6px; cursor: pointer; min-height: 46px; font-weight: 500; border: none; }
  .confirm-btn.cancel { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
  .confirm-btn.proceed { background: var(--green); color: var(--bg); }
  .confirm-btn.proceed.danger { background: var(--red); }

  .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 16px; }

  .tab {
    font-size: 13px; padding: 12px 16px; color: var(--text-dim); cursor: pointer;
    border-bottom: 2px solid transparent; white-space: nowrap; letter-spacing: 0.5px;
    transition: all 0.2s; font-family: inherit; background: none;
    border-top: none; border-left: none; border-right: none;
    -webkit-tap-highlight-color: transparent; min-height: 44px;
    display: flex; align-items: center;
  }
  .tab:hover { color: var(--text-secondary); }
  .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }

  .content { padding: 16px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .stat-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
    background: var(--border-subtle); border: 1px solid var(--border-subtle);
    border-radius: 6px; overflow: hidden; margin-bottom: 16px;
  }
  .stat-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .stat-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .stat-cell { background: var(--bg-card); padding: 14px; }
  .stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; line-height: 1.15; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.sm { font-size: 18px; }
  .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  .section-header {
    font-size: 11px; letter-spacing: 2px; color: var(--text-dim);
    text-transform: uppercase; margin: 20px 0 12px;
    display: flex; align-items: center; gap: 10px; font-weight: 500;
  }
  .section-header::after { content: ''; flex: 1; height: 1px; background: var(--border-subtle); }

  .pipeline-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 14px; margin-bottom: 14px; }
  .pipeline-status { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .pipeline-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px rgba(90, 158, 114, 0.4); }
  .pipeline-title { font-size: 14px; font-weight: 500; }
  .pipeline-time { font-size: 12px; color: var(--text-dim); margin-left: auto; }

  .pipeline-meta {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    padding: 10px 0; border-top: 1px solid var(--border-subtle);
    border-bottom: 1px solid var(--border-subtle); margin-bottom: 10px;
  }
  .pipeline-meta-item { text-align: center; }
  .pipeline-meta-label { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
  .pipeline-meta-value { font-size: 16px; font-weight: 600; color: var(--green); }

  .pick-card { background: var(--bg-elevated); border-left: 3px solid var(--green); padding: 12px 14px; border-radius: 0 6px 6px 0; margin-bottom: 8px; }
  .pick-header { font-size: 13px; font-weight: 600; color: var(--green); margin-bottom: 3px; }
  .pick-matchup { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
  .pick-stats { display: flex; gap: 18px; font-size: 12px; color: var(--text-dim); }
  .pick-stats strong { color: var(--text-secondary); }

  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 16px; }
  .data-table th { font-size: 10px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); font-weight: 400; }
  .data-table th:last-child, .data-table td:last-child { text-align: right; }
  .data-table td { padding: 9px 10px; border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); }
  .data-table tr:last-child td { border-bottom: none; }
  .edge-positive { color: var(--green); font-weight: 500; }
  .edge-negative { color: var(--text-dim); }

  .cron-list { display: flex; flex-direction: column; gap: 1px; background: var(--border-subtle); border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
  .cron-item { display: grid; grid-template-columns: 10px 1fr auto auto; gap: 10px; align-items: center; background: var(--bg-card); padding: 10px 12px; font-size: 12px; }
  .cron-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .cron-name { color: var(--text-secondary); }
  .cron-when { color: var(--text-dim); text-align: right; font-size: 11px; }
  .cron-ago { color: var(--green); font-size: 11px; font-weight: 500; }

  .service-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border-subtle); border-radius: 6px; overflow: hidden; margin-bottom: 16px; }
  .service-item { background: var(--bg-card); padding: 12px; display: flex; align-items: center; gap: 10px; }
  .service-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .service-name { font-size: 12px; color: var(--text-secondary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .service-latency { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  .model-section { margin-bottom: 24px; }
  .model-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .model-badge { font-size: 10px; padding: 3px 8px; border-radius: 3px; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
  .model-badge.live { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .model-badge.beta { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--yellow); }
  .model-badge.shadow { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }

  .cal-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--green); background: var(--green-dim); color: var(--green); letter-spacing: 0.5px; font-weight: 500; }
  .cal-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }

  .bucket-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 12px; }
  .bucket-label { width: 85px; color: var(--text-dim); flex-shrink: 0; }
  .bucket-bar-track { flex: 1; height: 6px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden; }
  .bucket-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .bucket-bar-fill.green { background: var(--green); }
  .bucket-bar-fill.yellow { background: var(--yellow); }
  .bucket-bar-fill.red { background: var(--red); }
  .bucket-record { width: 90px; text-align: right; color: var(--text-secondary); flex-shrink: 0; }

  .funnel { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px; background: var(--bg-card); border-radius: 6px; margin-bottom: 16px; }
  .funnel-step { text-align: center; flex-shrink: 0; }
  .funnel-value { font-size: 20px; font-weight: 600; color: var(--text-primary); }
  .funnel-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.5px; text-transform: uppercase; margin-top: 2px; }
  .funnel-arrow { color: var(--text-dim); font-size: 14px; flex-shrink: 0; }
  .funnel-rate { font-size: 10px; color: var(--yellow); flex-shrink: 0; font-weight: 500; }

  .mini-pick { display: grid; grid-template-columns: 52px 1fr 36px 28px 48px; gap: 6px; align-items: center; font-size: 12px; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
  .mini-pick:last-child { border-bottom: none; }
  .mini-pick-date { color: var(--text-dim); }
  .mini-pick-name { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mini-pick-edge { color: var(--text-dim); text-align: center; }
  .mini-pick-result { text-align: center; font-weight: 600; }
  .mini-pick-pnl { text-align: right; font-weight: 500; }

  .user-row { display: grid; grid-template-columns: 1fr auto auto; gap: 10px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border-subtle); font-size: 12px; }
  .user-row:last-child { border-bottom: none; }
  .user-email { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tier-badge { font-size: 10px; padding: 3px 7px; border-radius: 3px; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600; }
  .tier-badge.founding { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(212, 168, 67, 0.3); }
  .tier-badge.trial { background: var(--green-dim); color: var(--green); border: 1px solid rgba(90, 158, 114, 0.3); }
  .tier-badge.free { background: rgba(122, 133, 153, 0.08); color: var(--text-dim); border: 1px solid var(--border); }
  .tier-badge.pro { background: var(--green-dim); color: var(--green); border: 1px solid rgba(90, 158, 114, 0.3); }
  .user-date { font-size: 11px; color: var(--text-dim); }

  .feature-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }
  .feature-label { width: 110px; color: var(--text-secondary); flex-shrink: 0; }
  .feature-track { flex: 1; height: 8px; background: var(--bg-elevated); border-radius: 4px; overflow: hidden; }
  .feature-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.5s ease; }
  .feature-pct { width: 44px; text-align: right; color: var(--text-dim); flex-shrink: 0; }

  .pipeline-sport-tab {
    font-family: inherit; font-size: 12px; font-weight: 500; padding: 8px 16px;
    border: none; background: var(--bg-card); color: var(--text-dim); cursor: pointer;
    letter-spacing: 0.5px; min-height: 38px;
    -webkit-tap-highlight-color: transparent; transition: all 0.15s;
  }
  .pipeline-sport-tab.active { background: var(--green-dim); color: var(--green); }
  .pipeline-panel { display: none; }
  .pipeline-panel.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .panel.active > * { animation: fadeIn 0.2s ease-out; }

  .mt-12 { margin-top: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-yellow { color: var(--yellow); }
  .text-dim { color: var(--text-dim); }
  .loading { color: var(--text-dim); text-align: center; padding: 40px; font-size: 12px; }
</style>
</head>
<body>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-actions">
      <button class="confirm-btn cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-btn proceed" id="confirmProceed" onclick="executeConfirm()">Run</button>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="status-dot"></div>
    <div class="logo">SHARP <span>||</span> PICKS</div>
  </div>
  <div class="topbar-right">
    <span id="topbarTime"></span>
    <button class="topbar-btn refresh-btn" onclick="location.reload()">Refresh</button>
    <button class="topbar-btn kill-switch" onclick="toggleKillSwitch()">Kill</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('pulse', this)">Pulse</button>
  <button class="tab" onclick="switchTab('models', this)">Models</button>
  <button class="tab" onclick="switchTab('infra', this)">Infra</button>
  <button class="tab" onclick="switchTab('business', this)">Business</button>
</div>

<div class="content">

  <div class="panel active" id="panel-pulse">
    <div id="pulseStats" class="loading">Loading...</div>
    <div class="section-header">Today's Pipeline</div>
    <div style="display: flex; gap: 2px; margin-bottom: 12px; background: var(--border-subtle); border-radius: 5px; overflow: hidden; width: fit-content;">
      <button class="pipeline-sport-tab active" onclick="switchPipeline('nba', this)">NBA</button>
      <button class="pipeline-sport-tab" onclick="switchPipeline('mlb', this)">MLB</button>
    </div>
    <div class="pipeline-panel active" id="pipeline-nba"><div class="loading">Loading...</div></div>
    <div class="pipeline-panel" id="pipeline-mlb"><div class="loading">Loading...</div></div>
    <div class="section-header">Services</div>
    <div id="servicesGrid" class="loading">Loading...</div>
  </div>

  <div class="panel" id="panel-models">
    <div id="modelsContent" class="loading">Loading...</div>
  </div>

  <div class="panel" id="panel-infra">
    <div class="section-header">Pipeline Controls</div>
    <div class="actions-bar" style="border-bottom: none; padding: 0; margin-bottom: 20px;">
      <div class="action-group">
        <span class="action-group-label">NBA</span>
        <div class="action-read-btns">
          <button class="action-btn" onclick="runAction('/api/cron/collect-games')">Games</button>
          <button class="action-btn" onclick="runAction('/api/cron/refresh-lines')">Lines</button>
        </div>
        <div class="action-mutate-btns">
          <button class="action-btn clear" onclick="showConfirm('Clear NBA?', 'Reset today\'s NBA pipeline data.', 'Clear', true, '/api/cron/run-model?sport=nba&clear=true')">Clear</button>
          <button class="action-btn run" onclick="showConfirm('Run NBA Model?', 'Execute model pipeline for today\'s NBA games.', 'Run', false, '/api/cron/run-model?force=true')">Run</button>
          <button class="action-btn grade" onclick="showConfirm('Grade NBA Picks?', 'Grade all pending NBA picks against final scores.', 'Grade', false, '/api/cron/grade-picks')">Grade</button>
        </div>
      </div>
      <div class="action-divider-line"></div>
      <div class="action-group">
        <span class="action-group-label">MLB</span>
        <div class="action-read-btns">
          <button class="action-btn" onclick="runAction('/api/cron/mlb-collect')">Collect</button>
        </div>
        <div class="action-mutate-btns">
          <button class="action-btn clear" onclick="showConfirm('Clear MLB?', 'Reset today\'s MLB pipeline data.', 'Clear', true, '/api/cron/mlb-run-model?clear=true')">Clear</button>
          <button class="action-btn run" onclick="showConfirm('Run MLB Model?', 'Execute model pipeline for today\'s MLB games.', 'Run', false, '/api/cron/mlb-run-model?force=true')">Run</button>
          <button class="action-btn grade" onclick="showConfirm('Grade MLB Picks?', 'Grade all pending MLB picks against final scores.', 'Grade', false, '/api/cron/mlb-grade')">Grade</button>
        </div>
      </div>
    </div>
    <div id="infraContent" class="loading">Loading...</div>
  </div>

  <div class="panel" id="panel-business">
    <div id="businessContent" class="loading">Loading...</div>
  </div>

</div>

<script>
const CRON_SECRET = '{{ cron_secret }}';
let pendingAction = null;

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function switchPipeline(sport, el) {
  document.querySelectorAll('.pipeline-sport-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pipeline-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pipeline-' + sport).classList.add('active');
}

function showConfirm(title, desc, actionLabel, isDanger, actionUrl) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmDesc').textContent = desc;
  const btn = document.getElementById('confirmProceed');
  btn.textContent = actionLabel;
  btn.className = 'confirm-btn proceed' + (isDanger ? ' danger' : '');
  pendingAction = actionUrl;
  document.getElementById('confirmOverlay').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
  pendingAction = null;
}

async function executeConfirm() {
  if (pendingAction) {
    const url = pendingAction;
    closeConfirm();
    await runAction(url);
  } else {
    closeConfirm();
  }
}

async function runAction(url) {
  try {
    const r = await fetch(url, { method: 'POST', headers: { 'X-Cron-Secret': CRON_SECRET } });
    const d = await r.json();
    alert(JSON.stringify(d, null, 2));
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function toggleKillSwitch() {
  if (!confirm('Toggle kill switch? This will disable/enable all model operations.')) return;
  try {
    const r = await fetch('/api/public/kill-switch');
    const d = await r.json();
    alert('Kill switch: ' + (d.killed ? 'ACTIVE' : 'OFF'));
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function updateClock() {
  const now = new Date();
  const et = now.toLocaleString('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
  document.getElementById('topbarTime').textContent = et;
}

function timeAgo(isoStr) {
  if (!isoStr) return '--';
  const d = new Date(isoStr);
  const now = new Date();
  const mins = Math.floor((now - d) / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function commaFmt(n) {
  return (n || 0).toLocaleString();
}

function pctColor(pct) {
  if (pct >= 65) return 'green';
  if (pct >= 45) return 'yellow';
  return 'red';
}

function fmtDate(d) {
  if (!d) return '--';
  const parts = d.split('-');
  return parts.length >= 3 ? parts[1] + '-' + parts[2] : d;
}

function roiSign(v) {
  return v > 0 ? '+' + v : '' + v;
}

async function loadData() {
  updateClock();
  setInterval(updateClock, 30000);

  try {
    const [ccR, healthR, cronR, funnelR, engR] = await Promise.all([
      fetch('/api/admin/command-center').then(r => r.json()).catch(() => null),
      fetch('/api/admin/health-checks').then(r => r.json()).catch(() => null),
      fetch('/api/admin/cron-health').then(r => r.json()).catch(() => null),
      fetch('/api/admin/funnel-metrics').then(r => r.json()).catch(() => null),
      fetch('/api/admin/engagement').then(r => r.json()).catch(() => null),
    ]);

    renderPulse(ccR, healthR);
    renderModels(ccR);
    renderInfra(cronR, healthR, engR, ccR);
    renderBusiness(ccR, funnelR, engR);
  } catch (e) {
    console.error('Load failed:', e);
  }
}

          <span>Book <strong>${todayPick.sportsbook || '--'}</strong></span>
        </div>
      </div>`;
  } else if (lastRun && lastRun.pick_generated === false) {

    const gamesCount = lastRun.games_analyzed || '--';
    pipelineHtml += `
      <div class="pipeline-status">

        <div class="pipeline-title">Pass Day</div>

function renderServices(health) {
  if (!health) {
    document.getElementById('servicesGrid').innerHTML = '<div class="service-grid"><div class="service-item"><div class="service-dot" style="background:var(--text-dim)"></div><div class="service-name">Loading...</div></div></div>';
    return;
  }

  function dot(svc) {
    const s = health[svc];
    if (!s) return 'var(--text-dim)';
    return s.status === 'ok' ? 'var(--green)' : (s.status === 'warn' ? 'var(--yellow)' : 'var(--red)');
  }
  function lat(svc, fallback) {
    const s = health[svc];
    if (!s) return fallback || '--';
    if (s.latency_ms != null) return s.latency_ms + 'ms';
    return fallback || (s.status === 'ok' ? 'OK' : s.message || '--');
  }

  const pg = health.postgresql || {};
  const odds = health.odds_api || {};
  const bdl = health.balldontlie || {};
  const espn = health.espn || {};
  const resendH = health.resend || {};
  const stripe = health.stripe || {};
  const sqlite = health.sqlite || {};

  document.getElementById('servicesGrid').innerHTML = `
    <div class="service-grid">
      <div class="service-item"><div class="service-dot" style="background:${dot('postgresql')}"></div><div class="service-name">PostgreSQL</div><div class="service-latency">${lat('postgresql')}</div></div>
      <div class="service-item"><div class="service-dot" style="background:${dot('odds_api')}"></div><div class="service-name">Odds API</div><div class="service-latency">${odds.requests_remaining || '--'} left</div></div>

      <div class="service-item"><div class="service-dot" style="background:${dot('espn')}"></div><div class="service-name">ESPN</div><div class="service-latency">${espn.games_today != null ? espn.games_today + ' games' : lat('espn')}</div></div>
      <div class="service-item"><div class="service-dot" style="background:${dot('stripe')}"></div><div class="service-name">Stripe</div><div class="service-latency">${stripe.balance || '--'} ${stripe.mode || ''}</div></div>
      <div class="service-item"><div class="service-dot" style="background:${dot('resend')}"></div><div class="service-name">Resend</div><div class="service-latency">${resendH.verified || '--'}/${resendH.domains || '--'} domains</div></div>
      <div class="service-item"><div class="service-dot" style="background:${dot('sqlite')}"></div><div class="service-name">SQLite (games)</div><div class="service-latency">${sqlite.games || '--'} games</div></div>
      <div class="service-item"><div class="service-dot" style="background:var(--green)"></div><div class="service-name">Firebase</div><div class="service-latency">--</div></div>
    </div>`;
}

function renderModels(cc) {

  const mlbPnl = mlb.total_pnl || 0;

  const nbaBuckets = nba.bucket_rates || {};

  function bucketRow(label, rate, record) {
    const color = pctColor(rate);

      </div>
      ${nbaBucketsHtml ? `<div class="section-header">Confidence Buckets</div><div style="margin-bottom:16px">${nbaBucketsHtml}</div>` : ''}
    </div>
    <div class="model-section">

        <span class="model-badge beta">Cal Beta</span>
      </div>
      <div class="stat-grid cols-4">
        <div class="stat-cell"><div class="stat-label">Record</div><div class="stat-value green">${mlb.record || '0-0'}</div><div class="stat-sub">${mlb.win_rate || 0}%</div></div>
        <div class="stat-cell"><div class="stat-label">ROI</div><div class="stat-value green">${roiSign(mlbRoi)}%</div><div class="stat-sub">+$${mlbPnl}</div></div>

function renderInfra(cronData, health, eng, cc) {
  let html = '';

  if (cronData && cronData.jobs) {
    const jobs = cronData.jobs;
    const activeCount = jobs.filter(j => j.health === 'ok').length;
    html += `<div class="section-header">Cron Jobs &middot; ${activeCount} healthy</div><div class="cron-list">`;
    for (const job of jobs) {
      const dotColor = job.health === 'ok' ? 'var(--green)' : (job.health === 'warn' ? 'var(--yellow)' : 'var(--red)');
      const agoColor = job.health === 'ok' ? 'var(--green)' : (job.health === 'error' ? 'var(--red)' : 'var(--yellow)');
      const ago = job.hours_ago != null ? (job.hours_ago < 1 ? Math.round(job.hours_ago * 60) + 'm ago' : Math.round(job.hours_ago) + 'h ago') : 'never';
      html += `<div class="cron-item"><div class="cron-dot" style="background:${dotColor}"></div><div class="cron-name">${job.name}</div><div class="cron-when">${job.schedule}</div><div class="cron-ago" style="color:${agoColor}">${ago}</div></div>`;
    }
    html += '</div>';
  }

  if (health) {
    html += '<div class="section-header">External Services</div>';
    function svcItem(name, svc, detail) {
      const s = health[svc] || {};
      const dot = s.status === 'ok' ? 'var(--green)' : (s.status === 'warn' ? 'var(--yellow)' : 'var(--red)');
      return `<div class="service-item"><div class="service-dot" style="background:${dot}"></div><div class="service-name">${name}</div><div class="service-latency">${detail}</div></div>`;
    }

    const pg = health.postgresql || {};
    const odds = health.odds_api || {};
    const bdl = health.balldontlie || {};
    const espn = health.espn || {};
    const resendH = health.resend || {};
    const stripe = health.stripe || {};
    const sqlite = health.sqlite || {};

    html += '<div class="service-grid">';
    html += svcItem('PostgreSQL', 'postgresql', pg.latency_ms ? pg.latency_ms + 'ms' : '--');
    html += svcItem('Odds API', 'odds_api', (odds.requests_remaining || '--') + ' left');
    html += svcItem('balldontlie', 'balldontlie', bdl.latency_ms ? bdl.latency_ms + 'ms' : '--');
    html += svcItem('ESPN', 'espn', espn.games_today != null ? espn.games_today + ' games' : '--');
    html += svcItem('Resend', 'resend', (resendH.verified || '--') + '/' + (resendH.domains || '--') + ' domains');
    html += svcItem('Stripe', 'stripe', (stripe.balance || '--') + ' ' + (stripe.mode || ''));
    html += svcItem('SQLite (games)', 'sqlite', (sqlite.games || '--') + ' games');
    html += svcItem('Firebase', '', '--');
    html += '</div>';
  }

  const push = (cc && cc.push) || {};
  html += `<div class="section-header">Push Notifications</div>
    <div class="stat-grid cols-4">
      <div class="stat-cell"><div class="stat-label">Opt-in</div><div class="stat-value sm">${push.opt_in_pct != null ? push.opt_in_pct + '%' : '--'}</div></div>
      <div class="stat-cell"><div class="stat-label">Tokens</div><div class="stat-value sm">${push.enabled || 0}</div></div>

      <div class="stat-cell"><div class="stat-label">Stale</div><div class="stat-value sm">${push.stale || 0}</div></div>
    </div>`;

  if (eng && eng.top_pages && eng.top_pages.length > 0) {
    html += '<div class="section-header">Top Paths (7d)</div><table class="data-table"><thead><tr><th>Path</th><th>Hits</th></tr></thead><tbody>';
    for (const p of eng.top_pages.slice(0, 7)) {
      html += `<tr><td>${p.page || '/'}</td><td>${commaFmt(p.views)}</td></tr>`;
    }
    html += '</tbody></table>';
  }

  document.getElementById('infraContent').innerHTML = html;
}

    for (const u of users.slice(0, 10)) {
      const tier = u.tier || 'free';
      let tierLabel = tier.charAt(0).toUpperCase() + tier.slice(1);
      if (tier === 'founding' && u.founding_number) tierLabel = 'F #' + u.founding_number;
      const date = u.created_at ? new Date(u.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
      html += `<div class="user-row"><div class="user-email">${u.email || ''}</div><div><span class="tier-badge ${tier}">${tierLabel}</span></div><div class="user-date">${date}</div></div>`;
    }
  }

  document.getElementById('businessContent').innerHTML = html;
}

document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

loadData();
</script>

</body>
</html>
