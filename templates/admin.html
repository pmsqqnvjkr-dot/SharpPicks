<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SharpPicks Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500&family=Inter:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <header>
    <div class="wordmark">
      <span class="word">Sharp</span>
      <span class="glyph" aria-hidden="true">
        <span class="bar"></span>
        <span class="bar"></span>
      </span>
      <span class="word">Picks</span>
      <span class="meta">command center</span>
    </div>
    <div class="header-right">
      <a href="/" class="back-btn" aria-label="Back to app">
        <span class="arrow">←</span>
        <span class="label-text">Back to app</span>
      </a>
    </div>
  </header>

  <!-- TAB STRIP -->
  <nav class="tabs" role="tablist" aria-label="Command Center tabs">
    <button class="tab active" data-tab="command" role="tab" aria-selected="true">Command</button>
    <button class="tab" data-tab="users" role="tab" aria-selected="false">Users</button>
    <button class="tab" data-tab="model" role="tab" aria-selected="false">Model</button>
    <button class="tab" data-tab="infra" role="tab" aria-selected="false">Infra</button>
  </nav>

  <!-- PANELS -->
  <div class="panel active" id="panel-command" role="tabpanel" aria-labelledby="tab-command">
    <!-- Step 3.4+ populates Command panel sections (Status, What Moved, etc.).
         The deep-link below is included now so Step 3.2's verification can
         confirm tab switching works end-to-end; later it will live inside
         the User Activity section. -->
    <a href="#" class="deep-link" data-deep-link="users">
      <span class="deep-link-text">View full user activity · users tab</span>
      <span class="deep-link-arrow">→</span>
    </a>
  </div>

  <div class="panel" id="panel-users" role="tabpanel" aria-labelledby="tab-users">
    <!-- Step 3.5 populates Users panel. -->
  </div>

  <div class="panel" id="panel-model" role="tabpanel" aria-labelledby="tab-model">
    <!-- Step 3.6 populates Model panel. -->
  </div>

  <div class="panel" id="panel-infra" role="tabpanel" aria-labelledby="tab-infra">
    <!-- Step 3.7 populates Infra panel. -->
  </div>

</div>

<script src="/static/js/admin.js" defer></script>
</body>
</html>
