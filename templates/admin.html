<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080B11;
  --s0: #0C1018;
  --s1: #111520;
  --s2: #161B27;
  --s3: #1C2230;
  --border: #1A1F2E;
  --green: #5A9E72;
  --g15: rgba(90,158,114,0.15);
  --g08: rgba(90,158,114,0.08);
  --g04: rgba(90,158,114,0.04);
  --red: #C4686B;
  --r15: rgba(196,104,107,0.15);
  --r08: rgba(196,104,107,0.08);
  --amber: #D4A054;
  --a15: rgba(212,160,84,0.15);
  --blue: #6B8EC2;
  --t1: #E2E4E8;
  --t2: #9DA1AC;
  --t3: #626878;
  --t4: #454B5C;
  --t5: #333845;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased;max-width:960px;margin:0 auto;min-height:100vh;overflow-x:hidden;padding:0 8px}
@media(min-width:600px){body{padding:0 16px}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(8,11,17,0.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);z-index:50}
.topbar-left{display:flex;align-items:center;gap:8px}
.back-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:0;color:var(--t3);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(90,158,114,0.5)}
.sdot.killed{background:var(--red);box-shadow:0 0 6px rgba(196,104,107,0.5)}
.logo{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--t1)}
.logo span{color:var(--green)}
.topbar-ts{font-size:10px;color:var(--t4);text-align:right}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:55px;background:var(--bg);z-index:49}
.tab{padding:11px 14px;font-size:12px;font-weight:500;color:var(--t4);border:0;background:0;cursor:pointer;border-bottom:2px solid transparent;font-family:'JetBrains Mono',monospace;transition:color 0.15s}
.tab.active{color:var(--green);border-bottom-color:var(--green)}
.tab:hover{color:var(--t2)}
.panel{display:none;padding:16px 16px 60px}
.panel.active{display:block}
.sh{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t4);margin:24px 0 10px;display:flex;align-items:center;gap:10px}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}
.sh:first-child{margin-top:0}
.sg{display:grid;gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
.sg.c4{grid-template-columns:repeat(4,1fr)}
.sg.c2{grid-template-columns:repeat(2,1fr)}
.sg.c3{grid-template-columns:repeat(3,1fr)}
.sc{background:var(--s1);padding:12px 8px;text-align:center}
.sc-label{font-size:8px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:3px}
.sc-val{font-size:20px;font-weight:700;line-height:1.2}
.sc-sub{font-size:9px;color:var(--t4);margin-top:2px;line-height:1.3}
.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}.blue{color:var(--blue)}
.commentary{margin:12px 0 20px;padding:12px 14px;background:var(--s1);border:1px solid var(--border);border-radius:8px;position:relative;overflow:hidden}
.commentary::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:8px 8px 0 0}
.commentary.insight::before{background:linear-gradient(90deg,var(--green),transparent 50%);opacity:0.4}
.commentary.warning::before{background:linear-gradient(90deg,var(--amber),transparent 50%);opacity:0.4}
.commentary.alert::before{background:linear-gradient(90deg,var(--red),transparent 50%);opacity:0.4}
.commentary-label{font-size:8px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.commentary-text{font-family:'Inter',sans-serif;font-size:12px;line-height:1.55;color:var(--t2)}
.commentary-text strong{color:var(--t1);font-weight:600}
.pipeline{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px}
.pipe-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pipe-status{display:flex;align-items:center;gap:8px}
.pipe-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px rgba(90,158,114,0.4)}
.pipe-title{font-size:12px;font-weight:600;color:var(--t1)}
.pipe-date{font-size:10px;color:var(--t4)}
.pipe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:10px}
.pipe-cell{background:var(--s0);padding:8px 4px;text-align:center}
.pipe-cell-label{font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-bottom:2px}
.pipe-cell-val{font-size:14px;font-weight:600}
.pick-card{border-left:2px solid var(--green);padding:8px 12px;background:var(--g04);border-radius:0 6px 6px 0;margin-top:8px}
.pick-name{font-size:12px;font-weight:600;color:var(--green)}
.pick-meta{font-size:10px;color:var(--t4);margin-top:2px}
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:16px}
.svc{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--s1);border:1px solid var(--border);border-radius:6px;font-size:11px}
.svc-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.svc-dot.ok{background:var(--green)}
.svc-dot.warn{background:var(--amber)}
.svc-dot.down{background:var(--red)}
.svc-name{color:var(--t2);flex:1}
.svc-val{color:var(--t4);font-size:10px}
.buckets{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.bkt{display:grid;grid-template-columns:58px 1fr 80px;align-items:center;gap:8px}
.bkt-range{font-size:10px;color:var(--t2);text-align:right}
.bkt-track{height:7px;background:var(--s2);border-radius:4px;overflow:hidden}
.bkt-fill{height:100%;border-radius:4px}
.bkt-fill.great{background:linear-gradient(90deg,#4A8F62,var(--green))}
.bkt-fill.good{background:linear-gradient(90deg,#4A8F62,#7BC493)}
.bkt-fill.mid{background:linear-gradient(90deg,var(--amber),#E0B870)}
.bkt-fill.bad{background:linear-gradient(90deg,#B05558,var(--red))}
.picks{display:flex;flex-direction:column}
.pk{display:grid;grid-template-columns:38px 1fr 28px 24px 44px;align-items:center;gap:4px;padding:8px 0;border-bottom:1px solid rgba(26,31,46,0.4);font-size:10px}
.pk:last-child{border-bottom:0}
.pk-date{color:var(--t4)}
.pk-name{color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pk-edge{color:var(--t3);text-align:center}
.pk-res{text-align:center;font-weight:600}
.pk-pnl{text-align:right;font-weight:600}
.mh{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.mh-name{font-size:13px;font-weight:700;letter-spacing:1px}
.badge{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:3px 7px;border-radius:4px}
.badge-live{background:var(--g15);color:var(--green);border:1px solid rgba(90,158,114,0.25)}
.badge-beta{background:var(--a15);color:var(--amber);border:1px solid rgba(212,160,84,0.25)}
.badge-shadow{background:rgba(98,104,120,0.1);color:var(--t3);border:1px solid rgba(98,104,120,0.2)}
.divider{height:1px;background:var(--border);margin:28px 0}
.shadow-box{padding:20px;text-align:center;color:var(--t4);font-size:11px;border:1px dashed var(--border);border-radius:8px}
.cron{display:grid;grid-template-columns:10px 1fr auto auto;align-items:center;gap:8px;padding:10px 12px;background:var(--s1);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;font-size:11px}
.cron-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.cron-name{color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cron-when{color:var(--t4);font-size:9px;text-align:right;white-space:nowrap}
.cron-ago{color:var(--green);font-size:9px;text-align:right;white-space:nowrap;min-width:42px}
.sys-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sys-btn{padding:14px 12px;border-radius:8px;cursor:pointer;border:1px solid var(--border);text-align:center;transition:all 0.15s}
.sys-btn .icon{font-size:16px;margin-bottom:4px}
.sys-btn .label{font-size:11px;font-weight:600;margin-bottom:2px}
.sys-btn .sublabel{font-size:9px;color:var(--t4)}
.sys-btn.refresh{background:var(--s1);color:var(--t2)}
.sys-btn.refresh:active{border-color:var(--green);background:var(--g08)}
.sys-btn.kill{background:var(--r08);border-color:rgba(196,104,107,0.2);color:var(--red)}
.sys-btn.kill:active{background:var(--r15)}
.sys-btn.kill.active-kill{background:var(--r15);border-color:var(--red)}
.sys-status{display:flex;justify-content:space-between;font-size:10px;color:var(--t4);padding:0 4px;margin-bottom:20px}
.sys-status .live{color:var(--green)}
.sys-status .killed{color:var(--red)}
.actions{margin-bottom:8px}
.action-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.action-sport{font-size:11px;font-weight:600;color:var(--t2);width:32px}
.action-btn{padding:7px 10px;border-radius:5px;border:1px solid var(--border);background:var(--s1);color:var(--t2);font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer}
.action-btn.primary{border-color:rgba(90,158,114,0.25);color:var(--green)}
.action-btn.danger{border-color:rgba(196,104,107,0.2);color:var(--red)}
.action-spacer{flex:1}
.funnel{display:flex;align-items:center;justify-content:center;gap:6px;padding:16px;background:var(--s1);border:1px solid var(--border);border-radius:8px;margin-bottom:16px}
.funnel-step{text-align:center}
.funnel-num{font-size:22px;font-weight:700}
.funnel-label{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t4);margin-top:2px}
.funnel-arrow{color:var(--t4);font-size:12px}
.funnel-pct{font-size:10px;font-weight:600;margin:0 2px}
.feat{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:11px}
.feat-name{width:90px;color:var(--t2);text-align:right}
.feat-track{flex:1;height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.feat-fill{height:100%;background:var(--green);border-radius:3px}
.feat-pct{width:40px;color:var(--t3);text-align:right}
.user-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(26,31,46,0.4);font-size:11px}
.user-row:last-child{border-bottom:0}
.user-email{flex:1;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-badge{font-size:8px;font-weight:600;letter-spacing:0.5px;padding:2px 6px;border-radius:3px}
.user-badge.pro{background:var(--g15);color:var(--green)}
.user-badge.founding{background:var(--g15);color:var(--green)}
.user-badge.trial{background:var(--a15);color:var(--amber)}
.user-badge.free{background:rgba(98,104,120,0.1);color:var(--t3)}
.user-date{color:var(--t4);font-size:10px;min-width:40px;text-align:right}
.user-filters{display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px}
.user-filters::-webkit-scrollbar{display:none}
.uf{padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--s1);font-size:8px;font-weight:500;color:var(--t4);cursor:pointer;white-space:nowrap;flex-shrink:0}
.uf.active{background:var(--g15);border-color:rgba(90,158,114,0.25);color:var(--green)}
.user-table{width:100%;border-collapse:collapse;margin-bottom:10px}
.user-table th{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t4);text-align:left;padding:6px 4px;border-bottom:1px solid var(--border);cursor:pointer}
.user-table th:hover{color:var(--t2)}
.user-table td{font-size:9px;padding:7px 4px;border-bottom:1px solid rgba(26,31,46,0.4);color:var(--t2);vertical-align:middle}
.user-table tr:last-child td{border-bottom:none}
.user-table tr.founding-row{border-left:2px solid var(--green)}
.user-table tr.inactive-row{opacity:0.45}
.user-table tr.unverified-row td:first-child{opacity:0.6}
.status-badge{font-size:7px;font-weight:600;padding:2px 5px;border-radius:3px;letter-spacing:0.5px}
.status-badge.pro{background:var(--g15);color:var(--green)}
.status-badge.founding{background:var(--g15);color:var(--green)}
.status-badge.trial{background:var(--a15);color:var(--amber)}
.status-badge.free-badge{background:rgba(69,75,92,0.1);color:var(--t4)}
.dot-g{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green)}
.dot-r{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--red)}
.top-user{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--s1);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;font-size:10px}
.top-user-rank{font-weight:700;color:var(--green);width:16px}
.top-user-email{color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-user-stat{color:var(--t3);text-align:right}
.top-user-flag{font-size:7px;padding:1px 4px;border-radius:2px;margin-left:4px;font-weight:600;letter-spacing:0.5px}
.top-user-flag.power{background:var(--g15);color:var(--green)}
.top-user-flag.risk{background:var(--r15);color:var(--red)}
.verif{padding:12px;background:var(--s1);border:1px solid var(--border);border-radius:8px;margin-bottom:10px}
.verif-bar{height:6px;background:var(--s2);border-radius:3px;overflow:hidden;margin:8px 0}
.verif-fill{height:100%;border-radius:3px;background:var(--green)}
.verif-stats{display:flex;justify-content:space-between;font-size:10px}
.verif-list{margin-top:8px}
.verif-row{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:9px;color:var(--t3)}
.verif-row span:last-child{margin-left:auto}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.content-table{width:100%;border-collapse:collapse;margin-bottom:10px;min-width:280px}
.content-table th{font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t4);text-align:left;padding:6px 4px;border-bottom:1px solid var(--border);white-space:nowrap}
.content-table td{font-size:9px;padding:6px 4px;border-bottom:1px solid rgba(26,31,46,0.4);color:var(--t2);white-space:nowrap}
.content-table td:last-child{text-align:right}
.content-table td:first-child{max-width:180px;overflow:hidden;text-overflow:ellipsis}
.spark-mini{display:flex;align-items:flex-end;gap:3px;height:30px;margin-bottom:4px}
.spark-bar{flex:1;border-radius:2px 2px 0 0;min-width:6px}
.page-row{display:flex;align-items:baseline;padding:6px 0;border-bottom:1px solid rgba(26,31,46,0.3);font-size:11px}
.page-row:last-child{border-bottom:0}
.page-path{flex:1;color:var(--t2)}
.page-views{color:var(--t3);text-align:right}
.chart-box{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:16px}
.chart-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t4);margin-bottom:8px}
.chart-area{height:80px;position:relative}
.chart-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--t4);margin-top:4px}
.pipeline-sport-tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--border);border-radius:5px;overflow:hidden;width:fit-content}
.pipeline-sport-tab{padding:6px 14px;font-size:10px;font-weight:500;border:none;background:var(--s1);color:var(--t4);cursor:pointer;font-family:'JetBrains Mono',monospace}
.pipeline-sport-tab.active{background:var(--s2);color:var(--t1)}
.pipeline-panel{display:none}
.pipeline-panel.active{display:block}
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.active{display:flex}
.confirm-dialog{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:24px;max-width:340px;width:100%}
.confirm-title{font-size:14px;font-weight:600;margin-bottom:8px}
.confirm-desc{font-family:'Inter',sans-serif;font-size:12px;color:var(--t3);line-height:1.5;margin-bottom:20px}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}
.confirm-btn{padding:8px 16px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;border:none}
.confirm-btn.cancel{background:var(--s2);color:var(--t2);border:1px solid var(--border)}
.confirm-btn.proceed{background:var(--green);color:#080B11}
.confirm-btn.proceed.danger{background:var(--red);color:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.panel.active > *:nth-child(1){animation:fadeUp .3s ease both;animation-delay:.03s}
.panel.active > *:nth-child(2){animation:fadeUp .3s ease both;animation-delay:.06s}
.panel.active > *:nth-child(3){animation:fadeUp .3s ease both;animation-delay:.09s}
.panel.active > *:nth-child(4){animation:fadeUp .3s ease both;animation-delay:.12s}
.panel.active > *:nth-child(5){animation:fadeUp .3s ease both;animation-delay:.15s}
.panel.active > *:nth-child(6){animation:fadeUp .3s ease both;animation-delay:.18s}
.panel.active > *:nth-child(7){animation:fadeUp .3s ease both;animation-delay:.21s}
.panel.active > *:nth-child(8){animation:fadeUp .3s ease both;animation-delay:.24s}
.panel.active > *:nth-child(9){animation:fadeUp .3s ease both;animation-delay:.27s}
.panel.active > *:nth-child(10){animation:fadeUp .3s ease both;animation-delay:.3s}
.panel.active > *:nth-child(11){animation:fadeUp .3s ease both;animation-delay:.33s}
.panel.active > *:nth-child(12){animation:fadeUp .3s ease both;animation-delay:.36s}
.panel.active > *:nth-child(13){animation:fadeUp .3s ease both;animation-delay:.39s}
.panel.active > *:nth-child(14){animation:fadeUp .3s ease both;animation-delay:.42s}
.panel.active > *:nth-child(15){animation:fadeUp .3s ease both;animation-delay:.45s}
.panel.active > *:nth-child(16){animation:fadeUp .3s ease both;animation-delay:.48s}
.panel.active > *:nth-child(17){animation:fadeUp .3s ease both;animation-delay:.51s}
.panel.active > *:nth-child(18){animation:fadeUp .3s ease both;animation-delay:.54s}
.panel.active > *:nth-child(19){animation:fadeUp .3s ease both;animation-delay:.57s}
.panel.active > *:nth-child(20){animation:fadeUp .3s ease both;animation-delay:.60s}
.panel.active > *:nth-child(21){animation:fadeUp .3s ease both;animation-delay:.63s}
.panel.active > *:nth-child(22){animation:fadeUp .3s ease both;animation-delay:.66s}
.panel.active > *:nth-child(23){animation:fadeUp .3s ease both;animation-delay:.69s}
.panel.active > *:nth-child(24){animation:fadeUp .3s ease both;animation-delay:.72s}
.panel.active > *:nth-child(25){animation:fadeUp .3s ease both;animation-delay:.75s}
.panel.active > *:nth-child(26){animation:fadeUp .3s ease both;animation-delay:.78s}
.panel.active > *:nth-child(27){animation:fadeUp .3s ease both;animation-delay:.81s}
.panel.active > *:nth-child(28){animation:fadeUp .3s ease both;animation-delay:.84s}
.panel.active > *:nth-child(29){animation:fadeUp .3s ease both;animation-delay:.87s}
.panel.active > *:nth-child(30){animation:fadeUp .3s ease both;animation-delay:.90s}
@keyframes killPulse{0%,100%{opacity:1}50%{opacity:0.4}}
.kill-pulse{animation:killPulse 1.5s ease-in-out infinite}

/* ── Business Tab v2 ── */
.biz-north{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px}
@media(max-width:600px){.biz-north{grid-template-columns:repeat(2,1fr)}}

.biz-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.biz-funnel{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px}

</head>
<body>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-actions">
      <button class="confirm-btn cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-btn proceed" id="confirmProceed" onclick="executeConfirm()">Run</button>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <button class="back-btn" onclick="window.location.href='/'">&#8592;</button>
    <div class="sdot" id="statusDot"></div>
    <div class="logo">SHARP <span>||</span> PICKS</div>
  </div>
  <div class="topbar-ts" id="topbarTime"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="go('pulse',this)">Pulse</button>
  <button class="tab" onclick="go('analytics',this)">Analytics</button>
  <button class="tab" onclick="go('models',this)">Models</button>
  <button class="tab" onclick="go('infra',this)">Infra</button>
  <button class="tab" onclick="go('business',this)">Business</button>
</div>

<div class="panel active" id="p-pulse">
  <div id="pulseContent" style="color:var(--t4)">Loading...</div>
</div>

<div class="panel" id="p-analytics">
  <div id="analyticsContent" style="color:var(--t4)">Loading...</div>
</div>

<div class="panel" id="p-models">
  <div id="modelsContent" style="color:var(--t4)">Loading...</div>
</div>

<div class="panel" id="p-infra">
  <div id="infraContent" style="color:var(--t4)">Loading...</div>
</div>

<div class="panel" id="p-business">
  <div id="businessContent" style="color:var(--t4)">Loading...</div>
</div>

<script>
const CRON_SECRET = '{{ cron_secret }}';
let pendingAction = null;
let killActive = false;

function go(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('p-' + id).classList.add('active');
  btn.classList.add('active');
}

function switchPipeline(sport, el) {
  el.parentElement.querySelectorAll('.pipeline-sport-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.pipeline-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('pipe-' + sport).classList.add('active');
}

function showConfirm(title, desc, actionLabel, isDanger, actionUrl) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmDesc').textContent = desc;
  const btn = document.getElementById('confirmProceed');
  btn.textContent = actionLabel;
  btn.className = 'confirm-btn proceed' + (isDanger ? ' danger' : '');
  pendingAction = actionUrl;
  document.getElementById('confirmOverlay').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
  pendingAction = null;
}

async function executeConfirm() {
  if (pendingAction) {
    const url = pendingAction;
    closeConfirm();
    if (url === '__kill_switch__') {
      await doKillSwitch();
    } else {
      await runAction(url);
    }
  } else {
    closeConfirm();
  }
}

async function runAction(url) {
  try {
    const r = await fetch(url, { method: 'POST', headers: { 'X-Cron-Secret': CRON_SECRET } });
    const d = await r.json();
    alert(JSON.stringify(d, null, 2));
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function doKillSwitch() {
  try {
    const r = await fetch('/api/public/kill-switch');
    const d = await r.json();
    killActive = !!d.killed;
    updateKillUI();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function toggleKillSwitch() {
  if (killActive) {
    showConfirm('Deactivate Kill Switch?', 'This will re-enable pick publishing. The model will resume generating signals for users.', 'Deactivate', false, '__kill_switch__');
  } else {
    showConfirm('Activate Kill Switch?', 'This will prevent all pick signals from being published. The model will continue running but picks will not be pushed to users. Manual reactivation required.', 'Activate', true, '__kill_switch__');
  }
}

function updateKillUI() {
  const dot = document.getElementById('statusDot');
  const killBtn = document.getElementById('killBtn');
  const statusLabel = document.getElementById('sysStatusLabel');
  if (killActive) {
    dot.className = 'sdot killed kill-pulse';
    if (killBtn) {
      killBtn.className = 'sys-btn kill active-kill';
      killBtn.querySelector('.label').textContent = 'Kill Switch ACTIVE';
      killBtn.querySelector('.sublabel').textContent = 'Tap to deactivate';
    }
    if (statusLabel) statusLabel.innerHTML = 'Status: <span class="killed">KILLED</span>';
  } else {
    dot.className = 'sdot';
    if (killBtn) {
      killBtn.className = 'sys-btn kill';
      killBtn.querySelector('.label').textContent = 'Kill Switch';
      killBtn.querySelector('.sublabel').textContent = 'Disable picks';
    }
    if (statusLabel) statusLabel.innerHTML = 'Status: <span class="live">LIVE</span>';
  }
}

function updateClock() {
  const now = new Date();
  const et = now.toLocaleString('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric' });
  const time = now.toLocaleString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit', hour12: true });
  document.getElementById('topbarTime').innerHTML = et + ' at<br>' + time;
}

function timeAgo(isoStr) {
  if (!isoStr) return '--';
  const d = new Date(isoStr);
  const now = new Date();
  const mins = Math.floor((now - d) / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return mins + 'm';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h';
  return Math.floor(hrs / 24) + 'd';
}

function commaFmt(n) { return (n || 0).toLocaleString(); }

function roiSign(v) { return v > 0 ? '+' + v : '' + v; }

function fmtDate(d) {
  if (!d) return '--';
  const parts = d.split('-');
  return parts.length >= 3 ? parts[1] + '-' + parts[2] : d;
}

function commentaryHtml(type, label, text) {
  const icons = { insight: '&#9670;', warning: '&#9888;', alert: '&#9679;' };
  return '<div class="commentary ' + type + '"><div class="commentary-label">' + (icons[type] || '&#9670;') + ' ' + label + '</div><div class="commentary-text">' + text + '</div></div>';
}

function bucketFillClass(rate) {
  if (rate >= 65) return 'great';
  if (rate >= 50) return 'good';
  if (rate >= 40) return 'mid';
  return 'bad';
}

function bucketRateColor(rate) {
  if (rate >= 50) return 'green';
  if (rate >= 40) return 'amber';
  return 'red';
}

function bucketRowHtml(range, record, rate) {
  const noData = record === '0-0';
  const rateStr = noData ? '--' : rate + '%';
  const colorClass = noData ? '' : bucketRateColor(rate);
  const fillClass = noData ? '' : bucketFillClass(rate);
  const width = noData ? 0 : rate;
  return '<div class="bkt"><div class="bkt-range">' + range + '</div><div class="bkt-track"><div class="bkt-fill ' + fillClass + '" style="width:' + width + '%"></div></div><div class="bkt-result">' + record + ' <span class="' + colorClass + '">(' + rateStr + ')</span></div></div>';
}

function pickRowHtml(p) {
  const isW = p.result === 'win';
  const isL = p.result === 'loss';
  const rLabel = isW ? 'W' : (isL ? 'L' : '--');
  const rColor = isW ? 'color:var(--green)' : (isL ? 'color:var(--red)' : 'color:var(--t4)');
  const pnl = p.pnl != null ? (p.pnl > 0 ? '+' + p.pnl : '' + p.pnl) : '--';
  const pnlColor = p.pnl > 0 ? 'color:var(--green)' : (p.pnl < 0 ? 'color:var(--red)' : 'color:var(--t4)');
  return '<div class="pk"><span class="pk-date">' + fmtDate(p.date) + '</span><span class="pk-name">' + (p.side || '--') + '</span><span class="pk-edge">' + (p.edge || '--') + '%</span><span class="pk-res" style="' + rColor + '">' + rLabel + '</span><span class="pk-pnl" style="' + pnlColor + '">' + pnl + '</span></div>';
}

function svcDot(health, key) {
  const s = health[key];
  if (!s) return 'background:var(--t4)';
  if (s.status === 'ok') return 'background:var(--green)';
  if (s.status === 'warn') return 'background:var(--amber)';
  return 'background:var(--red)';
}

function svcLatency(health, key, fallback) {
  const s = health[key];
  if (!s) return fallback || '--';
  if (s.latency_ms != null) return s.latency_ms + 'ms';
  return fallback || (s.status === 'ok' ? 'OK' : '--');
}

function cleanCronName(name) {
  return (name || '').replace(/^SP\s*[-–—]\s*/i, '').replace(/^SP\s+/i, '');
}

// Client-side commentary computation
function computePulseCommentary(cc) {
  const c = cc.commentary?.pulse?.[0];
  if (c) return c;
  return { type: 'insight', label: 'Daily Read', text: 'Loading data...' };
}

function computeNbaCommentary(cc) {
  const c = cc.commentary?.nba?.[0];
  if (c) return c;
  return { type: 'insight', label: 'NBA Model Read', text: '' };
}

function computeMlbCommentary(cc) {
  const c = cc.commentary?.mlb?.[0];
  if (c) return c;
  return { type: 'warning', label: 'MLB Model Read', text: '' };
}

function computeRevenueCommentary(cc) {
  const c = cc.commentary?.revenue?.[0];
  if (c) return c;
  return { type: 'insight', label: 'Revenue Read', text: '' };
}

function computeInfraCommentary(cronData) {
  if (!cronData || !cronData.jobs) return { type: 'insight', label: 'Infra Note', text: 'No cron data available.' };
  const jobs = cronData.jobs;
  const okCount = jobs.filter(j => j.health === 'ok').length;
  const failedJobs = jobs.filter(j => ['failed', 'error', 'down'].includes(j.health));
  const parts = [];
  let type = 'insight';
  if (failedJobs.length > 0) {
    type = 'alert';
    parts.push('<strong>' + cleanCronName(failedJobs[0].name) + ' failed.</strong> Check logs.');
  } else if (okCount === jobs.length) {
    parts.push('All <strong>' + jobs.length + '</strong> cron jobs healthy.');
  }
  const ambJobs = jobs.filter(j => j.health === 'warn' || j.health === 'amber');
  for (const j of ambJobs.slice(0, 2)) {
    const n = cleanCronName(j.name);
    if (n.toLowerCase().includes('refresh') || n.toLowerCase().includes('closing')) {
      parts.push('<strong>' + n + '</strong> show amber because they last ran ' + Math.round(j.hours_ago || 0) + 'h ago (expected -- they only fire during game windows).');
      if (type === 'insight') type = 'warning';
    }
  }
  if (failedJobs.length === 0) parts.push('No failed jobs in the last 7 days.');
  return { type, label: 'Infra Note', text: parts.join(' ') };
}

function computeEngagementCommentary(eng, totalUsers) {
  if (!eng) return { type: 'insight', label: 'Engagement Read', text: 'No engagement data.' };
  const active = eng.active_users_7d || 0;
  const total = totalUsers || 0;
  const parts = [];
  let type = 'insight';
  if (total > 0) {
    const rate = (active / total * 100).toFixed(1);
    if (rate < 30) type = 'warning';
    if (rate < 25) {
      parts.push('<strong>' + active + ' active users out of ' + total + ' signups = ' + rate + '% activation rate.</strong> That\'s the number to watch.');
    } else if (rate <= 50) {
      parts.push('Activation at <strong>' + rate + '%</strong>. Improving but not yet healthy.');
    } else {
      parts.push('Activation at <strong>' + rate + '%</strong>. Healthy.');
    }
  }
  const spu = eng.avg_sessions_per_user || 0;
  if (spu > 30) parts.push('Users who do engage are deeply engaged -- <strong>' + spu.toFixed(1) + '</strong> sessions per user over 7 days is unusually high.');
  const ret = eng.retention || {};
  const d1 = ret.d1_rate_pct || 0;
  const d7 = ret.d7_rate_pct || 0;
  const d7Elig = ret.d7_eligible || 0;
  if (d1 > 0) {
    if (d1 < 45) {
      parts.push('<strong>D1 at ' + d1 + '%</strong> means more than half of new signups don\'t return the next day. Onboarding flow or first-session value may need work.');
      if (d1 < 40) type = 'warning';
    } else {
      parts.push('D1 retention at <strong>' + d1 + '%</strong> -- acceptable for early stage.');
    }
  }
  if (d7 > 0 || d7Elig > 0) {
    const tiny = d7Elig < 5 ? ' but the sample is tiny (<strong>' + d7Elig + '</strong>).' : '.';
    if (d7 > 60) parts.push('<strong>D7 retention at ' + d7 + '%</strong> is excellent' + tiny);
    else if (d7 < 40) { parts.push('<strong>D7 retention at ' + d7 + '%</strong> is a red flag' + tiny); type = 'alert'; }
    else parts.push('D7 retention at <strong>' + d7 + '%</strong>' + tiny);
  }
  if (eng.sessions_by_day && eng.sessions_by_day.length >= 3) {
    const vals = eng.sessions_by_day.map(d => d.sessions || d.count || 0);
    let run = 1;
    for (let i = vals.length - 1; i > 0; i--) {
      if (vals[i] < vals[i-1]) run++; else break;
    }
    if (run >= 3) { parts.push('Sessions trending down over the last <strong>' + run + '</strong> days.'); if (type === 'insight') type = 'warning'; }
  }
  return { type, label: 'Engagement Read', text: parts.join(' ') || 'Insufficient engagement data.' };
}

function computeFeatureCommentary(eng) {
  if (!eng || !eng.feature_adoption) return { type: 'insight', label: 'Feature Note', text: 'No feature data.' };
  const fa = eng.feature_adoption;
  const parts = [];
  let type = 'insight';
  const journal = (fa.view_article || {}).pct_of_active || 0;
  const scan = (fa.view_market_scan || {}).pct_of_active || 0;
  const bet = (fa.tap_bet_link || {}).pct_of_active || 0;
  if (journal > scan && (journal || scan)) parts.push('<strong>Journal is the most-used feature</strong> at ' + journal + '%, outpacing the core signals product. This is good for retention (content keeps people coming back) but raises the question: are users discovering and engaging with the actual picks?');
  if (bet < 25 && (eng.active_users_7d || 0) > 0) { parts.push('<strong>Bet Link Taps at ' + bet + '%</strong> -- only ' + Math.round(bet / 100 * (eng.active_users_7d || 1)) + ' of ' + (eng.active_users_7d || 0) + ' active users are tapping through to place bets. The gap between reading signals and acting on them may be a trust or UX issue.'); type = 'warning'; }
  else if (bet > 40) parts.push('Bet link taps at <strong>' + bet + '%</strong> -- users are acting on signals.');
  return { type, label: 'Feature Note', text: parts.join(' ') || 'No feature usage patterns detected.' };
}

function computeTrafficCommentary(cf, totalSignups) {
  if (!cf || !cf.marketing) return null;
  const m = cf.marketing;
  const visitors = m.uniques || 0;
  const views = m.pageViews || 0;
  const ppv = visitors > 0 ? (views / visitors).toFixed(1) : '0';
  const parts = ['<strong>' + visitors + ' unique visitors over 7 days</strong> with a ' + ppv + ' pages/visit average.'];
  if (totalSignups > 0 && visitors > 0) {
    const conv = (totalSignups / visitors * 100).toFixed(0);
    parts.push('Conversion from landing visit to signup is running at roughly <strong>' + conv + '%</strong> (' + totalSignups + ' signups / ~' + visitors + ' visitors).');
    if (conv > 20) parts.push('Strong for a cold launch with no paid acquisition.');
  }
  return { type: 'insight', label: 'Traffic Note', text: parts.join(' ') };
}

async function loadData() {
  updateClock();
  setInterval(updateClock, 30000);
  try {
    const safeFetch = url => fetch(url).then(r => {
      if (!r.ok) { console.warn(url, r.status); return null; }
      return r.json();
    }).catch(e => { console.error(url, e); return null; });
    const [ccR, healthR, cronR, funnelR, engR, cfR, mrrR] = await Promise.all([
      safeFetch('/api/admin/command-center'),
      safeFetch('/api/admin/health-checks'),
      safeFetch('/api/admin/cron-health'),
      safeFetch('/api/admin/funnel-metrics'),
      safeFetch('/api/admin/engagement'),
      safeFetch('/api/admin/cf-analytics'),
      safeFetch('/api/admin/mrr-history'),
    ]);
    renderPulse(ccR, healthR, cfR, engR);
    renderModels(ccR);
    renderInfra(cronR, healthR, ccR, cfR);
    renderBusiness(ccR, funnelR, engR, mrrR);
    loadAnalytics('week');
  } catch (e) {
    console.error('Load failed:', e);
  }
}

let _analyticsPeriod = 'week';
let _analyticsRefreshTimer = null;
async function loadAnalytics(period) {
  if (period) _analyticsPeriod = period;
  const el = document.getElementById('analyticsContent');
  if (!el) return;
  const safeFetch = url => fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);
  const [cfR, appR, contentR] = await Promise.all([
    safeFetch('/api/admin/cf-analytics?period=' + _analyticsPeriod),
    safeFetch('/api/admin/app-analytics?period=' + _analyticsPeriod),
    safeFetch('/api/admin/content-analytics?period=' + _analyticsPeriod),
  ]);
  renderAnalytics(cfR, appR, contentR);
}

function renderAnalytics(cf, app, content) {
  const el = document.getElementById('analyticsContent');
  if (!el) return;
  let h = '';

  const periodLabel = _analyticsPeriod === 'day' ? 'Today' : _analyticsPeriod === 'month' ? '30 Days' : '7 Days';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  h += '<div class="sh" style="margin:0">Web Analytics</div>';
  h += '<div style="display:flex;gap:4px;align-items:center">';
  ['day','week','month'].forEach(p => {
    const label = p === 'day' ? '1D' : p === 'week' ? '7D' : '30D';
    const active = _analyticsPeriod === p;
    h += '<button onclick="loadAnalytics(\'' + p + '\')" style="padding:5px 12px;border-radius:6px;border:1px solid ' + (active ? 'var(--green)' : 'var(--s2)') + ';background:' + (active ? 'rgba(90,158,114,0.12)' : 'transparent') + ';color:' + (active ? 'var(--green)' : 'var(--t4)') + ';font-family:var(--mono);font-size:10px;font-weight:600;cursor:pointer;letter-spacing:0.08em">' + label + '</button>';
  });
  h += '</div></div>';

  const cfM = (cf && cf.marketing) ? cf.marketing : null;
  const cfViews = cfM ? cfM.pageViews : 0;
  const cfUniques = cfM ? cfM.uniques : 0;
  const appViews = app ? app.pageViews : 0;
  const appUniques = app ? app.uniques : 0;
  const contentViews = content ? content.pageViews : 0;
  const contentUniques = content ? content.uniques : 0;
  const totalViews = cfViews + appViews + contentViews;
  const totalUniques = cfUniques + appUniques + contentUniques;

  h += '<div class="sg c3" style="margin-bottom:12px">';
  h += '<div class="sc"><div class="sc-label">Total Views</div><div class="sc-val">' + commaFmt(totalViews) + '</div></div>';
  h += '<div class="sc"><div class="sc-label">Total Uniques</div><div class="sc-val">' + commaFmt(totalUniques) + '</div></div>';
  h += '<div class="sc"><div class="sc-label">Period</div><div class="sc-val" style="font-size:13px">' + periodLabel + '</div></div>';
  h += '</div>';

  // --- Daily chart combining all three surfaces ---
  const allDates = new Set();
  const cfDaily = {}, appDaily = {}, contentDaily = {};
  if (cfM && cfM.daily) cfM.daily.forEach(d => { cfDaily[d.date] = d.views || 0; allDates.add(d.date); });
  if (app && app.daily) app.daily.forEach(d => { appDaily[d.date] = d.views || 0; allDates.add(d.date); });
  if (content && content.daily) content.daily.forEach(d => { contentDaily[d.date] = d.views || 0; allDates.add(d.date); });
  const sortedDates = [...allDates].sort();

  if (sortedDates.length > 0) {
    const maxV = Math.max(...sortedDates.map(d => (cfDaily[d]||0) + (appDaily[d]||0) + (contentDaily[d]||0)), 1);
    h += '<div style="margin-bottom:6px"><span style="font-size:10px;color:var(--t4);font-family:var(--mono);letter-spacing:0.1em;text-transform:uppercase">Daily Views — All Surfaces</span></div>';
    h += '<div style="display:flex;align-items:flex-end;gap:2px;height:80px;margin-bottom:2px">';
    for (const d of sortedDates) {
      const cfV = cfDaily[d] || 0, appV = appDaily[d] || 0, conV = contentDaily[d] || 0;
      const total = cfV + appV + conV;
      const pct = Math.max(4, (total / maxV) * 100);
      const cfPct = total > 0 ? (cfV / total * 100) : 33;
      const appPct = total > 0 ? (appV / total * 100) : 33;
      h += '<div style="flex:1;height:' + pct + '%;display:flex;flex-direction:column;border-radius:3px 3px 0 0;overflow:hidden" title="' + d + ': ' + total + ' views">';
      h += '<div style="flex:' + cfPct + ';background:var(--blue);opacity:0.7"></div>';
      h += '<div style="flex:' + appPct + ';background:var(--green);opacity:0.6"></div>';
      h += '<div style="flex:' + (100 - cfPct - appPct) + ';background:#D4A843;opacity:0.5"></div>';
      h += '</div>';
    }
    h += '</div>';
    h += '<div style="display:flex;justify-content:space-between;font-size:7px;color:var(--t5);margin-bottom:4px">';
    for (const d of sortedDates) { h += '<span>' + d.slice(5).replace('-','/') + '</span>'; }
    h += '</div>';
    h += '<div style="display:flex;gap:12px;font-size:9px;color:var(--t4);font-family:var(--mono);margin-bottom:14px">';
    h += '<span><span style="display:inline-block;width:8px;height:8px;background:var(--blue);opacity:0.7;border-radius:2px;margin-right:3px;vertical-align:middle"></span>Landing</span>';
    h += '<span><span style="display:inline-block;width:8px;height:8px;background:var(--green);opacity:0.6;border-radius:2px;margin-right:3px;vertical-align:middle"></span>App</span>';
    h += '<span><span style="display:inline-block;width:8px;height:8px;background:#D4A843;opacity:0.5;border-radius:2px;margin-right:3px;vertical-align:middle"></span>Content</span>';
    h += '</div>';
  }

  // --- Three surface cards ---
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">';

  // Landing card
  h += '<div class="sc" style="padding:14px">';
  h += '<div style="font-size:10px;color:var(--blue);font-family:var(--mono);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Landing</div>';
  h += '<div style="font-size:9px;color:var(--t5);margin-bottom:2px">sharppicks.ai</div>';
  h += '<div class="sg c2" style="margin:0">';
  h += '<div><div class="sc-label">Views</div><div class="sc-val" style="font-size:16px">' + commaFmt(cfViews) + '</div></div>';
  h += '<div><div class="sc-label">Uniques</div><div class="sc-val" style="font-size:16px">' + commaFmt(cfUniques) + '</div></div>';
  h += '</div>';
  if (cfM && cfM.topReferrers && cfM.topReferrers.length > 0) {
    h += '<div style="margin-top:8px;font-size:9px;color:var(--t4)">Top ref: <span style="color:var(--t2)">' + cfM.topReferrers[0].referrer + '</span></div>';
  }
  if (cfM && cfM.topPaths && cfM.topPaths.length > 0) {
    h += '<table class="content-table" style="margin-top:6px"><thead><tr><th style="font-size:9px">Page</th><th style="font-size:9px">Views</th></tr></thead><tbody>';
    for (const p of cfM.topPaths.slice(0, 5)) {
      h += '<tr><td style="font-size:9px">' + (p.path || '/') + '</td><td style="font-size:9px">' + (p.count || 0) + '</td></tr>';
    }
    h += '</tbody></table>';
  }
  h += '</div>';

  // App card
  h += '<div class="sc" style="padding:14px">';
  h += '<div style="font-size:10px;color:var(--green);font-family:var(--mono);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">App</div>';
  h += '<div style="font-size:9px;color:var(--t5);margin-bottom:2px">app.sharppicks.ai</div>';
  h += '<div class="sg c2" style="margin:0">';
  h += '<div><div class="sc-label">Views</div><div class="sc-val" style="font-size:16px">' + commaFmt(appViews) + '</div></div>';
  h += '<div><div class="sc-label">Uniques</div><div class="sc-val" style="font-size:16px">' + commaFmt(appUniques) + '</div></div>';
  h += '</div>';
  if (app && app.requests != null) {
    h += '<div style="margin-top:8px;font-size:9px;color:var(--t4)">API calls: <span style="color:var(--t2)">' + commaFmt(app.requests) + '</span></div>';
  }
  if (app && app.topPaths && app.topPaths.length > 0) {
    h += '<table class="content-table" style="margin-top:6px"><thead><tr><th style="font-size:9px">Endpoint</th><th style="font-size:9px">Hits</th></tr></thead><tbody>';
    for (const p of app.topPaths.slice(0, 5)) {
      h += '<tr><td style="font-size:9px">' + (p.path || '/') + '</td><td style="font-size:9px">' + (p.count || 0) + '</td></tr>';
    }
    h += '</tbody></table>';
  }
  h += '</div>';

  // Content card
  h += '<div class="sc" style="padding:14px">';
  h += '<div style="font-size:10px;color:#D4A843;font-family:var(--mono);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Content</div>';

  h += '<div class="sg c2" style="margin:0">';
  h += '<div><div class="sc-label">Views</div><div class="sc-val" style="font-size:16px">' + commaFmt(contentViews) + '</div></div>';
  h += '<div><div class="sc-label">Uniques</div><div class="sc-val" style="font-size:16px">' + commaFmt(contentUniques) + '</div></div>';
  h += '</div>';
  if (content && content.totalPages) {
    h += '<div style="margin-top:8px;font-size:9px;color:var(--t4)">Total pages: <span style="color:var(--t2)">' + content.totalPages + '</span></div>';
  }
  if (content && content.topPaths && content.topPaths.length > 0) {
    h += '<table class="content-table" style="margin-top:6px"><thead><tr><th style="font-size:9px">Page</th><th style="font-size:9px">Views</th></tr></thead><tbody>';
    for (const p of content.topPaths.slice(0, 5)) {
      h += '<tr><td style="font-size:9px">' + (p.path || '/') + '</td><td style="font-size:9px">' + (p.count || 0) + '</td></tr>';
    }
    h += '</tbody></table>';

  h += '</div>';

  h += '</div>';

  // Referrer table from CF
  if (cfM && cfM.topReferrers && cfM.topReferrers.length > 1) {

function renderPipeline(stats, picks, sport) {
  const runs = stats.model_runs || [];
  const lastRun = runs[0];
  const todayPick = picks.length > 0 ? picks[0] : null;
  const hasPick = todayPick && todayPick.result !== 'pass';
  let p = '<div class="pipeline">';

  if (hasPick) {
    const dur = lastRun?.duration_ms ? (lastRun.duration_ms / 1000).toFixed(1) : '--';
    const games = lastRun?.games_analyzed || '--';
    const edge = todayPick.edge ? '+' + todayPick.edge + '%' : '--';
    p += '<div class="pipe-top"><div class="pipe-status"><div class="pipe-dot"></div><div class="pipe-title">Pick Published</div></div><div class="pipe-date">' + (lastRun?.date || '') + '</div></div>';
    p += '<div class="pipe-grid"><div class="pipe-cell"><div class="pipe-cell-label">Games</div><div class="pipe-cell-val" style="color:var(--t1)">' + games + '</div></div><div class="pipe-cell"><div class="pipe-cell-label">Result</div><div class="pipe-cell-val green">PICK</div></div><div class="pipe-cell"><div class="pipe-cell-label">Edge</div><div class="pipe-cell-val green">' + edge + '</div></div><div class="pipe-cell"><div class="pipe-cell-label">Duration</div><div class="pipe-cell-val" style="color:var(--t2)">' + dur + 's</div></div></div>';
    p += '<div class="pick-card"><div class="pick-name">' + (todayPick.side || '--') + '</div><div class="pick-meta">' + sport.toUpperCase() + ' &middot; Edge ' + edge + ' &middot; Book ' + (todayPick.sportsbook || '--') + '</div></div>';
  } else if (lastRun && lastRun.pick_generated === false) {
    const dur = lastRun.duration_ms ? (lastRun.duration_ms / 1000).toFixed(1) : '--';
    p += '<div class="pipe-top"><div class="pipe-status"><div class="pipe-dot" style="background:var(--amber)"></div><div class="pipe-title">Pass Day</div></div></div>';
    p += '<div class="pipe-grid"><div class="pipe-cell"><div class="pipe-cell-label">Games</div><div class="pipe-cell-val" style="color:var(--t1)">' + (lastRun.games_analyzed || '--') + '</div></div><div class="pipe-cell"><div class="pipe-cell-label">Result</div><div class="pipe-cell-val" style="color:var(--amber)">PASS</div></div><div class="pipe-cell"><div class="pipe-cell-label">Edge</div><div class="pipe-cell-val" style="color:var(--t4)">--</div></div><div class="pipe-cell"><div class="pipe-cell-label">Duration</div><div class="pipe-cell-val" style="color:var(--t2)">' + dur + 's</div></div></div>';
  } else {
    p += '<div class="pipe-top"><div class="pipe-status"><div class="pipe-dot" style="background:var(--t4)"></div><div class="pipe-title">Awaiting Model Run</div></div></div>';
  }
  p += '</div>';
  return p;
}

function renderTrafficChart(cf) {
  const m = cf.marketing || {};
  const daily = m.daily || [];
  const visitors = m.uniques || 0;
  const views = m.pageViews || 0;
  const ppv = visitors > 0 ? (views / visitors).toFixed(1) : '0';
  const topPath = (m.topPaths && m.topPaths[0]) || {};

  let h = '<div class="chart-box">';
  h += '<div style="display:flex;justify-content:space-between;margin-bottom:8px">';
  h += '<div style="text-align:center"><div style="font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t4)">Visitors</div><div style="font-size:18px;font-weight:700;color:var(--t1)">' + visitors + '</div><div style="font-size:9px;color:var(--t4)">last 7d</div></div>';
  h += '<div style="text-align:center"><div style="font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t4)">Views</div><div style="font-size:18px;font-weight:700;color:var(--t1)">' + views + '</div><div style="font-size:9px;color:var(--t4)">' + ppv + '/visit</div></div>';
  h += '<div style="text-align:center"><div style="font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--t4)">Top Page</div><div style="font-size:14px;font-weight:600;color:var(--t2)">' + (topPath.path || '/') + '</div><div style="font-size:9px;color:var(--t4)">' + (topPath.count || 0) + ' views</div></div>';
  h += '</div>';

  if (daily.length > 1) {
    const vals = daily.map(d => d.uniques || d.views || 0);
    const maxVal = Math.max(...vals, 1);
    const width = 340;
    const height = 80;
    const step = width / (vals.length - 1);
    let points = vals.map((v, i) => (i * step) + ',' + (height - (v / maxVal * (height - 10) + 5))).join(' ');
    let polyPoints = '0,' + height + ' ' + points + ' ' + width + ',' + height;
    const lastX = (vals.length - 1) * step;
    const lastY = height - (vals[vals.length - 1] / maxVal * (height - 10) + 5);
    h += '<div class="chart-area"><svg width="100%" height="80" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none"><polygon points="' + polyPoints + '" fill="rgba(90,158,114,0.06)"/><polyline points="' + points + '" fill="none" stroke="#5A9E72" stroke-width="1.5"/><circle cx="' + lastX + '" cy="' + lastY + '" r="3" fill="#5A9E72"/></svg></div>';
    h += '<div class="chart-labels">';
    for (const d of daily) {
      const label = d.date ? d.date.slice(5).replace('-', '/') : '';
      h += '<span>' + label + '</span>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

let bizFilter = 'all';

function sortBizUsers(col) {

  else { bizSort = col; bizSortAsc = false; }

}

let _allBizUsers = [];

function renderUserTable() {
  let users = _allBizUsers.slice();

  if (bizFilter === 'paid') users = users.filter(u => ['pro','active','founding'].includes(u.tier) || u.founding);
  else if (bizFilter === 'free') users = users.filter(u => u.tier === 'free' && !u.founding);
  else if (bizFilter === 'founding') users = users.filter(u => u.founding);
  else if (bizFilter === 'active') users = users.filter(u => u.is_active);
  else if (bizFilter === 'unverified') users = users.filter(u => !u.email_verified);
  else if (bizFilter === 'atrisk') users = users.filter(u => u.is_at_risk);
  else if (bizFilter === 'trial') users = users.filter(u => u.tier === 'trialing' || u.tier === 'trial');
  else if (bizFilter === 'power') users = users.filter(u => u.is_power);
  else if (bizFilter === 'new') users = users.filter(u => u.signed_up && (Date.now() - new Date(u.signed_up).getTime()) < 7 * 86400000);

  users.sort((a, b) => {
    let va, vb;
    if (bizSort === 'sessions') { va = a.sessions_7d || 0; vb = b.sessions_7d || 0; }
    else if (bizSort === 'email') { va = (a.email || '').toLowerCase(); vb = (b.email || '').toLowerCase(); return bizSortAsc ? va.localeCompare(vb) : vb.localeCompare(va); }
    else if (bizSort === 'signed_up') { va = a.signed_up || ''; vb = b.signed_up || ''; return bizSortAsc ? va.localeCompare(vb) : vb.localeCompare(va); }
    else { va = a.last_seen_iso || ''; vb = b.last_seen_iso || ''; return bizSortAsc ? va.localeCompare(vb) : vb.localeCompare(va); }
    return bizSortAsc ? va - vb : vb - va;
  });

  let t = '<div style="overflow-x:auto;margin-bottom:10px"><table class="user-table" style="min-width:600px"><caption style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">User detail table</caption><thead><tr>';
  t += '<th onclick="sortBizUsers(\'email\')">Email</th>';
  t += '<th onclick="sortBizUsers(\'tier\')">Status</th>';
  t += '<th>Verified</th>';
  t += '<th onclick="sortBizUsers(\'signed_up\')">First Seen</th>';
  t += '<th onclick="sortBizUsers(\'last_active\')">Last Active</th>';
  t += '<th onclick="sortBizUsers(\'sessions\')">Sessions</th>';
  t += '<th>Bet Taps</th>';
  t += '</tr></thead><tbody>';

  for (const u of users) {
    const tier = u.tier || 'free';
    const isFounding = u.founding;
    let tierLabel, tierClass;
    if (isFounding && u.founding_number) { tierLabel = 'F#' + u.founding_number; tierClass = 'founding'; }
    else if (tier === 'pro' || tier === 'active') { tierLabel = 'PRO'; tierClass = 'pro'; }
    else if (tier === 'trialing' || tier === 'trial') { tierLabel = 'TRIAL'; tierClass = 'trial'; }
    else { tierLabel = 'FREE'; tierClass = 'free-badge'; }

    let rowClass = '';
    if (isFounding) rowClass += ' founding-row';
    if (!u.is_active && u.sessions_7d === 0) rowClass += ' inactive-row';
    if (!u.email_verified) rowClass += ' unverified-row';

    const lastColor = u.last_active === 'never' ? 'color:var(--red)' : (u.is_active ? 'color:var(--green)' : '');
    const firstSeen = u.signed_up ? new Date(u.signed_up).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '--';
    const betTapLabel = u.top_feature === 'Bet Link' ? (u.sessions_7d > 0 ? '&#10003;' : '--') : '--';

    t += '<tr class="' + rowClass.trim() + '">';
    t += '<td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (u.email || '') + '</td>';
    t += '<td><span class="status-badge ' + tierClass + '">' + tierLabel + '</span></td>';
    t += '<td>' + (u.email_verified ? '<span class="dot-g"></span>' : '<span class="dot-r"></span>') + '</td>';
    t += '<td style="white-space:nowrap">' + firstSeen + '</td>';
    t += '<td style="' + lastColor + '">' + (u.last_active || '--') + '</td>';
    t += '<td>' + (u.sessions_7d || 0) + '</td>';
    t += '<td style="text-align:center;color:var(--t4)">' + betTapLabel + '</td>';
    t += '</tr>';
  }
  t += '</tbody></table></div>';
  document.getElementById('userTableContainer').innerHTML = t;
}

// ── Business Tab v2 — Helpers ──

function bizStatusFor(key, pct) {
  const t = { d7Retention: {g:40,w:25}, activation: {g:35,w:20}, signupToPaid: {g:15,w:8}, tapThrough: {g:20,w:10}, verification: {g:90,w:75} };
  const th = t[key];
  if (!th) return 'neutral';
  if (pct >= th.g) return 'good';
  if (pct >= th.w) return 'watch';
  return 'alert';
}

function bizDelta(current, prior) {
  if (prior === 0 && current === 0) return { dir: 'flat', pct: 0 };
  if (prior === 0) return { dir: 'up', pct: 100 };
  const change = ((current - prior) / prior) * 100;
  return { dir: change > 0.5 ? 'up' : change < -0.5 ? 'down' : 'flat', pct: Math.round(change * 10) / 10 };
}

function bizDeltaHtml(d) {
  const arrow = d.dir === 'up' ? '&#9650;' : d.dir === 'down' ? '&#9660;' : '&#8212;';
  const sign = d.pct > 0 ? '+' : '';
  return '<div class="biz-kpi-delta ' + d.dir + '">' + arrow + ' ' + sign + d.pct + '%</div>';
}

function bizFmtDur(secs) {
  if (secs == null) return '--';
  const m = Math.floor(secs / 60), s = Math.round(secs % 60);
  return m + 'm ' + s + 's';
}

function bizIsoWeekStart(iso) {
  const d = new Date(iso);
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() - (day - 1));
  d.setUTCHours(0, 0, 0, 0);
  return d.toISOString().slice(0, 10);
}

function bizWeekLabel(isoDate) {
  const d = new Date(isoDate);
  const m = d.toLocaleString('en-US', { month: 'short', timeZone: 'UTC' });
  return 'Wk ' + m + ' ' + d.getUTCDate();
}

function bizBuildCohorts(users, weeks) {
  weeks = weeks || 4;
  const buckets = {};
  for (const u of users) {
    if (!u.signed_up) continue;
    const wk = bizIsoWeekStart(u.signed_up);
    if (!buckets[wk]) buckets[wk] = [];
    buckets[wk].push(u);
  }
  return Object.entries(buckets)
    .sort(([a], [b]) => a < b ? 1 : -1)
    .slice(0, weeks)
    .map(([weekStart, group]) => {
      const signups = group.length;
      const active7d = group.filter(u => u.is_active).length;
      const paid = group.filter(u => ['pro','active'].includes(u.tier) || u.founding).length;
      return { weekStart, label: bizWeekLabel(weekStart), signups, active7d, paid };
    });
}

function bizEstimatePriorEngagement(sessionsByDay) {
  if (!sessionsByDay || sessionsByDay.length < 4) return null;
  const half = Math.floor(sessionsByDay.length / 2);
  const current = sessionsByDay.slice(half);
  const prior = sessionsByDay.slice(0, half);
  const sum = arr => arr.reduce((s, d) => s + (d.sessions || d.count || 0), 0);
  return { currentSessions: sum(current), priorSessions: sum(prior) };
}

  h += '</div>';

  // ═══ TODAY'S READS ═══
  const silentCount = allUsers.filter(u => !u.is_active && u.sessions_7d === 0).length;
  const unverifiedCount = verif.unverified || 0;
  const unverifiedList = verif.unverified_list || [];

  h += '<div class="biz-reads">';
  h += '<div class="biz-reads-title">TODAY\'S READS</div>';

  h += '<div class="biz-read" onclick="document.getElementById(\'section-funnel\')?.scrollIntoView({behavior:\'smooth\',block:\'start\'})">';
  h += '<div class="biz-read-dot ' + bizStatusFor('signupToPaid', signupPaidRate) + '"></div>';
  h += '<div class="biz-read-text"><strong>' + signupPaidRate + '%</strong> signup&rarr;paid conversion. ' + (foundingCount > 0 ? 'Founding $50 anchor is doing the work.' : '') + '</div>';
  h += '<div class="biz-read-arrow">&rarr;</div>';
  h += '</div>';

  h += '<div class="biz-read" onclick="document.getElementById(\'section-engagement\')?.scrollIntoView({behavior:\'smooth\',block:\'start\'})">';
  h += '<div class="biz-read-dot ' + bizStatusFor('d7Retention', d7) + '"></div>';
  h += '<div class="biz-read-text">D7 retention at <strong>' + d7 + '%</strong> &mdash; ' + silentCount + ' users silent this week. ' + (d7 < 25 ? 'Re-engagement push recommended.' : '') + '</div>';
  h += '<div class="biz-read-arrow">&rarr;</div>';
  h += '</div>';

  h += '<div class="biz-read" onclick="document.getElementById(\'section-funnel\')?.scrollIntoView({behavior:\'smooth\',block:\'start\'})">';
  h += '<div class="biz-read-dot ' + bizStatusFor('tapThrough', betPct) + '"></div>';
  h += '<div class="biz-read-text">Bet Link Taps at <strong>' + betPct + '%</strong>. Users are reading signals but not acting &mdash; trust or UX gap.</div>';
  h += '<div class="biz-read-arrow">&rarr;</div>';
  h += '</div>';

  const vStatus = bizStatusFor('verification', verifPct);
  h += '<div class="biz-read" style="cursor:default">';
  h += '<div class="biz-read-dot ' + vStatus + '"></div>';
  h += '<div class="biz-read-text">Verification at <strong>' + verifPct + '%</strong>. ' + unverifiedCount + ' unverified accounts.';
  if (unverifiedList.length > 0) {
    h += '<div class="biz-expandable"><button class="biz-expand-btn" onclick="event.stopPropagation();this.nextElementSibling.classList.toggle(\'open\');this.textContent=this.nextElementSibling.classList.contains(\'open\')?\'Hide\':\'View ' + unverifiedCount + ' unverified\'">View ' + unverifiedCount + ' unverified</button>';
    h += '<div class="biz-expand-list">';
    for (const u of unverifiedList.slice(0, 12)) {
      const dt = u.signed_up ? new Date(u.signed_up).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '--';
      h += '<div class="biz-expand-item">' + (u.email || '') + '<span>' + (u.tier || 'Free') + ' &middot; ' + dt + '</span></div>';
    }
    h += '</div></div>';
  }
  h += '</div>';
  h += '</div>';

  h += '</div>';

  // ═══ TWO-COLUMN GRID ═══
  h += '<div class="biz-grid">';

  // ─── LEFT COLUMN ───
  h += '<div class="biz-left">';

  // Conversion Funnel
  const verified = verif.verified || 0;
  const betTapUsers = (fa.tap_bet_link || {}).users || 0;
  const funnelStages = [
    { label: 'Signups', count: totalSignups },
    { label: 'Verified', count: verified },
    { label: 'Activated', count: active7d },
    { label: 'Bet Tap', count: betTapUsers },
    { label: 'Paid', count: totalPaid },
  ];
  let worstDrop = 0, worstIdx = -1;
  for (let i = 1; i < funnelStages.length; i++) {
    const prev = funnelStages[i-1].count;
    if (prev <= 0) continue;
    const drop = (prev - funnelStages[i].count) / prev;
    if (drop > worstDrop) { worstDrop = drop; worstIdx = i; }
  }

  h += '<div class="sh" id="section-funnel">Conversion Funnel</div>';
  h += '<div class="biz-funnel">';
  for (let i = 0; i < funnelStages.length; i++) {
    const s = funnelStages[i];
    const barPct = totalSignups > 0 ? Math.max(2, s.count / totalSignups * 100) : 2;
    const stagePct = i === 0 ? '' : (funnelStages[i-1].count > 0 ? (s.count / funnelStages[i-1].count * 100).toFixed(0) + '%' : '0%');
    const watchClass = i === worstIdx ? ' watch' : '';
    h += '<div class="biz-funnel-stage"' + (i === worstIdx ? ' role="button" aria-label="Worst drop: ' + s.label + '"' : '') + '>';
    h += '<div class="biz-funnel-label">' + s.label + '</div>';
    h += '<div class="biz-funnel-bar"><div class="biz-funnel-fill' + watchClass + '" style="width:' + barPct + '%"><span class="biz-funnel-count">' + s.count + '</span></div></div>';
    h += '<div class="biz-funnel-pct">' + stagePct + '</div>';
    h += '</div>';
  }
  h += '</div>';

  // Revenue Trend (MRR sparkline)
  if (mrrData && mrrData.history && mrrData.history.length > 1) {
    h += '<div class="sh">Revenue Trend</div>';
    h += '<div class="biz-sparkline">';
    const hist = mrrData.history.slice(-30);
    const vals = hist.map(d => d.mrr_cents / 100);
    const maxV = Math.max(...vals, 0.01);
    const width = 300, height = 50;
    const step = width / Math.max(vals.length - 1, 1);
    const pts = vals.map((v, i) => (i * step).toFixed(1) + ',' + (height - (v / maxV * (height - 6) + 3)).toFixed(1));
    const polyFill = '0,' + height + ' ' + pts.join(' ') + ' ' + width + ',' + height;
    h += '<svg width="100%" height="' + height + '" viewBox="0 0 ' + width + ' ' + height + '" preserveAspectRatio="none" style="margin-bottom:6px">';
    h += '<polygon points="' + polyFill + '" fill="rgba(90,158,114,0.06)"/>';
    h += '<polyline points="' + pts.join(' ') + '" fill="none" stroke="var(--green)" stroke-width="1.5"/>';
    const lastX = ((vals.length - 1) * step).toFixed(1);
    const lastY = (height - (vals[vals.length-1] / maxV * (height - 6) + 3)).toFixed(1);
    h += '<circle cx="' + lastX + '" cy="' + lastY + '" r="3" fill="var(--green)"/>';
    h += '</svg>';
    h += '<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t4)">';
    h += '<span>MRR $' + mrrDollars.toFixed(2) + '</span>';
    h += '<span>ARR $' + arrDollars.toFixed(0) + '</span>';
    h += '</div></div>';
  }

  // Subscribers
  h += '<div class="sh">Subscribers</div>';
  h += '<div class="sg c4">';
  h += '<div class="sc"><div class="sc-label">Paid</div><div class="sc-val green">' + ((rev.monthly_subs || 0) + (rev.annual_subs || 0)) + '</div></div>';
  h += '<div class="sc"><div class="sc-label">Trial</div><div class="sc-val amber">' + (rev.trial_count || 0) + '</div></div>';
  h += '<div class="sc"><div class="sc-label">Free</div><div class="sc-val" style="color:var(--t2)">' + (rev.free_count || 0) + '</div></div>';
  h += '<div class="sc"><div class="sc-label">Founding</div><div class="sc-val green">' + foundingCount + '</div></div>';
  h += '</div>';

  // Engagement with deltas
  h += '<div class="sh" id="section-engagement">Engagement (7D)</div>';

  const durStr = bizFmtDur(avgDur);
  const priorEst = bizEstimatePriorEngagement(eng ? eng.sessions_by_day : null);

  h += '<div class="biz-engage-row">';
  h += '<div class="biz-engage-cell"><div class="biz-engage-label">Active</div><div class="biz-engage-val">' + (eng ? active7d : '--') + '</div>';
  if (eng) { h += '<div class="biz-engage-delta" style="font-size:9px;color:var(--t4)">' + commaFmt(eng.total_events) + ' events</div>'; }
  h += '</div>';
  h += '<div class="biz-engage-cell"><div class="biz-engage-label">Sessions</div><div class="biz-engage-val">' + (eng ? (eng.total_sessions_7d || 0) : '--') + '</div>';
  if (priorEst) {
    const sd = bizDelta(priorEst.currentSessions, priorEst.priorSessions);
    h += bizDeltaHtml(sd);
  } else if (eng) {
    h += '<div class="biz-engage-delta" style="color:var(--t4)">' + (eng.avg_sessions_per_user || '--') + '/user</div>';
  }
  h += '</div>';
  h += '<div class="biz-engage-cell"><div class="biz-engage-label">Avg Duration</div><div class="biz-engage-val" style="font-size:16px">' + durStr + '</div>';
  if (eng) { h += '<div class="biz-engage-delta" style="color:var(--t4)">' + (eng.avg_pages_per_session || '--') + ' pages</div>'; }
  h += '</div>';
  h += '</div>';

  // Sessions chart with rolling average
  if (eng && eng.sessions_by_day && eng.sessions_by_day.length > 0) {
    h += renderSessionsChart(eng.sessions_by_day);
  }

  // Retention + DAU
  h += '<div class="sh">Retention</div>';
  const dauArr = eng ? (eng.dau || []) : [];
  const avgDau = dauArr.length > 0 ? (dauArr.reduce((s, d) => s + (d.active_users || 0), 0) / dauArr.length).toFixed(1) : '--';
  const peakDau = dauArr.length > 0 ? Math.max(...dauArr.map(d => d.active_users || 0)) : '--';
  const d1 = ret.d1_rate_pct || 0;
  const d1Status = d1 >= 40 ? 'good' : d1 >= 25 ? 'watch' : 'alert';
  h += '<div class="sg c3">';
  h += '<div class="sc"><div class="sc-label">D1</div><div class="sc-val ' + (d1Status === 'good' ? 'green' : d1Status === 'alert' ? 'red' : 'amber') + '">' + d1 + '%</div><div class="sc-sub">' + (ret.d1_returned || 0) + '/' + (ret.d1_eligible || 0) + '</div></div>';
  h += '<div class="sc"><div class="sc-label">D7</div><div class="sc-val ' + (d7Status === 'good' ? 'green' : d7Status === 'alert' ? 'red' : 'amber') + '">' + d7 + '%</div><div class="sc-sub">' + (ret.d7_returned || 0) + '/' + (ret.d7_eligible || 0) + '</div></div>';
  h += '<div class="sc"><div class="sc-label">DAU</div><div class="sc-val">' + avgDau + '</div><div class="sc-sub">peak: ' + peakDau + '</div></div>';
  h += '</div>';

  // Cohorts
  const cohorts = bizBuildCohorts(allUsers);
  if (cohorts.length > 0) {
    h += '<div class="sh">Cohorts</div>';
    h += '<div class="table-scroll"><table class="biz-cohort"><caption class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Signup cohorts by week</caption>';
    h += '<thead><tr><th>Week</th><th>Signups</th><th>Active</th><th>Paid</th></tr></thead><tbody>';
    for (let i = 0; i < cohorts.length; i++) {
      const c = cohorts[i];
      const actPct = c.signups > 0 ? Math.round(c.active7d / c.signups * 100) : 0;
      const paidPct = c.signups > 0 ? Math.round(c.paid / c.signups * 100) : 0;
      const rowClass = i === 0 ? ' class="current-week"' : '';
      h += '<tr' + rowClass + '>';
      h += '<td>' + c.label + '</td>';
      h += '<td>' + c.signups + '</td>';
      h += '<td>' + c.active7d + ' <span style="color:var(--t4);font-size:8px">(' + actPct + '%)</span></td>';
      h += '<td>' + c.paid + ' <span style="color:var(--t4);font-size:8px">(' + paidPct + '%)</span></td>';
      h += '</tr>';
    }
    h += '</tbody></table></div>';
  }

  h += '</div>'; // end left column

  // ─── RIGHT COLUMN ───
  h += '<div class="biz-right">';

  // User Detail
  const totalUsersN = allUsers.length;
  const paidCount = allUsers.filter(u => ['pro','active','founding'].includes(u.tier) || u.founding).length;
  const freeCount = allUsers.filter(u => u.tier === 'free' && !u.founding).length;
  const foundingUserCount = allUsers.filter(u => u.founding).length;
  const activeCount = allUsers.filter(u => u.is_active).length;
  const unvCount = allUsers.filter(u => !u.email_verified).length;
  const riskCount = allUsers.filter(u => u.is_at_risk).length;
  const powerCount = allUsers.filter(u => u.is_power).length;
  const newCount = allUsers.filter(u => {
    if (!u.signed_up) return false;
    return (Date.now() - new Date(u.signed_up).getTime()) < 7 * 86400000;
  }).length;

  _allBizUsers = allUsers;

  h += '<div class="sh">User Detail (' + totalUsersN + ')</div>';
  h += '<div class="user-filters">';
  h += '<button class="uf active" onclick="filterBizUsers(\'all\',this)">All (' + totalUsersN + ')</button>';
  h += '<button class="uf" onclick="filterBizUsers(\'paid\',this)">Paid (' + paidCount + ')</button>';
  h += '<button class="uf" onclick="filterBizUsers(\'free\',this)">Free (' + freeCount + ')</button>';
  h += '<button class="uf" onclick="filterBizUsers(\'founding\',this)">Founding (' + foundingUserCount + ')</button>';
  h += '<button class="uf" onclick="filterBizUsers(\'active\',this)">Active 7d (' + activeCount + ')</button>';
  h += '<button class="uf" onclick="filterBizUsers(\'new\',this)">New (' + newCount + ')</button>';
  h += '<button class="uf" onclick="filterBizUsers(\'power\',this)">Power (' + powerCount + ')</button>';
  h += '<button class="uf" onclick="filterBizUsers(\'atrisk\',this)">At Risk (' + riskCount + ')</button>';
  h += '<button class="uf" onclick="filterBizUsers(\'unverified\',this)">Unverified (' + unvCount + ')</button>';
  h += '</div>';
  h += '<div id="userTableContainer"></div>';

  // User Segments (Power + At-Risk side by side)
  const topPowerUsers = allUsers.filter(u => u.sessions_7d > 0).sort((a, b) => b.sessions_7d - a.sessions_7d).slice(0, 5);
  const topAtRisk = allUsers.filter(u => u.is_at_risk).slice(0, 5);

  h += '<div class="sh">User Segments</div>';
  h += '<div class="biz-segments">';

  h += '<div class="biz-seg-col">';
  h += '<div class="biz-seg-title">Power Users</div>';
  if (topPowerUsers.length > 0) {
    for (const u of topPowerUsers) {
      h += '<div class="biz-seg-row"><span class="biz-seg-email">' + (u.email || '') + '</span><span class="biz-seg-metric">' + u.sessions_7d + '</span>';
      if (u.is_power) h += '<span class="biz-seg-tag power">POWER</span>';
      h += '</div>';
    }
  } else {
    h += '<div style="font-size:9px;color:var(--t4);padding:8px 0">No power users this week</div>';
  }
  h += '</div>';

  h += '<div class="biz-seg-col">';
  h += '<div class="biz-seg-title">At-Risk</div>';

    for (const u of topAtRisk) {
      h += '<div class="biz-seg-row"><span class="biz-seg-email">' + (u.email || '') + '</span><span class="biz-seg-metric">' + (u.sessions_7d || 0) + '</span><span class="biz-seg-tag risk">AT RISK</span></div>';

    h += '<div style="font-size:9px;color:var(--t4);padding:8px 0">No at-risk users</div>';

  h += '</div>';

  h += '</div>';

  // Recent Signups (7d)
  const recentSignups = allUsers.filter(u => {
    if (!u.signed_up) return false;

  }).sort((a, b) => (b.signed_up || '').localeCompare(a.signed_up || '')).slice(0, 8);

  if (recentSignups.length > 0) {
    h += '<div class="sh">Recent Signups (7d)</div>';
    for (const u of recentSignups) {
      const dt = u.signed_up ? new Date(u.signed_up).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '--';
      h += '<div class="user-row"><span class="user-email">' + (u.email || '') + '</span><span class="user-date">' + dt + '</span><span style="font-size:9px;color:var(--t4);min-width:42px;text-align:right">' + (u.sessions_7d || 0) + ' sess</span></div>';
    }
  }

  // Top Pages with tap-through %
  const topPages = eng ? (eng.top_pages || []) : [];
  if (topPages.length > 0) {
    h += '<div class="sh">Top Pages</div>';
    h += '<div class="table-scroll"><table class="user-table" style="margin-bottom:10px;min-width:320px"><caption style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Top pages by views</caption>';
    h += '<thead><tr><th>Page</th><th>Views</th><th>Users</th><th>Tap %</th></tr></thead><tbody>';
    for (const p of topPages.slice(0, 8)) {
      const path = p.page || p.path || '/';
      const views = p.views || 0;
      const users = p.distinct_users || 0;
      h += '<tr><td>' + path + '</td><td>' + views + '</td><td>' + users + '</td><td style="color:var(--t4)">&mdash;</td></tr>';
    }
    h += '</tbody></table></div>';
  }

  h += '</div>'; // end right column
  h += '</div>'; // end biz-grid

  document.getElementById('businessContent').innerHTML = h;

  if (allUsers.length > 0) {
    renderUserTable();
  }
}

function renderSessionsChart(sessionsByDay) {
  const vals = sessionsByDay.map(d => d.sessions || d.count || 0);
  const maxVal = Math.max(...vals, 1);
  const labels = sessionsByDay.map(d => {
    if (d.date) {
      const parts = d.date.split('-');
      return parts.length >= 3 ? parts[1] + '/' + parts[2] : d.date;
    }
    return '';
  });

  // Rolling 7d average
  const avgs = vals.map((_, i) => {
    const start = Math.max(0, i - 6);
    const slice = vals.slice(start, i + 1);
    return slice.reduce((s, v) => s + v, 0) / slice.length;
  });
  const maxWithAvg = Math.max(maxVal, ...avgs, 1);

  let h = '<div class="chart-box"><div class="chart-title">Sessions (7d)</div>';

  // SVG with bars + average line
  const svgW = 300, svgH = 80;
  const barGap = 6;
  const barW = (svgW - barGap * (vals.length - 1)) / vals.length;

  h += '<div class="chart-area" style="height:' + svgH + 'px;position:relative">';
  h += '<svg width="100%" height="' + svgH + '" viewBox="0 0 ' + svgW + ' ' + svgH + '" preserveAspectRatio="none">';

  // Bars
  for (let i = 0; i < vals.length; i++) {
    const barH = Math.max(3, vals[i] / maxWithAvg * (svgH - 12));
    const x = i * (barW + barGap);
    const y = svgH - barH;
    const opacity = (0.5 + (vals[i] / maxWithAvg) * 0.5).toFixed(2);
    h += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) + '" width="' + barW.toFixed(1) + '" height="' + barH.toFixed(1) + '" rx="2" fill="var(--green)" opacity="' + opacity + '"/>';
  }

  // Rolling average line
  if (vals.length > 1) {
    const avgPts = avgs.map((a, i) => {
      const x = i * (barW + barGap) + barW / 2;
      const y = svgH - Math.max(3, a / maxWithAvg * (svgH - 12));
      return x.toFixed(1) + ',' + y.toFixed(1);
    });
    h += '<polyline points="' + avgPts.join(' ') + '" fill="none" stroke="var(--amber)" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>';
  }

  h += '</svg>';

  // Value labels overlaid
  h += '<div style="display:flex;position:absolute;top:0;left:0;right:0;gap:' + barGap + 'px">';
  for (let i = 0; i < vals.length; i++) {
    h += '<div style="flex:1;text-align:center;font-size:8px;color:var(--t4)">' + vals[i] + '</div>';
  }
  h += '</div>';

  h += '</div>';

  h += '<div class="chart-labels">';
  for (const l of labels) h += '<span>' + l + '</span>';
  h += '</div>';

  // Legend
  h += '<div style="display:flex;gap:12px;font-size:8px;color:var(--t4);margin-top:4px">';
  h += '<span><span style="display:inline-block;width:8px;height:3px;background:var(--green);border-radius:1px;margin-right:3px;vertical-align:middle;opacity:0.7"></span>Sessions</span>';
  h += '<span><span style="display:inline-block;width:10px;height:0;border-top:1.5px dashed var(--amber);margin-right:3px;vertical-align:middle;opacity:0.7"></span>7d avg</span>';
  h += '</div>';

  h += '</div>';
  return h;
}

  updateClock();
}
