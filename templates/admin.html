<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SharpPicks Command Center v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=IBM+Plex+Serif:ital,wght@1,400&display=swap');

  :root {
    --bg: #0A0D14;
    --bg-card: #0F1319;
    --bg-elevated: #141920;
    --border: #1C2230;
    --border-subtle: #151B25;
    --text-primary: #E8ECF2;
    --text-secondary: #8A95A9;
    --text-dim: #566178;
    --green: #5A9E72;
    --green-dim: rgba(90, 158, 114, 0.15);
    --red: #C4686B;
    --red-dim: rgba(196, 104, 107, 0.12);
    --yellow: #D4A843;
    --yellow-dim: rgba(212, 168, 67, 0.12);
    --blue: #5B8DEF;
    --blue-dim: rgba(91, 141, 239, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(10, 13, 20, 0.95);
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2.5px;
    color: var(--text-primary);
  }

  .logo span { color: var(--green); }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(90, 158, 114, 0.6);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--text-secondary);
  }

  .topbar-btn {
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.5px;
    min-height: 32px;
    display: flex;
    align-items: center;
  }

  .kill-switch {
    border: 1px solid var(--red);
    color: var(--red);
    background: var(--red-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  .refresh-btn {
    border: 1px solid var(--border);
    color: var(--text-secondary);
    background: transparent;
  }

  .actions-bar {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .action-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .action-group-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    width: 36px;
    flex-shrink: 0;
  }

  .action-read-btns {
    display: flex;
    gap: 6px;
  }

  .action-mutate-btns {
    display: flex;
    gap: 6px;
    margin-left: auto;
  }

  .action-btn {
    font-size: 12px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    background: var(--bg-card);
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: all 0.15s;
    min-height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .action-btn:active { transform: scale(0.97); }

  .action-btn.run {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
    font-weight: 500;
  }

  .action-btn.grade {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-dim);
    font-weight: 500;
  }

  .action-btn.clear {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-dim);
    font-size: 11px;
    padding: 6px 10px;
    min-height: 36px;
  }

  .action-divider-line {
    height: 1px;
    background: var(--border-subtle);
    margin: 2px 0;
  }

  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
  }

  .confirm-overlay.active { display: flex; }

  .confirm-dialog {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    max-width: 320px;
    width: 100%;
    text-align: center;
  }

  .confirm-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-primary);
  }

  .confirm-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .confirm-actions { display: flex; gap: 10px; }

  .confirm-btn {
    flex: 1;
    font-family: inherit;
    font-size: 13px;
    padding: 12px;
    border-radius: 6px;
    cursor: pointer;
    min-height: 46px;
    font-weight: 500;
    border: none;
  }

  .confirm-btn.cancel {
    background: var(--bg-card);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  .confirm-btn.proceed { background: var(--green); color: var(--bg); }
  .confirm-btn.proceed.danger { background: var(--red); }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }

  .tab {
    font-size: 13px;
    padding: 12px 16px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    font-family: inherit;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .tab:hover { color: var(--text-secondary); }

  .tab.active {
    color: var(--green);
    border-bottom-color: var(--green);
    font-weight: 500;
  }

  .content { padding: 16px; }
  .panel { display: none; }
  .panel.active { display: block; }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border-subtle);
    border: 1px solid var(--border-subtle);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .stat-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .stat-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

  .stat-cell { background: var(--bg-card); padding: 14px; }

  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .stat-value { font-size: 22px; font-weight: 600; line-height: 1.15; }
  .stat-value.green { color: var(--green); }
  .stat-value.red { color: var(--red); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.blue { color: var(--blue); }
  .stat-value.sm { font-size: 18px; }

  .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  .section-header {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: 24px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
  }

  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border-subtle);
  }

  .pipeline-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 14px;
  }

  .pipeline-status {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .pipeline-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px rgba(90, 158, 114, 0.4);
  }

  .pipeline-title { font-size: 14px; font-weight: 500; }

  .pipeline-time {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: auto;
  }

  .pipeline-meta {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 10px 0;
    border-top: 1px solid var(--border-subtle);
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 10px;
  }

  .pipeline-meta-item { text-align: center; }

  .pipeline-meta-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .pipeline-meta-value {
    font-size: 16px;
    font-weight: 600;
    color: var(--green);
  }

  .pick-card {
    background: var(--bg-elevated);
    border-left: 3px solid var(--green);
    padding: 12px 14px;
    border-radius: 0 6px 6px 0;
    margin-bottom: 8px;
  }

  .pick-header { font-size: 13px; font-weight: 600; color: var(--green); margin-bottom: 3px; }
  .pick-matchup { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }

  .pick-stats {
    display: flex;
    gap: 18px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .pick-stats strong { color: var(--text-secondary); }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-bottom: 16px;
  }

  .data-table th {
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-transform: uppercase;
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .data-table th:last-child, .data-table td:last-child { text-align: right; }

  .data-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border-subtle);
    color: var(--text-secondary);
  }

  .data-table tr:last-child td { border-bottom: none; }

  .edge-positive { color: var(--green); font-weight: 500; }
  .edge-negative { color: var(--text-dim); }

  .cron-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border-subtle);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .cron-item {
    display: grid;
    grid-template-columns: 10px 1fr auto auto;
    gap: 10px;
    align-items: center;
    background: var(--bg-card);
    padding: 10px 12px;
    font-size: 12px;
  }

  .cron-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
  .cron-name { color: var(--text-secondary); }
  .cron-when { color: var(--text-dim); text-align: right; font-size: 11px; }
  .cron-ago { color: var(--green); font-size: 11px; font-weight: 500; }

  .service-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border-subtle);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .service-item {
    background: var(--bg-card);
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .service-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .service-name {
    font-size: 12px;
    color: var(--text-secondary);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .service-latency { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  .model-section { margin-bottom: 24px; }

  .model-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .model-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .model-badge.live { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .model-badge.beta { background: var(--yellow-dim); color: var(--yellow); border: 1px solid var(--yellow); }
  .model-badge.shadow { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }

  .cal-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 3px;
    border: 1px solid var(--green);
    background: var(--green-dim);
    color: var(--green);
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  .cal-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }

  .bucket-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 12px; }
  .bucket-label { width: 85px; color: var(--text-dim); flex-shrink: 0; }

  .bucket-bar-track {
    flex: 1;
    height: 6px;
    background: var(--bg-elevated);
    border-radius: 3px;
    overflow: hidden;
  }

  .bucket-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .bucket-bar-fill.green { background: var(--green); }
  .bucket-bar-fill.yellow { background: var(--yellow); }
  .bucket-bar-fill.red { background: var(--red); }

  .bucket-record { width: 90px; text-align: right; color: var(--text-secondary); flex-shrink: 0; }

  .funnel {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    background: var(--bg-card);
    border-radius: 6px;
    margin-bottom: 16px;
  }

  .funnel-step { text-align: center; flex-shrink: 0; }
  .funnel-value { font-size: 20px; font-weight: 600; color: var(--text-primary); }

  .funnel-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .funnel-arrow { color: var(--text-dim); font-size: 14px; flex-shrink: 0; }
  .funnel-rate { font-size: 10px; color: var(--yellow); flex-shrink: 0; font-weight: 500; }

  .mini-pick {
    display: grid;
    grid-template-columns: 52px 1fr 36px 28px 48px;
    gap: 6px;
    align-items: center;
    font-size: 12px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-subtle);
  }

  .mini-pick:last-child { border-bottom: none; }
  .mini-pick-date { color: var(--text-dim); }
  .mini-pick-name { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mini-pick-edge { color: var(--text-dim); text-align: center; }
  .mini-pick-result { text-align: center; font-weight: 600; }
  .mini-pick-pnl { text-align: right; font-weight: 500; }

  .user-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 12px;
  }

  .user-row:last-child { border-bottom: none; }

  .user-email {
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tier-badge {
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .tier-badge.founding { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(212, 168, 67, 0.3); }
  .tier-badge.trial { background: var(--green-dim); color: var(--green); border: 1px solid rgba(90, 158, 114, 0.3); }
  .tier-badge.free { background: rgba(122, 133, 153, 0.08); color: var(--text-dim); border: 1px solid var(--border); }

  .user-date { font-size: 11px; color: var(--text-dim); }

  .feature-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }
  .feature-label { width: 110px; color: var(--text-secondary); flex-shrink: 0; }

  .feature-track {
    flex: 1;
    height: 8px;
    background: var(--bg-elevated);
    border-radius: 4px;
    overflow: hidden;
  }

  .feature-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width 0.5s ease; }
  .feature-pct { width: 44px; text-align: right; color: var(--text-dim); flex-shrink: 0; }

  .pipeline-sport-tab {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border: none;
    background: var(--bg-card);
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.5px;
    min-height: 38px;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }

  .pipeline-sport-tab.active { background: var(--green-dim); color: var(--green); }

  .pipeline-panel { display: none; }
  .pipeline-panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel.active > * { animation: fadeIn 0.2s ease-out; }

  .mt-12 { margin-top: 12px; }
  .mb-16 { margin-bottom: 16px; }
  .text-green { color: var(--green); }
  .text-red { color: var(--red); }
  .text-yellow { color: var(--yellow); }
  .text-dim { color: var(--text-dim); }

  .loading { color: var(--text-dim); text-align: center; padding: 40px; font-size: 12px; }
</style>
</head>
<body>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-dialog">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-actions">
      <button class="confirm-btn cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-btn proceed" id="confirmProceed" onclick="executeConfirm()">Run</button>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="status-dot"></div>
    <div class="logo">SHARP <span>||</span> PICKS</div>
  </div>
  <div class="topbar-right">
    <span id="topbarTime"></span>
    <button class="topbar-btn refresh-btn" onclick="location.reload()">Refresh</button>
    <button class="topbar-btn kill-switch" onclick="toggleKillSwitch()">Kill</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('pulse', this)">Pulse</button>
  <button class="tab" onclick="switchTab('models', this)">Models</button>
  <button class="tab" onclick="switchTab('infra', this)">Infra</button>
  <button class="tab" onclick="switchTab('business', this)">Business</button>
</div>

<div class="content">

  <!-- PULSE -->
  <div class="panel active" id="panel-pulse">
    <div id="pulseStats" class="loading">Loading...</div>
    <div class="section-header">Today's Pipeline</div>
    <div style="display: flex; gap: 2px; margin-bottom: 12px; background: var(--border-subtle); border-radius: 5px; overflow: hidden; width: fit-content;">
      <button class="pipeline-sport-tab active" onclick="switchPipeline('nba', this)">NBA</button>
      <button class="pipeline-sport-tab" onclick="switchPipeline('mlb', this)">MLB</button>
    </div>
    <div class="pipeline-panel active" id="pipeline-nba"><div class="loading">Loading...</div></div>
    <div class="pipeline-panel" id="pipeline-mlb"><div class="loading">Loading...</div></div>
    <div class="section-header">Services</div>
    <div id="servicesGrid" class="loading">Loading...</div>
  </div>

  <!-- MODELS -->
  <div class="panel" id="panel-models">
    <div id="modelsContent" class="loading">Loading...</div>
  </div>

  <!-- INFRA -->
  <div class="panel" id="panel-infra">
    <div class="section-header">Pipeline Controls</div>
    <div class="actions-bar" style="border-bottom: none; padding: 0; margin-bottom: 20px;">
      <div class="action-group">
        <span class="action-group-label">NBA</span>
        <div class="action-read-btns">
          <button class="action-btn" onclick="runAction('/api/cron/collect-games')">Games</button>
          <button class="action-btn" onclick="runAction('/api/cron/refresh-lines')">Lines</button>
        </div>
        <div class="action-mutate-btns">
          <button class="action-btn clear" onclick="showConfirm('Clear NBA?', 'Reset today\'s NBA pipeline data.', 'Clear', true, '/api/cron/run-model?sport=nba&clear=true')">Clear</button>
          <button class="action-btn run" onclick="showConfirm('Run NBA Model?', 'Execute model pipeline for today\'s NBA games.', 'Run', false, '/api/cron/run-model?force=true')">Run</button>
          <button class="action-btn grade" onclick="showConfirm('Grade NBA Picks?', 'Grade all pending NBA picks against final scores.', 'Grade', false, '/api/cron/grade-picks')">Grade</button>
        </div>
      </div>
      <div class="action-divider-line"></div>
      <div class="action-group">
        <span class="action-group-label">MLB</span>
        <div class="action-read-btns">
          <button class="action-btn" onclick="runAction('/api/cron/mlb-collect')">Collect</button>
        </div>
        <div class="action-mutate-btns">
          <button class="action-btn clear" onclick="showConfirm('Clear MLB?', 'Reset today\'s MLB pipeline data.', 'Clear', true, '/api/cron/mlb-run-model?clear=true')">Clear</button>
          <button class="action-btn run" onclick="showConfirm('Run MLB Model?', 'Execute model pipeline for today\'s MLB games.', 'Run', false, '/api/cron/mlb-run-model?force=true')">Run</button>
          <button class="action-btn grade" onclick="showConfirm('Grade MLB Picks?', 'Grade all pending MLB picks against final scores.', 'Grade', false, '/api/cron/mlb-grade')">Grade</button>
        </div>
      </div>
    </div>
    <div id="infraContent" class="loading">Loading...</div>
  </div>

  <!-- BUSINESS -->
  <div class="panel" id="panel-business">
    <div id="businessContent" class="loading">Loading...</div>
  </div>

</div>

<script>
const CRON_SECRET = '{{ cron_secret }}';
let pendingAction = null;

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

function switchPipeline(sport, el) {
  document.querySelectorAll('.pipeline-sport-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pipeline-panel').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pipeline-' + sport).classList.add('active');
}

function showConfirm(title, desc, actionLabel, isDanger, actionUrl) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmDesc').textContent = desc;
  const btn = document.getElementById('confirmProceed');
  btn.textContent = actionLabel;
  btn.className = 'confirm-btn proceed' + (isDanger ? ' danger' : '');
  pendingAction = actionUrl;
  document.getElementById('confirmOverlay').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
  pendingAction = null;
}

async function executeConfirm() {
  if (pendingAction) {
    const url = pendingAction;
    closeConfirm();
    await runAction(url);
  } else {
    closeConfirm();
  }
}

async function runAction(url) {
  try {
    const r = await fetch(url, { method: 'POST', headers: { 'X-Cron-Secret': CRON_SECRET } });
    const d = await r.json();
    alert(JSON.stringify(d, null, 2));
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function toggleKillSwitch() {
  if (!confirm('Toggle kill switch? This will disable/enable all model operations.')) return;
  try {
    const r = await fetch('/api/public/kill-switch');
    const d = await r.json();
    alert('Kill switch: ' + (d.killed ? 'ACTIVE' : 'OFF'));
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function updateClock() {
  const now = new Date();
  const et = now.toLocaleString('en-US', { timeZone: 'America/New_York', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
  document.getElementById('topbarTime').textContent = et;
}

async function loadData() {
  updateClock();
  setInterval(updateClock, 30000);

  try {
    const [statsR, diagR, engR, usersR] = await Promise.all([
      fetch('/api/admin/stats').then(r => r.json()).catch(() => null),
      fetch('/api/cron/diagnostic', { headers: { 'X-Cron-Secret': CRON_SECRET } }).then(r => r.json()).catch(() => null),
      fetch('/api/admin/engagement').then(r => r.json()).catch(() => null),
      fetch('/api/admin/users').then(r => r.json()).catch(() => null),
    ]);

    renderPulse(statsR, diagR);
    renderModels(statsR, diagR);
    renderInfra(diagR);
    renderBusiness(statsR, engR, usersR);
  } catch (e) {
    console.error('Load failed:', e);
  }
}

function renderPulse(stats, diag) {
  if (!stats && !diag) { document.getElementById('pulseStats').textContent = 'Failed to load'; return; }

  const s = stats || {};
  const nba = s.nba || {};
  const mlb = s.mlb || {};
  const nbaW = nba.wins || 0, nbaL = nba.losses || 0;
  const mlbW = mlb.wins || 0, mlbL = mlb.losses || 0;
  const nbaRoi = nba.roi != null ? nba.roi.toFixed(1) : '0';
  const mlbRoi = mlb.roi != null ? mlb.roi.toFixed(1) : '0';
  const users = s.totalUsers || s.total_users || 0;

  document.getElementById('pulseStats').innerHTML = `
    <div class="stat-grid cols-4">
      <div class="stat-cell"><div class="stat-label">NBA</div><div class="stat-value green">${nbaW}-${nbaL}</div><div class="stat-sub">${nbaRoi > 0 ? '+' : ''}${nbaRoi}% ROI</div></div>
      <div class="stat-cell"><div class="stat-label">MLB</div><div class="stat-value green">${mlbW}-${mlbL}</div><div class="stat-sub">${mlbRoi > 0 ? '+' : ''}${mlbRoi}% ROI</div></div>
      <div class="stat-cell"><div class="stat-label">MRR</div><div class="stat-value green">$${s.mrr || 0}</div><div class="stat-sub">$${s.arr || 0} ARR</div></div>
      <div class="stat-cell"><div class="stat-label">Users</div><div class="stat-value">${users}</div><div class="stat-sub">${s.active_7d || 0} active 7d</div></div>
    </div>`;

  const today = diag || {};
  const todayNba = today.nba_today || today.today || {};
  const todayMlb = today.mlb_today || {};

  const nbaPick = todayNba.pick;
  const mlbPick = todayMlb.pick;
  const nbaGames = today.games || {};
  const mlbGames = today.mlb_games || {};

  document.getElementById('pipeline-nba').innerHTML = nbaPick
    ? `<div class="pipeline-card">
        <div class="pipeline-status"><div class="pipeline-dot"></div><div class="pipeline-title">Pick Published</div></div>
        <div class="pick-card">
          <div class="pick-header">${nbaPick.side || '--'}</div>
          <div class="pick-stats"><span>Edge <strong class="text-green">${nbaPick.edge ? '+' + nbaPick.edge + '%' : '--'}</strong></span></div>
        </div>
      </div>`
    : (todayNba.pass ? '<div class="pipeline-card"><div class="pipeline-status"><div class="pipeline-dot" style="background:var(--yellow)"></div><div class="pipeline-title">Pass Day</div></div></div>'
    : '<div class="pipeline-card"><div class="pipeline-status"><div class="pipeline-dot" style="background:var(--text-dim)"></div><div class="pipeline-title">Awaiting Model Run</div></div></div>');

  document.getElementById('pipeline-mlb').innerHTML = mlbPick
    ? `<div class="pipeline-card">
        <div class="pipeline-status"><div class="pipeline-dot"></div><div class="pipeline-title">Pick Published</div></div>
        <div class="pick-card">
          <div class="pick-header">${mlbPick.side || '--'}</div>
          <div class="pick-stats"><span>Edge <strong class="text-green">${mlbPick.edge ? '+' + mlbPick.edge + '%' : '--'}</strong></span></div>
        </div>
      </div>`
    : '<div class="pipeline-card"><div class="pipeline-status"><div class="pipeline-dot" style="background:var(--text-dim)"></div><div class="pipeline-title">Awaiting Model Run</div></div></div>';

  document.getElementById('servicesGrid').innerHTML = `
    <div class="service-grid">
      <div class="service-item"><div class="service-dot"></div><div class="service-name">PostgreSQL</div><div class="service-latency">OK</div></div>
      <div class="service-item"><div class="service-dot"></div><div class="service-name">Odds API</div><div class="service-latency">${nbaGames.with_spreads || 0} w/ lines</div></div>
      <div class="service-item"><div class="service-dot"></div><div class="service-name">ESPN</div><div class="service-latency">${nbaGames.total || 0} games</div></div>
      <div class="service-item"><div class="service-dot"></div><div class="service-name">SQLite</div><div class="service-latency">${nbaGames.all_rows || 0} rows</div></div>
      <div class="service-item"><div class="service-dot"></div><div class="service-name">Resend</div><div class="service-latency">OK</div></div>
      <div class="service-item"><div class="service-dot"></div><div class="service-name">Stripe</div><div class="service-latency">OK</div></div>
    </div>`;
}

function renderModels(stats, diag) {
  const s = stats || {};
  const nba = s.nba || {};
  const mlb = s.mlb || {};
  const nbaW = nba.wins || 0, nbaL = nba.losses || 0, nbaWr = (nbaW + nbaL) > 0 ? ((nbaW / (nbaW + nbaL)) * 100).toFixed(1) : '0';
  const mlbW = mlb.wins || 0, mlbL = mlb.losses || 0, mlbWr = (mlbW + mlbL) > 0 ? ((mlbW / (mlbW + mlbL)) * 100).toFixed(1) : '0';
  const nbaRoi = nba.roi != null ? nba.roi.toFixed(1) : '0';
  const mlbRoi = mlb.roi != null ? mlb.roi.toFixed(1) : '0';

  document.getElementById('modelsContent').innerHTML = `
    <div class="model-section">
      <div class="model-header">
        <span class="section-header" style="margin:0">NBA</span>
        <span class="model-badge live">Live</span>
      </div>
      <div class="stat-grid cols-4">
        <div class="stat-cell"><div class="stat-label">Record</div><div class="stat-value green">${nbaW}-${nbaL}</div><div class="stat-sub">${nbaWr}%</div></div>
        <div class="stat-cell"><div class="stat-label">ROI</div><div class="stat-value green">${nbaRoi > 0 ? '+' : ''}${nbaRoi}%</div></div>
        <div class="stat-cell"><div class="stat-label">Picks</div><div class="stat-value sm">${nba.total_picks || 0}</div></div>
        <div class="stat-cell"><div class="stat-label">Avg Edge</div><div class="stat-value sm">${nba.avg_edge ? nba.avg_edge.toFixed(1) + '%' : '--'}</div></div>
      </div>
    </div>
    <div class="model-section">
      <div class="model-header">
        <span class="section-header" style="margin:0">MLB</span>
        <span class="model-badge beta">Cal Beta</span>
      </div>
      <div class="stat-grid cols-4">
        <div class="stat-cell"><div class="stat-label">Record</div><div class="stat-value green">${mlbW}-${mlbL}</div><div class="stat-sub">${mlbWr}%</div></div>
        <div class="stat-cell"><div class="stat-label">ROI</div><div class="stat-value green">${mlbRoi > 0 ? '+' : ''}${mlbRoi}%</div></div>
        <div class="stat-cell"><div class="stat-label">Picks</div><div class="stat-value sm">${mlb.total_picks || 0}</div></div>
        <div class="stat-cell"><div class="stat-label">Avg Edge</div><div class="stat-value sm">${mlb.avg_edge ? mlb.avg_edge.toFixed(1) + '%' : '--'}</div></div>
      </div>
    </div>
    <div class="model-section">
      <div class="model-header">
        <span class="section-header" style="margin:0">WNBA</span>
        <span class="model-badge shadow">Shadow</span>
      </div>
      <div style="padding: 24px; text-align: center; color: var(--text-dim); font-size: 13px;">No runs yet</div>
    </div>`;
}

function renderInfra(diag) {
  const logs = (diag && diag.cron_logs) || [];
  const recentJobs = {};
  for (const log of logs) {
    if (!recentJobs[log.job]) recentJobs[log.job] = log;
  }

  let cronHtml = '<div class="section-header">Recent Cron Jobs</div><div class="cron-list">';
  for (const [job, log] of Object.entries(recentJobs)) {
    const ago = log.at ? timeAgo(log.at) : '--';
    const ok = log.status === 'ok';
    cronHtml += `<div class="cron-item">
      <div class="cron-dot" style="background:${ok ? 'var(--green)' : 'var(--red)'}"></div>
      <div class="cron-name">${job}</div>
      <div class="cron-when">${log.dur_ms != null ? log.dur_ms + 'ms' : ''}</div>
      <div class="cron-ago" style="color:${ok ? 'var(--green)' : 'var(--red)'}">${ago}</div>
    </div>`;
  }
  cronHtml += '</div>';
  document.getElementById('infraContent').innerHTML = cronHtml;
}

function renderBusiness(stats, eng, users) {
  const s = stats || {};
  const e = eng || {};
  const u = (users && users.users) || [];

  let usersHtml = '';
  for (const user of u.slice(0, 10)) {
    const tier = user.founding_member ? 'founding' : (user.subscription_status === 'trial' ? 'trial' : 'free');
    const tierLabel = user.founding_member ? `F #${user.founding_number || ''}` : (tier === 'trial' ? 'Trial' : 'Free');
    const date = user.created_at ? new Date(user.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
    usersHtml += `<div class="user-row"><div class="user-email">${user.email || ''}</div><div><span class="tier-badge ${tier}">${tierLabel}</span></div><div class="user-date">${date}</div></div>`;
  }

  document.getElementById('businessContent').innerHTML = `
    <div class="stat-grid cols-3">
      <div class="stat-cell"><div class="stat-label">MRR</div><div class="stat-value green">$${s.mrr || 0}</div></div>
      <div class="stat-cell"><div class="stat-label">ARR</div><div class="stat-value sm">$${s.arr || 0}</div></div>
      <div class="stat-cell"><div class="stat-label">Founding</div><div class="stat-value yellow">${s.founding_count || 0}/50</div></div>
    </div>
    <div class="section-header">Engagement (7d)</div>
    <div class="stat-grid cols-3">
      <div class="stat-cell"><div class="stat-label">Active Users</div><div class="stat-value">${e.active_7d || s.active_7d || 0}</div></div>
      <div class="stat-cell"><div class="stat-label">Sessions</div><div class="stat-value sm">${e.sessions_7d || 0}</div></div>
      <div class="stat-cell"><div class="stat-label">Events</div><div class="stat-value sm">${e.events_7d || 0}</div></div>
    </div>
    <div class="section-header">Recent Users</div>
    ${usersHtml}`;
}

function timeAgo(isoStr) {
  const d = new Date(isoStr);
  const now = new Date();
  const mins = Math.floor((now - d) / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

document.getElementById('confirmOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfirm();
});

loadData();
</script>

</body>
</html>
