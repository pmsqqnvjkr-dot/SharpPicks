<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Evan · SharpPicks</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:#060810; overflow:hidden; }
body { font-family:'Inter',sans-serif; color:#EEF2FF; display:flex; flex-direction:column; max-width:480px; margin:0 auto; height:100%; }

.header { display:flex; align-items:center; justify-content:space-between; padding:52px 20px 14px; background:#0A0D14; border-bottom:1px solid #1A1F2E; flex-shrink:0; }
.header-left { display:flex; align-items:center; gap:10px; }
.signal-avatar { width:36px; height:36px; background:rgba(90,158,114,0.15); border:1px solid rgba(90,158,114,0.3); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.signal-avatar img { width:20px; height:20px; opacity:0.9; }
.header-title { font-family:'IBM Plex Serif',serif; font-size:17px; font-weight:600; color:#EEF2FF; }
.header-sub { font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:#5A9E72; margin-top:1px; }
.status-dot { width:7px; height:7px; background:#5A9E72; border-radius:50%; box-shadow:0 0 6px rgba(90,158,114,0.6); }

.messages { flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:18px; background:#080B12; scrollbar-width:none; }
.messages::-webkit-scrollbar { display:none; }

.date-div { display:flex; align-items:center; gap:10px; margin:4px 0; }
.date-div span { font-family:'JetBrains Mono',monospace; font-size:9px; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:#333845; white-space:nowrap; }
.date-div::before, .date-div::after { content:''; flex:1; height:1px; background:#1A1F2E; }

.msg { display:flex; flex-direction:column; gap:4px; max-width:85%; }
.msg.evan { align-self:flex-start; }
.msg.user { align-self:flex-end; }
.bubble { padding:12px 14px; border-radius:16px; font-size:14px; line-height:1.65; }
.evan .bubble { background:#0D1017; border:1px solid #1A1F2E; border-bottom-left-radius:4px; color:#D4D8E8; }
.user .bubble { background:rgba(90,158,114,0.15); border:1px solid rgba(90,158,114,0.25); border-bottom-right-radius:4px; color:#EEF2FF; }
.msg-meta { font-family:'JetBrains Mono',monospace; font-size:9px; color:#2a3048; padding:0 4px; }
.evan .msg-meta { text-align:left; }
.user .msg-meta { text-align:right; }

.typing { display:flex; align-items:center; gap:4px; padding:12px 14px; background:#0D1017; border:1px solid #1A1F2E; border-radius:16px; border-bottom-left-radius:4px; width:fit-content; }
.typing span { width:5px; height:5px; background:#5A9E72; border-radius:50%; animation:bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }

.prompts { padding:10px 16px 6px; display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; background:#080B12; flex-shrink:0; }
.prompts::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; padding:7px 12px; background:#0D1017; border:1px solid #1A1F2E; border-radius:20px; font-family:'JetBrains Mono',monospace; font-size:10px; color:#9AA3B2; cursor:pointer; white-space:nowrap; transition:all 0.15s; }
.chip:active { background:rgba(90,158,114,0.1); border-color:rgba(90,158,114,0.3); color:#5A9E72; }

.input-bar { padding:10px 16px 28px; background:#0A0D14; border-top:1px solid #1A1F2E; flex-shrink:0; }
.input-row { display:flex; align-items:flex-end; gap:10px; background:#0D1017; border:1px solid #1A1F2E; border-radius:22px; padding:8px 8px 8px 16px; transition:border-color 0.15s; }
.input-row:focus-within { border-color:rgba(90,158,114,0.35); }
textarea { flex:1; background:none; border:none; outline:none; color:#EEF2FF; font-family:'Inter',sans-serif; font-size:14px; line-height:1.5; resize:none; max-height:100px; min-height:22px; }
textarea::placeholder { color:#333845; }
.send-btn { width:34px; height:34px; flex-shrink:0; background:#5A9E72; border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.15s; }
.send-btn:disabled { background:#1A1F2E; cursor:not-allowed; }
.send-btn svg { width:14px; height:14px; fill:#0A0D14; }

.wordmark-bar { text-align:center; padding:0 0 4px; background:#0A0D14; flex-shrink:0; }
.wordmark-bar img { height:13px; opacity:0.15; }

.error-banner { background:rgba(196,104,107,0.1); border:1px solid rgba(196,104,107,0.2); border-radius:8px; padding:10px 14px; font-size:12px; color:#C4686B; font-family:'JetBrains Mono',monospace; display:none; margin:0 16px 8px; }
</style>
</head>

<script>
const CHAT_ENDPOINT = '/api/evan/chat';
const TOKEN = new URLSearchParams(location.search).get('t') || '';
let history = [];
let busy = false;

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function key(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function chip(el) {
  document.getElementById('inp').value = el.textContent;
  send();
}

function now() {
  return new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}

function addMsg(role, text) {
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const label = role === 'evan' ? 'Evan' : 'You';
  div.innerHTML = `<div class="bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-meta">${label} · ${now()}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addTyping() {
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg evan';
  div.id = 'typing';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg;
  e.style.display = 'block';
  setTimeout(() => e.style.display = 'none', 5000);
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = ''; inp.style.height = 'auto';
  busy = true;
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', text);
  history.push({role:'user', content:text});
  addTyping();

  try {
    const res = await fetch(CHAT_ENDPOINT, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Evan-Token': TOKEN
      },
      body: JSON.stringify({ message: text, history: history.slice(0,-1) })
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showErr(err.error || 'Something went wrong. Try again.');
    } else {
      const data = await res.json();
      const reply = data.reply || '';
      addMsg('evan', reply);
      history.push({role:'assistant', content:reply});
      if (history.length > 40) history = history.slice(-40);
    }
  } catch(e) {
    removeTyping();
    showErr('Connection error. Check your signal.');
  } finally {
    busy = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('inp').focus();
  }
}
</script>
