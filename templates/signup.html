<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - SharpPicks</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen flex items-center justify-center">
    <div class="bg-slate-800 p-8 rounded-2xl w-96">
        <h1 class="text-white text-3xl font-black mb-6">⚡ Join SharpPicks</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="bg-red-500/20 border border-red-500 text-red-300 px-4 py-2 rounded-lg mb-4">
            {% for message in messages %}
            <p>{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="email" name="email" placeholder="Email" required class="w-full p-3 mb-3 rounded-lg bg-slate-700 text-white">
            <input type="text" name="username" placeholder="Username" required class="w-full p-3 mb-3 rounded-lg bg-slate-700 text-white">
            <input type="password" name="password" placeholder="Password" required class="w-full p-3 mb-4 rounded-lg bg-slate-700 text-white">
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-500 transition-all">Sign Up</button>
        </form>
        <p class="text-slate-400 text-sm mt-4">Already have an account? <a href="/login" class="text-blue-400 hover:text-blue-300">Login</a></p>
    </div>
</body>
</html>
