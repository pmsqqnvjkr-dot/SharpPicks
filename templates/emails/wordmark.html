{# Pure HTML/CSS wordmark — no images, renders in Gmail, Outlook, Apple Mail #}
{% macro email_wordmark(size=14) %}
<span style="font-family:'Courier New',Courier,monospace;font-size:{{ size }}px;font-weight:500;letter-spacing:0.25em;color:#E8EAED;white-space:nowrap;">SHARP<span style="color:#5A9E72;margin:0 2px;letter-spacing:0;">&thinsp;&#x2016;&thinsp;</span>PICKS</span>
{% endmacro %}
